# Phase 25 WS4 — CI parity with Docker Postgres (Timescale + PostGIS + pgvector).
# Applies the same schema/migrations path as local bootstrap; runs Go tests including smoke tests.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: true
      DATABASE_URL: postgres://gr33n:gr33n@127.0.0.1:5433/gr33n?sslmode=disable
      CROP_CATALOG_SOURCE: db
      AGRONOMY_FIELD_GUIDES_SOURCE: db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Build and start Compose Postgres (Timescale + pgvector + PostGIS)
        run: docker compose up -d db --build

      - name: Wait for Postgres
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if docker compose exec -T db pg_isready -U gr33n -d gr33n; then
              echo "Postgres is ready."
              exit 0
            fi
            echo "waiting ($i/90)..."
            sleep 2
          done
          echo "::error::Postgres did not become ready in time"
          docker compose logs db
          exit 1

      - name: Bootstrap schema, migrations, and demo seed
        run: ./scripts/bootstrap-local.sh --seed

      - name: Validate crop library YAML (Phase 82 WS4a)
        run: make check-crop-catalog-parity

      - name: Catalog seed drift gate (Phase 95)
        run: make check-catalog-seed-drift

      - name: Verify crop catalog seed (Phase 84 WS-B/K)
        run: make check-crop-catalog-db

      - name: UI domain parity guards (Phase 99)
        run: |
          go test ./internal/platform/domainenums/... ./internal/handler/lighting/... -run 'Parity|GrowthStages|PresetList' -count=1
          PRESET_PATTERN='peas_22_2|veg_18_6|flower_12_12|seedling_16_8'
          if rg -n "$PRESET_PATTERN" ui/src \
            --glob '*.vue' --glob '*.js' \
            --glob '!**/__tests__/**' \
            --glob '!**/lightingPresets.js' \
            --glob '!**/bootstrapCatalog.fallback.js' \
            2>/dev/null; then
            echo "::error::hardcoded lighting preset keys in production UI"
            exit 1
          fi

      - name: Verify pgvector extension (RAG parity)
        run: |
          count=$(psql "$DATABASE_URL" -tAc "SELECT count(*) FROM pg_extension WHERE extname='vector'" | tr -d '[:space:]')
          test "$count" = "1"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "SELECT to_regclass('gr33ncore.rag_embedding_chunks') AS rag_chunks_table;"

      - name: OpenAPI route parity
        run: make audit-openapi

      - name: Environment variable reference parity
        run: make audit-env

      - name: Run Go tests (includes cmd/api smoke tests)
        run: go test -tags dev ./... -count=1

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install UI deps and test
        working-directory: ui
        run: npm ci --legacy-peer-deps && npm test -- --run

  # Phase 33 WS4 — opt-in @hardware lane. Drives real GPIO via the
  # `hardware` build tag. NEVER runs on push/PR; trigger manually from the
  # Actions tab ("Run workflow"). Requires a self-hosted runner labeled
  # `gr33n-hardware` wired to a Pi + seeded demo-veg-relay-01 with the API up.
  hardware-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, gr33n-hardware]
    timeout-minutes: 30
    env:
      GR33N_HARDWARE_TEST: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Hardware actuator GPIO round-trip
        run: go test -tags 'dev hardware' -run Hardware ./cmd/api/ -count=1 -v

  # Phase 112 WS6 — Ollama E2E smokes. Manual workflow_dispatch only (model pulls
  # are slow). Requires Ollama service + Postgres bootstrap like the main go job.
  ollama-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CI: true
      DATABASE_URL: postgres://gr33n:gr33n@127.0.0.1:5433/gr33n?sslmode=disable
      CROP_CATALOG_SOURCE: db
      AGRONOMY_FIELD_GUIDES_SOURCE: db
      AI_ENABLED: "true"
      LLM_BASE_URL: http://127.0.0.1:11434/v1
      LLM_MODEL: tinyllama
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client curl

      - name: Build and start Compose Postgres
        run: docker compose up -d db --build

      - name: Wait for Postgres
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if docker compose exec -T db pg_isready -U gr33n -d gr33n; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Bootstrap schema, migrations, and demo seed
        run: ./scripts/bootstrap-local.sh --seed

      - name: Wait for Ollama and pull test models
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:11434/api/tags >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:11434/api/pull -d '{"name":"tinyllama","stream":false}'
          curl -sf http://127.0.0.1:11434/api/pull -d '{"name":"phi3:mini","stream":false}'

      - name: Phase 112 Ollama E2E smokes
        run: go test -tags 'dev ollama' ./cmd/api/ -run TestPhase112 -count=1 -v

  # Phase 117 WS5 — Browser E2E (Playwright). Manual workflow_dispatch only.
  # Expects a running dev stack at E2E_BASE_URL (default http://127.0.0.1:5173)
  # with AUTH_MODE=auth_test and demo seed — typically on a self-hosted runner
  # beside `make dev-auth-test`, or start API+UI in job steps before npm test.
  browser-e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      E2E_BASE_URL: http://127.0.0.1:5173
      E2E_DEV_EMAIL: dev@gr33n.local
      E2E_DEV_PASSWORD: devpassword
      DATABASE_URL: postgres://gr33n:gr33n@127.0.0.1:5433/gr33n?sslmode=disable
      JWT_SECRET: ci-browser-e2e-jwt-secret-min-32-chars
      PI_API_KEY: ci-browser-e2e-pi-key
      AUTH_MODE: auth_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Build and start Compose Postgres
        run: docker compose up -d db --build

      - name: Wait for Postgres
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if docker compose exec -T db pg_isready -U gr33n -d gr33n; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Bootstrap schema, migrations, and demo seed
        run: ./scripts/bootstrap-local.sh --seed

      - name: Start API and UI
        run: |
          set -euo pipefail
          go run -tags dev ./cmd/api/ &
          echo $! > /tmp/gr33n-api.pid
          cd ui && npm ci --legacy-peer-deps && npm run dev -- --host 127.0.0.1 --port 5173 &
          echo $! > /tmp/gr33n-ui.pid
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8080/health >/dev/null && curl -sf http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Playwright browser E2E
        working-directory: e2e
        run: npm ci && npx playwright install chromium && npm test

      - name: Stop background services
        if: always()
        run: |
          kill $(cat /tmp/gr33n-api.pid 2>/dev/null) 2>/dev/null || true
          kill $(cat /tmp/gr33n-ui.pid 2>/dev/null) 2>/dev/null || true
