        ec_target: 1.60
        ec_max: 1.80
        ph_min: 5.8
        ph_max: 6.2
        vpd_min_kpa: 1.00
        vpd_max_kpa: 1.20
        temp_min_c: 20.0
        temp_max_c: 24.0
        rh_min_pct: 45
        rh_max_pct: 55
        dli_target: 40.0
        photoperiod_hrs: 12.0
        notes: 12/12 flip
      - stage: mid_flower
        ec_min: 1.60
        ec_target: 1.80
        ec_max: 2.00
        ph_min: 5.8
        ph_max: 6.2
        vpd_min_kpa: 1.10
        vpd_max_kpa: 1.30
        temp_min_c: 20.0
        temp_max_c: 24.0
        rh_min_pct: 40
        rh_max_pct: 50
        dli_target: 45.0
