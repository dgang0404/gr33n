# Phase 82 — canonical cultivator crop library (single source of truth).
# Drives SQL seed (generate-crop-seed.sql.sh), Guardian aliases (WS3), UI picker (WS4f).
# EC stage fields are mS/cm only — never percentages.
version: 3

aliases:
  orchid: phalaenopsis
  aubergine: eggplant
  weed: cannabis
  marijuana: cannabis
  coriander: cilantro
  wild_leek: ramps
  shiitake: mushroom
  apple_tree: fruit_tree
  grape_vine: fruit_tree
  trichocereus: san_pedro
  echinopsis: san_pedro
  swiss_chard: chard
  pak_choi: bok_choy
  pak_choy: bok_choy
  mum: chrysanthemum
  chrysanthemum_mum: chrysanthemum
  cherry_tomato: tomato
  beefsteak_tomato: tomato

crops:
  # ── Existing Phase 64 profiles (stages seeded) ──────────────────────────
  - key: cannabis
    display_name: Cannabis
    category: flower
    source: Curated indoor ranges; verify against your genetics
    substrate: coco / rockwool
    watering_style: pulse_dryback
    runoff_pct_target: "10-20"
    cousin_of: null
    aliases: []
    stages:
      - stage: early_veg
        ec_min: 0.80
        ec_target: 1.00
        ec_max: 1.20
        ph_min: 5.8
        ph_max: 6.2
        vpd_min_kpa: 0.80
        vpd_max_kpa: 1.00
        temp_min_c: 22.0
        temp_max_c: 26.0
        rh_min_pct: 60
        rh_max_pct: 70
        dli_target: 30.0
        photoperiod_hrs: 18.0
        notes: Veg photoperiod
      - stage: late_veg
        ec_min: 1.00
        ec_target: 1.40
        ec_max: 1.60
        ph_min: 5.8
        ph_max: 6.2
        vpd_min_kpa: 0.90
        vpd_max_kpa: 1.10
        temp_min_c: 22.0
        temp_max_c: 26.0
        rh_min_pct: 55
        rh_max_pct: 65
        dli_target: 35.0
        photoperiod_hrs: 18.0
        notes: Ramp EC before flip
      - stage: early_flower
