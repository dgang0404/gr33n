application_recipes:
  - seed_name: "JMS Soil Drench"
    target_application_type: soil_drench
    dilution: "1:10 (JMS:water)"
    components: ["JMS (JADAM Microbial Solution)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "JLF General Soil Drench"
    target_application_type: soil_drench
    dilution: "1:20 (JLF:water); start 1:100 if unsure"
    components: ["JLF General (Weed and Grass)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "JLF Seedling Drench"
    target_application_type: soil_drench
    dilution: "1:30 (JLF:water)"
    components: ["JLF General (Weed and Grass)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "JLF and JMS Combined Drench"
    target_application_type: soil_drench
    dilution: "JLF 1:20 + JMS 1:10 in same water"
    components: ["JLF General (Weed and Grass)", "JMS (JADAM Microbial Solution)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "LAB Soil Conditioner"
    target_application_type: soil_drench
    dilution: "1:1000 (LAB:water)"
    components: ["LAB (Lactic Acid Bacteria Serum)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "OHN Pest and Immunity Drench"
    target_application_type: soil_drench
    dilution: "1:1000 (OHN:water)"
    components: ["OHN (Oriental Herbal Nutrient)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "JMS Foliar Spray"
    target_application_type: foliar_spray
    dilution: "1:20 (JMS:water) + JWA"
    components: ["JMS (JADAM Microbial Solution)", "JWA (JADAM Wetting Agent)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "FPJ Vegetative Foliar"
    target_application_type: foliar_spray
    dilution: "1:500 to 1:1000 (FPJ:water) + JWA"
    components: ["FPJ (Fermented Plant Juice)", "JWA (JADAM Wetting Agent)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "FFJ and WCA Flowering Boost"
    target_application_type: foliar_spray
    dilution: "FFJ 1:500 + WCA 1:1000 + JWA"
    components: ["FFJ (Fermented Fruit Juice)", "WCA (Water-Soluble Calcium)", "JWA (JADAM Wetting Agent)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "BRV and WCA Cell Strengthener"
    target_application_type: foliar_spray
    dilution: "BRV 1:800 + WCA 1:1000"
    components: ["BRV (Brown Rice Vinegar)", "WCA (Water-Soluble Calcium)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "JHS and JWA Natural Pesticide"
    target_application_type: foliar_spray
    dilution: "JHS 1:50 + JWA 1:500"
    components: ["JHS (JADAM Herbal Solution)", "JWA (JADAM Wetting Agent)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "JS Fungicide Spray"
    target_application_type: foliar_spray
    dilution: "0.5-2 L JS concentrate per 500 L water + JWA 1:500"
    components: ["JS (JADAM Sulfur concentrate)", "JWA (JADAM Wetting Agent)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "JLF Foliar Feed"
    target_application_type: foliar_spray
    dilution: "1:30 to 1:50 (JLF:water) + JWA"
    components: ["JLF General (Weed and Grass)", "JWA (JADAM Wetting Agent)"]
    guide: natural-farming-application-recipes.md

  - seed_name: "JWA Insecticide Spray"
    target_application_type: foliar_spray
    dilution: "1:500 (JWA:water)"
    components: ["JWA (JADAM Wetting Agent)"]
    guide: natural-farming-application-recipes.md

# Phase 211 switchover — maps commercial EC programs to natural recipes
commercial_to_natural:
  - commercial: "Daily EC veg feed 1.6–1.8 mS/cm"
    natural_equivalent:
      - recipe: "JLF and JMS Combined Drench"
        frequency: "Weekly peak season"
      - recipe: "JMS Foliar Spray"
        frequency: "Every 1–2 weeks"

  - commercial: "Flower boost A+B"
    natural_equivalent:
      - recipe: "FFJ and WCA Flowering Boost"
        frequency: "Weekly from first buds"

  - commercial: "Seedling/cloner light feed"
    natural_equivalent:
      - recipe: "JLF Seedling Drench"
        frequency: "Weekly through first 2 weeks post-transplant"
      - recipe: "JMS Soil Drench"
        frequency: "Every 2 weeks"
