    process_type: js
    tradition: jadam
    source_tier: cho_named
    schema_category: other_extract
    guide: natural-farming-jwa-js-jhs.md
    reference_source: "JADAM Organic Farming, Youngsang Cho, 2016"

  - seed_name: "JLF General (Weed and Grass)"
    process_type: jlf
