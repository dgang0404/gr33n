# Phase 208 WS3 — machine-readable mirror of master_seed.sql natural farming canon.
# Dilutions post-WS0 audit. Guides in docs/field-guides/natural-farming-*.md
version: 1

inputs:
  - seed_name: "JMS (JADAM Microbial Solution)"
    process_type: jms
    tradition: jadam
    source_tier: cho_named
    schema_category: microbial_inoculant
    guide: natural-farming-jms.md
    reference_source: "JADAM Organic Farming, Youngsang Cho, 2016"

  - seed_name: "LAB (Lactic Acid Bacteria Serum)"
    process_type: lab
    tradition: knf
    source_tier: knf_standard
    schema_category: microbial_inoculant
    guide: natural-farming-lab.md
    reference_source: "KNF (Cho Han-kyu); often used with JADAM"

  - seed_name: "FPJ (Fermented Plant Juice)"
    process_type: fpj
    tradition: knf
    source_tier: knf_standard
    schema_category: fermented_plant_juice
    guide: natural-farming-fpj.md
    reference_source: "KNF (Cho Han-kyu); often used with JADAM"

  - seed_name: "FFJ (Fermented Fruit Juice)"
    process_type: ffj
    tradition: knf
