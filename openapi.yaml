      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /tasks/{id}/labor:
    get:
      tags: [tasks]
      summary: List labor log rows for a task
      description: >
        Phase 20.95 WS1 — labor logging subset. Returns all rows in start-time order.
        Future phases (20.9) will add a timer UI and auto-cost transactions.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of labor log rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TaskLaborLog" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [tasks]
      summary: Append a labor log row and update tasks.time_spent_minutes
      description: >
        On insert the handler updates `tasks.time_spent_minutes` to the SUM of
        surviving log rows (not a delta). Delete re-runs the same running SUM.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskLaborLogCreate" }
      responses:
        "201":
          description: Created labor log row
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskLaborLog" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /labor/{id}:
    delete:
      tags: [tasks]
      summary: Delete a labor log row and recompute tasks.time_spent_minutes
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /tasks/{id}/consumptions:
    get:
      tags: [tasks]
      summary: List auto-logged inventory consumptions for a task
      description: >
        Phase 20.7 WS3 — every POST decrements the referenced input_batch
        and (if the input has a unit_cost) writes a paired cost_transactions
        row via the autologger. DELETE reverses both sides.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of task consumption rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TaskInputConsumption" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [tasks]
      summary: Record inventory consumption against a task (autologged cost)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskInputConsumptionCreate" }
      responses:
        "201":
          description: Created consumption row (cost_transaction_id populated when the input has a unit_cost)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskInputConsumption" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /consumptions/{id}:
    delete:
      tags: [tasks]
      summary: Delete a task consumption row and reverse the autologged cost
      description: >
        Credits the input_batch and writes a compensating cost_transactions
        row so the ledger stays append-only (net = 0).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

