openapi: "3.0.3"
info:
  title: gr33n API
  version: "0.2.0"
  description: |
    Local-first automated agriculture platform API.
    All endpoints run on localhost:8080 by default.

    **Authentication:**
    - Public routes require no auth.
    - Pi routes require `X-API-Key` header.
    - Dashboard routes require `Authorization: Bearer <JWT>`.
    - In `AUTH_MODE=dev` (dev-tagged build only), auth is bypassed.
    - `AUTH_MODE=auth_test` enforces the same auth as production on a dev-tagged build only.
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: health
    description: API and database health
  - name: auth
    description: Authentication and password management
  - name: units
    description: Units of measure reference
  - name: farms
    description: Farm management
  - name: zones
    description: Zone management
  - name: sensors
    description: Sensor registry, readings, and live streams
  - name: devices
    description: Device management and control
  - name: actuators
    description: Actuator state and event history
  - name: automation
    description: Schedules, runs, and worker health
  - name: tasks
    description: Task management
  - name: costs
    description: Farm cost and income transactions
  - name: fertigation
    description: Fertigation reservoirs, programs, EC targets, and events
  - name: naturalfarming
    description: Korean Natural Farming (KNF) input definitions and batches
  - name: alerts
    description: Sensor alert notifications and threshold breach tracking
  - name: profiles
    description: User profiles and farm membership management

paths:

  # ── Public ──────────────────────────────────────────────────

  /health:
    get:
      tags: [health]
      summary: Health check
      description: Returns API status and confirms database connectivity.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: gr33n-api }
        "503":
          description: Database unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/login:
    post:
      tags: [auth]
      summary: Login
      description: Authenticate with username/password. Returns a JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/mode:
    get:
      tags: [auth]
      summary: Get authentication mode
      description: Returns current auth mode (dev, auth_test, or production). auth_test is only valid on local dev builds compiled with `-tags dev`.
      responses:
        "200":
          description: Auth mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode: { type: string, enum: [dev, auth_test, production] }

  /auth/password:
    patch:
      tags: [auth]
      summary: Change password
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string, format: password }
                new_password: { type: string, format: password }
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      description: Creates auth.users + profiles row. Invited users (null password) can set password here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password, minLength: 8 }
                full_name: { type: string }
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  expires_in: { type: integer }
                  user_id: { type: string, format: uuid }
        "409":
          description: User already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ── Pi routes (API key) ────────────────────────────────────

  /sensors/{id}/readings:
    get:
      tags: [sensors]
      summary: List sensor readings in a time range
      description: |
        Returns readings from `since` through `until` (inclusive), oldest first.
        Defaults to the last 24 hours. At most `limit` rows (newest within the window).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: since
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Range start (RFC3339). Defaults to 24 hours before `until`.
        - name: until
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Range end (RFC3339). Defaults to now (UTC).
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 5000, default: 500 }
      responses:
        "200":
          description: Readings oldest-first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SensorReading" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [sensors]
      summary: Post a sensor reading (Pi client)
      description: Called by the Raspberry Pi client daemon. Triggers SSE push to connected dashboards.
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SensorReadingCreate" }
            example:
              value_raw: 22.5
              is_valid: true
              battery_level_percent: 87.0
      responses:
        "201":
          description: Reading stored and normalized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SensorReading" }

  /devices/{id}/status:
    patch:
      tags: [devices]
      summary: Update device status (Pi heartbeat)
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: "#/components/schemas/DeviceStatusEnum" }
            example: { status: online }
      responses:
        "200":
          description: Updated device
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Device" }

  # ── Units ──────────────────────────────────────────────────

  /units:
    get:
      tags: [units]
      summary: List all units of measure
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of units
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Unit" }

  # ── Farms ──────────────────────────────────────────────────

  /farms:
    get:
      tags: [farms]
      summary: List farms for a user
      security: [{ bearerAuth: [] }]
      parameters:
        - name: user_id
          in: query
          required: false
          schema: { type: string, format: uuid }
          description: Filter by user membership. Omit to list all farms.
      responses:
        "200":
          description: List of farms
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Farm" }
    post:
      tags: [farms]
      summary: Create a farm
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FarmCreate" }
      responses:
        "201":
          description: Created farm
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Farm" }

  /farms/{id}:
    get:
      tags: [farms]
      summary: Get farm by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Farm object
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Farm" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [farms]
      summary: Update a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FarmUpdate" }
      responses:
        "200":
          description: Updated farm
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Farm" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [farms]
      summary: Soft-delete a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                updated_by_user_id: { type: string, format: uuid }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /farms/{id}/zones:
    get:
      tags: [zones]
      summary: List zones for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of zones
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Zone" }
    post:
      tags: [zones]
      summary: Create a zone
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ZoneCreate" }
      responses:
        "201":
          description: Created zone
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Zone" }

  /zones/{id}:
    get:
      tags: [zones]
      summary: Get zone by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Zone object
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Zone" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [zones]
      summary: Update a zone
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ZoneUpdate" }
      responses:
        "200":
          description: Updated zone
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Zone" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [zones]
      summary: Soft-delete a zone
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Sensors ────────────────────────────────────────────────

  /farms/{id}/sensors:
    get:
      tags: [sensors]
      summary: List sensors for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of sensors
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Sensor" }
    post:
      tags: [sensors]
      summary: Register a new sensor
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SensorCreate" }
      responses:
        "201":
          description: Created sensor
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sensor" }

  /sensors/{id}:
    get:
      tags: [sensors]
      summary: Get sensor by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Sensor object
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sensor" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [sensors]
      summary: Soft-delete a sensor
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /sensors/{id}/readings/stats:
    get:
      tags: [sensors]
      summary: Aggregate stats for sensor readings in a time range
      description: Defaults to the last 24 hours if `since` / `until` are omitted.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: since
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: until
          in: query
          required: false
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Aggregates for the window
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SensorReadingStats" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /sensors/{id}/readings/latest:
    get:
      tags: [sensors]
      summary: Get latest reading for a sensor
      description: Returns 404 if the sensor has no readings yet.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Latest sensor reading
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SensorReading" }
        "404":
          description: No readings yet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/sensors/stream:
    get:
      tags: [sensors]
      summary: SSE stream of live sensor readings
      description: |
        Server-Sent Events endpoint. Pushes `readings` events containing a map
        of sensor_id → latest reading. Fires on new data ingestion and every 10s.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: token
          in: query
          required: false
          schema: { type: string }
          description: JWT fallback for EventSource clients that cannot set Authorization headers.
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: "event: readings\\ndata: {sensor_id: reading, ...}"

  # ── Devices ────────────────────────────────────────────────

  /farms/{id}/devices:
    get:
      tags: [devices]
      summary: List devices for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Device" }
    post:
      tags: [devices]
      summary: Register a new device
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceCreate" }
      responses:
        "201":
          description: Created device
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Device" }

  /devices/{id}:
    get:
      tags: [devices]
      summary: Get device by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Device object
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Device" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [devices]
      summary: Soft-delete a device
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /devices/{id}/pending-command:
    delete:
      tags: [devices]
      summary: Clear pending command for a device (Pi)
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Pending command cleared }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ── Actuators ──────────────────────────────────────────────

  /farms/{id}/actuators:
    get:
      tags: [actuators]
      summary: List actuators for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of actuators
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Actuator" }

  /actuators/{id}/state:
    patch:
      tags: [actuators]
      summary: Update actuator state
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state_text: { type: string }
                state_numeric: { type: number, nullable: true }
      responses:
        "200":
          description: Updated actuator
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Actuator" }

  /actuators/{id}/events:
    get:
      tags: [actuators]
      summary: List actuator events
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: since
          in: query
          schema: { type: string, format: date-time }
          description: Only events after this time (default 24h ago)
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: List of actuator events
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActuatorEvent" }
    post:
      tags: [actuators]
      summary: Record an actuator event (Pi)
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command_sent]
              properties:
                command_sent: { type: string }
                source:
                  type: string
                  enum:
                    - manual_ui_input
                    - manual_api_call
                    - schedule_trigger
                    - automation_rule_trigger
                    - device_internal_feedback_loop
                    - system_initialization_routine
                    - emergency_stop_signal
                  default: manual_api_call
                event_time: { type: string, format: date-time }
                execution_status:
                  type: string
                  enum:
                    - command_sent_to_device
                    - acknowledged_by_device
                    - execution_started_on_device
                    - execution_completed_success_on_device
                    - execution_completed_with_error_on_device
                    - execution_failed_to_start_on_device
                    - pending_confirmation_from_feedback
                    - timeout_waiting_for_acknowledgement
                    - cancelled_by_user_or_system
                  default: command_sent_to_device
                triggered_by_schedule_id: { type: integer, nullable: true }
      responses:
        "201":
          description: Created actuator event
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActuatorEvent" }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ── Natural Farming ───────────────────────────────────────

  /farms/{id}/naturalfarming/inputs:
    get:
      tags: [naturalfarming]
      summary: List natural farming input definitions for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of input definitions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NaturalFarmingInputDefinition" }
    post:
      tags: [naturalfarming]
      summary: Create a natural farming input definition
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InputDefinitionCreate" }
      responses:
        "201":
          description: Created input definition
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NaturalFarmingInputDefinition" }

  /naturalfarming/inputs/{id}:
    put:
      tags: [naturalfarming]
      summary: Update a natural farming input definition
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InputDefinitionUpdate" }
      responses:
        "200":
          description: Updated input definition
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NaturalFarmingInputDefinition" }
    delete:
      tags: [naturalfarming]
      summary: Soft-delete a natural farming input definition
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /farms/{id}/naturalfarming/batches:
    get:
      tags: [naturalfarming]
      summary: List natural farming input batches for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of input batches
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NaturalFarmingInputBatch" }
    post:
      tags: [naturalfarming]
      summary: Create a natural farming input batch
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InputBatchCreate" }
      responses:
        "201":
          description: Created input batch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NaturalFarmingInputBatch" }

  /naturalfarming/batches/{id}:
    put:
      tags: [naturalfarming]
      summary: Update a natural farming input batch
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InputBatchUpdate" }
      responses:
        "200":
          description: Updated input batch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NaturalFarmingInputBatch" }
    delete:
      tags: [naturalfarming]
      summary: Soft-delete a natural farming input batch
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /farms/{id}/naturalfarming/recipes:
    get:
      tags: [naturalfarming]
      summary: List application recipes for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApplicationRecipe" }
    post:
      tags: [naturalfarming]
      summary: Create application recipe
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApplicationRecipeCreate" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApplicationRecipe" }

