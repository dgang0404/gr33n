    get:
      tags: [animals]
      summary: List animal groups for a farm
      description: >-
        Returns active + archived groups (soft-deleted rows are excluded).
        Sorted by `active` desc, then label.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Animal groups
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AnimalGroup" }
    post:
      tags: [animals]
      summary: Create an animal group
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnimalGroupCreate" }
      responses:
        "201":
          description: Created animal group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnimalGroup" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /animal-groups/{id}:
    get:
      tags: [animals]
      summary: Get an animal group by ID
      description: >-
        Response includes the group row plus `delta_total`, the signed sum of
        `delta_count` across all lifecycle events (UI reconciliation aid).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Animal group with delta total
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnimalGroupDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [animals]
      summary: Update an animal group
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnimalGroupCreate" }
      responses:
        "200":
          description: Updated animal group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnimalGroup" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [animals]
      summary: Soft-delete an animal group
      description: >-
        Use `PATCH /animal-groups/{id}/archive` to preserve lifecycle history;
        delete is for mistake-entry cleanup.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /animal-groups/{id}/archive:
    patch:
      tags: [animals]
      summary: Archive an animal group
      description: >-
        Marks the group `active=false` with `archived_at=NOW()` and an optional
        reason. Lifecycle history is preserved; the row still appears in listings
        but with active=false so the UI can filter it out by default.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                archived_reason: { type: string, nullable: true }
      responses:
        "200":
          description: Archived animal group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnimalGroup" }
        "404": { $ref: "#/components/responses/NotFound" }

  /animal-groups/{id}/lifecycle-events:
    get:
      tags: [animals]
      summary: List lifecycle events for an animal group
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Lifecycle events (newest first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AnimalLifecycleEvent" }
    post:
      tags: [animals]
      summary: Record a lifecycle event
      description: >-
        `event_type` is freeform (e.g. `added`, `born`, `died`, `sold`,
        `culled`, `health_event`, `weight_check`, `note`). `delta_count` is
        signed (+ for added/born, - for died/sold/culled, null for notes).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnimalLifecycleEventCreate" }
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnimalLifecycleEvent" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /lifecycle-events/{id}:
    delete:
      tags: [animals]
      summary: Delete a lifecycle event
      description: >-
        Prefer appending a compensating event (e.g. a `+1 born` to cancel a
        mistaken `-1 died`). Delete is for true mistake-entry cleanup.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /farms/{id}/aquaponics-loops:
    get:
      tags: [aquaponics]
      summary: List aquaponics loops for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Aquaponics loops
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AquaponicsLoop" }
    post:
      tags: [aquaponics]
      summary: Create an aquaponics loop
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AquaponicsLoopCreate" }
      responses:
        "201":
          description: Created loop
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AquaponicsLoop" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /aquaponics-loops/{id}:
    get:
      tags: [aquaponics]
      summary: Get an aquaponics loop by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Aquaponics loop
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AquaponicsLoop" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [aquaponics]
      summary: Update an aquaponics loop
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AquaponicsLoopUpdate" }
      responses:
        "200":
          description: Updated loop
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AquaponicsLoop" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [aquaponics]
      summary: Soft-delete an aquaponics loop
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /farms/{id}/costs/summary:
    get:
      tags: [costs]
      summary: Income, expenses, and net for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostSummary" }

  /crop-cycles/{id}/cost-summary:
    get:
      tags: [costs]
      summary: Per-category cost totals for a specific crop cycle
      description: >
        Phase 20.7 WS6 — the first RAG-precursor view. Aggregates every
        cost_transactions row where crop_cycle_id = the path id (set by
        autologger at write time or manually on legacy rows).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  crop_cycle_id: { type: integer, format: int64 }
                  farm_id: { type: integer, format: int64 }
                  total_income: { type: number }
                  total_expenses: { type: number }
                  net: { type: number }
                  category_totals:
                    type: array
                    items:
                      type: object
                      properties:
                        category: { type: string }
                        currency: { type: string }
                        income: { type: number }
                        expense: { type: number }
                        net: { type: number }
                        tx_count: { type: integer, format: int64 }
        "404": { $ref: "#/components/responses/NotFound" }

  /farms/{id}/costs/export:
    get:
      tags: [costs]
      summary: Download farm cost transactions as CSV, GL-friendly CSV, or category summary CSV (tax/workpaper)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: format
          in: query
          schema: { type: string, enum: [csv, gl_csv, summary_csv], default: csv }
        - name: year
          in: query
          description: Calendar year filter for summary_csv only (omit for all-time totals)
          schema: { type: integer, minimum: 1900, maximum: 2100 }
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema: { type: string, format: binary }

  /farms/{id}/finance/coa-mappings:
    get:
      tags: [costs]
      summary: List farm chart-of-accounts mapping used for GL export
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CoaMapping" }
    put:
      tags: [costs]
      summary: Save farm chart-of-accounts mapping overrides
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mappings]
              properties:
                mappings:
                  type: array
                  items: { $ref: "#/components/schemas/CoaMappingUpsert" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CoaMapping" }
    delete:
      tags: [costs]
      summary: Reset all farm chart-of-accounts mapping overrides to defaults
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CoaMapping" }

  /farms/{id}/finance/coa-mappings/{category}:
    delete:
      tags: [costs]
      summary: Reset one farm chart-of-accounts category override to default
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: category
          in: path
          required: true
          schema: { $ref: "#/components/schemas/CostCategoryEnum" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CoaMapping" }

  /farms/{id}/costs:
    get:
      tags: [costs]
      summary: List cost transactions
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CostTransaction" }
    post:
      tags: [costs]
      summary: Create cost transaction
      description: >
        Optional `Idempotency-Key` (client-generated UUID recommended) makes creates safe to retry:
        duplicate requests with the same key return `200` and the original row. Used by the PWA offline cost queue.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string, maxLength: 128 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CostTransactionCreate" }
      responses:
        "200":
          description: Same cost as an earlier request with this idempotency key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostTransaction" }
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostTransaction" }

  /costs/{id}:
    put:
      tags: [costs]
      summary: Update cost transaction
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CostTransactionUpdate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostTransaction" }
    delete:
      tags: [costs]
      summary: Delete cost transaction
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /farms/{id}/energy-prices:
    get:
      tags: [costs]
      summary: List electricity price history for this farm
      description: >
        Phase 20.95 WS2 — the forthcoming Phase 20.7 WS4 rollup reads this table to
        convert actuator runtime into cost_transactions rows.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FarmEnergyPrice" }
    post:
      tags: [costs]
      summary: Create an electricity price record
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FarmEnergyPriceCreate" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FarmEnergyPrice" }

  /energy-prices/{id}:
    put:
      tags: [costs]
      summary: Update an electricity price record
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FarmEnergyPriceUpdate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FarmEnergyPrice" }
    delete:
      tags: [costs]
      summary: Delete an electricity price record
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /farms/{id}/setpoints:
    get:
      tags: [automation]
      summary: List stage-scoped setpoints for a farm (Phase 20.6)
      description: >
        Optional query filters: zone_id, crop_cycle_id, sensor_type. When a rule
        or UI needs to resolve "what setpoint applies right now?", the server
        chooses by precedence: cycle+stage > cycle-any-stage > zone+stage >
        zone-any-stage. See `/setpoints/{id}` for per-row CRUD.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - in: query
          name: zone_id
          schema: { type: integer, format: int64 }
        - in: query
          name: crop_cycle_id
          schema: { type: integer, format: int64 }
        - in: query
          name: sensor_type
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Setpoint" }
    post:
      tags: [automation]
      summary: Create a stage-scoped setpoint
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetpointCreate" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Setpoint" }

  /setpoints/{id}:
    get:
      tags: [automation]
      summary: Get a single setpoint
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Setpoint" }
    put:
      tags: [automation]
      summary: Update a setpoint (full replace of writable fields)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetpointUpdate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Setpoint" }
    delete:
      tags: [automation]
      summary: Delete a setpoint
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /farms/{id}/cost-receipts:
    post:
      tags: [costs]
      summary: Upload a cost receipt (multipart); optional cost_transaction_id links to existing row
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
            multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                cost_transaction_id:
                  type: integer
                  description: When set, attaches receipt to this cost (same farm)
      responses:
        "201":
          description: File attachment created (and cost updated when cost_transaction_id sent)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /file-attachments/{id}/content:
    get:
      tags: [costs]
      summary: Download attachment bytes (cost receipt or zone photo)
      description: >
        Streams attachment content. Cost receipts require cost read on the farm;
        zone reference photos (`file_type=zone_photo`) require farm membership.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: File stream
          content:
            application/octet-stream:
              schema: { type: string, format: binary }

  /file-attachments/{id}/download:
    get:
      tags: [costs]
      summary: Resolve a receipt download target (presigned URL for object storage, proxied API URL for local storage)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Receipt download target
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileAttachmentDownloadTarget" }

  /farms/{id}/insert-commons/opt-in:
    patch:
      tags: [farms]
      summary: Enable or disable Insert Commons anonymized sharing (farm admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [insert_commons_opt_in]
              properties:
                insert_commons_opt_in: { type: boolean }
                insert_commons_require_approval:
                  type: boolean
                  description: When true and opt-in is on, sync payloads are queued for farm-admin approval before POST to ingest. Omitted leaves the current farm setting unchanged.
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Farm" }

  /farms/{id}/insert-commons/preview:
    get:
      tags: [farms]
      summary: Preview Insert Commons ingest JSON (farm admin; read-only)
      description: >
        Builds the same validated aggregate payload as `POST .../insert-commons/sync` would send,
        without recording a sync attempt, queueing an approval bundle, or POSTing to the ingest URL.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Preview payload (valid after successful build)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InsertCommonsPreviewResponse" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/insert-commons/sync:
    post:
      tags: [farms]
      summary: Sync anonymized aggregates to Insert Commons (optional HTTP ingest) with idempotency, optional approval queue, and backoff
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                idempotency_key: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InsertCommonsSyncResponse" }
        "429":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/audit-events:
    get:
      tags: [farms]
      summary: List sensitive-action audit events for a farm (owner or manager only)
      description: >
        Append-only trail for governance and compliance-sensitive operations (membership,
        Insert Commons opt-in and sync, finance COA mappings, cost exports, receipt access, etc.).
        Details JSON shape varies by event kind.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: Audit events newest-first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditActivityEvent" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/rag/search:
    get:
      tags: [rag]
      summary: Semantic search over embedded farm chunks (query string)
      description: >
        Requires `EMBEDDING_API_KEY` on the API server. Embeds `q` with the same model as ingestion,
        then runs pgvector similarity restricted to this farm. Optional `module` filters `metadata.module`
        (e.g. `core`, `automation`). `since` / `until` filter chunk `created_at` (RFC3339).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: q
          in: query
          required: true
          schema: { type: string }
          description: Natural-language search query
        - name: module
          in: query
          schema: { type: string }
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: until
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
      responses:
        "200":
          description: Ranked chunks (cosine distance; lower is closer for `<=>`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RagSearchResponse" }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: RAG not configured (missing embedding credentials)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          description: Embedding provider error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      tags: [rag]
      summary: Semantic search over embedded farm chunks (JSON body)
      description: Same behavior as GET; use for longer queries.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RagSearchRequest" }
      responses:
        "200":
          description: Ranked chunks
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RagSearchResponse" }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: RAG not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          description: Embedding provider error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/rag/answer:
    post:
      tags: [rag]
      summary: Retrieve context chunks then synthesize an answer with citations (optional LLM)
      description: >
        Requires `EMBEDDING_API_KEY` plus `LLM_BASE_URL` and `LLM_MODEL`. Performs the same filtered vector
        retrieval as `/rag/search`, then calls an OpenAI-compatible chat completion (`/v1/chat/completions`).
        The model must cite sources using bracket numbers [1], [2] matching the numbered context blocks.
        Rate limited per deployment (`RAG_SYNTHESIS_MAX_PER_MINUTE`, default 30). Use a local gateway
        (e.g. LM Studio) or a vetted cloud endpoint per your threat model.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RagAnswerRequest" }
      responses:
        "200":
          description: Answer text and grounded citations (chunk excerpts)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RagAnswerResponse" }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: Synthesis rate limit exceeded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: Embedding or LLM not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          description: Embedding retrieval or LLM provider error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/insert-commons/sync-events:
    get:
      tags: [farms]
