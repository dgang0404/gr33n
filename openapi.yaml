        "400": { $ref: "#/components/responses/BadRequest" }

  /lifecycle-events/{id}:
    delete:
      tags: [animals]
      summary: Delete a lifecycle event
      description: >-
        Prefer appending a compensating event (e.g. a `+1 born` to cancel a
        mistaken `-1 died`). Delete is for true mistake-entry cleanup.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
