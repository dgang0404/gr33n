    post:
      tags: [automation]
      summary: Apply greenhouse climate rule templates (Phase 36)
      description: >
        Clones inactive automation rules for high lux (deploy shade), high temp
        (exhaust fan on), and night retract (temp proxy) for a zone. Pass null
        for optional actuator/sensor ids to skip that rule family. Rules are
        created with `is_active=false`; enable and tune on `/automation`.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
