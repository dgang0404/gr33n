        ph_value: { type: number, nullable: true }
        ec_value_ms_cm: { type: number, nullable: true }
        temperature_during_making: { type: string, nullable: true }
        ingredients_used: { type: string, nullable: true }
        procedure_followed: { type: string, nullable: true }
        observations_notes: { type: string, nullable: true }
        made_by_user_id: { type: string, format: uuid, nullable: true }
        related_task_id: { type: integer, nullable: true }
        file_attachment_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        updated_by_user_id: { type: string, format: uuid, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true }

    # ── Alert schemas ──────────────────────────────────────────

    Alert:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        recipient_user_id: { type: string, format: uuid, nullable: true }
        triggering_event_source_type: { type: string, nullable: true }
        triggering_event_source_id: { type: integer, nullable: true }
        severity:
          type: string
          enum: [low, medium, high, critical]
        subject_rendered: { type: string, nullable: true }
        message_text_rendered: { type: string, nullable: true }
        status:
          type: string
          enum: [pending, queued, sent, delivered, failed_to_send, read_by_user, acknowledged_by_user, archived_by_user, system_cleared]
        is_read: { type: boolean }
        read_at: { type: string, format: date-time, nullable: true }
        is_acknowledged: { type: boolean }
        acknowledged_at: { type: string, format: date-time, nullable: true }
        acknowledged_by_user_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    # ── Profile & membership schemas ───────────────────────────

    Profile:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        full_name: { type: string, nullable: true }
        email: { type: string }
        avatar_url: { type: string, nullable: true }
        role:
          type: string
          enum: [admin, farm_manager, operator, viewer, gr33n_system_admin, user]
        preferences: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProfileUpdate:
      type: object
      properties:
        full_name: { type: string }
        avatar_url: { type: string }
        preferences: { type: object }

    FarmMember:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        full_name: { type: string, nullable: true }
        email: { type: string }
        avatar_url: { type: string, nullable: true }
        role_in_farm:
          type: string
          enum: [owner, manager, operator, viewer]
        permissions: { type: object }
        joined_at: { type: string, format: date-time }

    FarmMemberCreate:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        role_in_farm:
          type: string
          enum: [owner, manager, operator, viewer]
          default: viewer
        full_name: { type: string }

    FarmMembership:
      type: object
      properties:
        farm_id: { type: integer }
        user_id: { type: string, format: uuid }
        role_in_farm:
          type: string
          enum: [owner, manager, operator, viewer]
        permissions: { type: object }
        joined_at: { type: string, format: date-time }
