    get:
      tags: [animals]
      summary: List lifecycle events for an animal group
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Lifecycle events (newest first)
          content:
