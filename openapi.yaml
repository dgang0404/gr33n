            application/json:
              schema: { $ref: "#/components/schemas/AquaponicsLoop" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [aquaponics]
      summary: Soft-delete an aquaponics loop
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /farms/{id}/costs/summary:
    get:
      tags: [costs]
      summary: Income, expenses, and net for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostSummary" }

  /crop-cycles/{id}/cost-summary:
    get:
      tags: [costs]
      summary: Per-category cost totals for a specific crop cycle
      description: >
        Phase 20.7 WS6 — the first RAG-precursor view. Aggregates every
        cost_transactions row where crop_cycle_id = the path id (set by
        autologger at write time or manually on legacy rows).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  crop_cycle_id: { type: integer, format: int64 }
                  farm_id: { type: integer, format: int64 }
                  total_income: { type: number }
                  total_expenses: { type: number }
                  net: { type: number }
                  category_totals:
                    type: array
                    items:
                      type: object
                      properties:
                        category: { type: string }
                        currency: { type: string }
                        income: { type: number }
                        expense: { type: number }
                        net: { type: number }
                        tx_count: { type: integer, format: int64 }
        "404": { $ref: "#/components/responses/NotFound" }

  /farms/{id}/costs/export:
    get:
      tags: [costs]
      summary: Download farm cost transactions as CSV, GL-friendly CSV, or category summary CSV (tax/workpaper)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: format
          in: query
          schema: { type: string, enum: [csv, gl_csv, summary_csv], default: csv }
        - name: year
          in: query
          description: Calendar year filter for summary_csv only (omit for all-time totals)
          schema: { type: integer, minimum: 1900, maximum: 2100 }
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema: { type: string, format: binary }

  /farms/{id}/finance/coa-mappings:
    get:
      tags: [costs]
      summary: List farm chart-of-accounts mapping used for GL export
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CoaMapping" }
    put:
      tags: [costs]
      summary: Save farm chart-of-accounts mapping overrides
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mappings]
              properties:
                mappings:
                  type: array
                  items: { $ref: "#/components/schemas/CoaMappingUpsert" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CoaMapping" }
    delete:
      tags: [costs]
      summary: Reset all farm chart-of-accounts mapping overrides to defaults
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CoaMapping" }

  /farms/{id}/finance/coa-mappings/{category}:
    delete:
      tags: [costs]
      summary: Reset one farm chart-of-accounts category override to default
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: category
          in: path
          required: true
          schema: { $ref: "#/components/schemas/CostCategoryEnum" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CoaMapping" }

  /farms/{id}/costs:
    get:
      tags: [costs]
      summary: List cost transactions
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CostTransaction" }
    post:
      tags: [costs]
      summary: Create cost transaction
      description: >
        Optional `Idempotency-Key` (client-generated UUID recommended) makes creates safe to retry:
        duplicate requests with the same key return `200` and the original row. Used by the PWA offline cost queue.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string, maxLength: 128 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CostTransactionCreate" }
      responses:
        "200":
          description: Same cost as an earlier request with this idempotency key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostTransaction" }
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostTransaction" }

  /costs/{id}:
    put:
      tags: [costs]
      summary: Update cost transaction
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CostTransactionUpdate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostTransaction" }
    delete:
      tags: [costs]
      summary: Delete cost transaction
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /farms/{id}/energy-prices:
    get:
      tags: [costs]
      summary: List electricity price history for this farm
      description: >
        Phase 20.95 WS2 — the forthcoming Phase 20.7 WS4 rollup reads this table to
        convert actuator runtime into cost_transactions rows.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FarmEnergyPrice" }
    post:
      tags: [costs]
      summary: Create an electricity price record
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FarmEnergyPriceCreate" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FarmEnergyPrice" }

  /energy-prices/{id}:
    put:
      tags: [costs]
      summary: Update an electricity price record
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FarmEnergyPriceUpdate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FarmEnergyPrice" }
    delete:
      tags: [costs]
      summary: Delete an electricity price record
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /farms/{id}/setpoints:
    get:
      tags: [automation]
      summary: List stage-scoped setpoints for a farm (Phase 20.6)
      description: >
        Optional query filters: zone_id, crop_cycle_id, sensor_type. When a rule
        or UI needs to resolve "what setpoint applies right now?", the server
        chooses by precedence: cycle+stage > cycle-any-stage > zone+stage >
        zone-any-stage. See `/setpoints/{id}` for per-row CRUD.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - in: query
          name: zone_id
          schema: { type: integer, format: int64 }
        - in: query
          name: crop_cycle_id
          schema: { type: integer, format: int64 }
        - in: query
          name: sensor_type
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Setpoint" }
    post:
      tags: [automation]
      summary: Create a stage-scoped setpoint
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetpointCreate" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Setpoint" }

  /setpoints/{id}:
    get:
      tags: [automation]
      summary: Get a single setpoint
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Setpoint" }
    put:
      tags: [automation]
      summary: Update a setpoint (full replace of writable fields)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetpointUpdate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Setpoint" }
    delete:
      tags: [automation]
      summary: Delete a setpoint
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /farms/{id}/cost-receipts:
    post:
      tags: [costs]
      summary: Upload a cost receipt (multipart); optional cost_transaction_id links to existing row
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
            multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                cost_transaction_id:
                  type: integer
                  description: When set, attaches receipt to this cost (same farm)
      responses:
        "201":
          description: File attachment created (and cost updated when cost_transaction_id sent)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /file-attachments/{id}/content:
    get:
      tags: [costs]
      summary: Download receipt bytes (requires cost read role on attachment farm)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: File stream
          content:
            application/octet-stream:
              schema: { type: string, format: binary }

  /file-attachments/{id}/download:
    get:
      tags: [costs]
      summary: Resolve a receipt download target (presigned URL for object storage, proxied API URL for local storage)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Receipt download target
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileAttachmentDownloadTarget" }

  /farms/{id}/insert-commons/opt-in:
    patch:
      tags: [farms]
      summary: Enable or disable Insert Commons anonymized sharing (farm admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [insert_commons_opt_in]
              properties:
                insert_commons_opt_in: { type: boolean }
                insert_commons_require_approval:
                  type: boolean
                  description: When true and opt-in is on, sync payloads are queued for farm-admin approval before POST to ingest. Omitted leaves the current farm setting unchanged.
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Farm" }

  /farms/{id}/insert-commons/preview:
    get:
      tags: [farms]
      summary: Preview Insert Commons ingest JSON (farm admin; read-only)
      description: >
        Builds the same validated aggregate payload as `POST .../insert-commons/sync` would send,
        without recording a sync attempt, queueing an approval bundle, or POSTing to the ingest URL.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Preview payload (valid after successful build)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InsertCommonsPreviewResponse" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/insert-commons/sync:
    post:
      tags: [farms]
      summary: Sync anonymized aggregates to Insert Commons (optional HTTP ingest) with idempotency, optional approval queue, and backoff
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                idempotency_key: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InsertCommonsSyncResponse" }
        "429":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/audit-events:
    get:
      tags: [farms]
      summary: List sensitive-action audit events for a farm (owner or manager only)
      description: >
        Append-only trail for governance and compliance-sensitive operations (membership,
        Insert Commons opt-in and sync, finance COA mappings, cost exports, receipt access, etc.).
        Details JSON shape varies by event kind.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: Audit events newest-first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditActivityEvent" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/insert-commons/sync-events:
    get:
      tags: [farms]
      summary: List recent Insert Commons sync attempts for a farm (admin or finance)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: limit
          in: query
          schema: { type: integer, default: 25, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InsertCommonsSyncEvent" }

  /farms/{id}/insert-commons/bundles:
    get:
      tags: [farms]
      summary: List Insert Commons bundles for a farm (admin or cost edit)
      description: Filter by bundle status; omit status to return all.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: status
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 25, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InsertCommonsBundle" }

  /farms/{id}/insert-commons/bundles/{bundle_id}/approve:
    post:
      tags: [farms]
      summary: Approve a pending Insert Commons bundle and deliver to ingest (farm admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: bundle_id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InsertCommonsBundleDeliveryResult" }
        "429":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/insert-commons/bundles/{bundle_id}/reject:
    post:
      tags: [farms]
      summary: Reject a pending Insert Commons bundle (farm admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: bundle_id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InsertCommonsBundle" }

  /farms/{id}/insert-commons/bundles/{bundle_id}/deliver:
    post:
      tags: [farms]
      summary: Retry delivery for a bundle in delivery_failed state (farm admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: bundle_id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InsertCommonsBundleDeliveryResult" }
        "429":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/insert-commons/bundles/{bundle_id}/export:
    get:
      tags: [farms]
      summary: Download bundle JSON for review or archival (admin or cost edit)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: bundle_id
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: format
          in: query
          description: ingest = raw payload sent to receiver; package_v1 = wrapped export with metadata
          schema:
            type: string
            enum: [ingest, package_v1]
            default: ingest
      responses:
        "200":
          description: JSON attachment
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  # ── Alerts ──────────────────────────────────────────────────

  /farms/{id}/alerts:
    get:
      tags: [alerts]
      summary: List alerts for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Alert" }

  /farms/{id}/alerts/unread-count:
    get:
      tags: [alerts]
      summary: Count unread alerts for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Unread alert count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread_count: { type: integer }

  /alerts/{id}/read:
    patch:
      tags: [alerts]
      summary: Mark an alert as read
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Alert" }

  /alerts/{id}/acknowledge:
    patch:
      tags: [alerts]
      summary: Acknowledge an alert
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Alert" }

  /alerts/{id}/create-task:
    post:
      tags: [alerts]
      summary: Create a task from an alert
      description: >
        Synthesises a task from the alert (title, description, priority,
        zone) and links the resulting task back to the alert via
        `source_alert_id`. Body is optional — any provided field overrides
        the derived default.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskFromAlert" }
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  # ── Profiles & farm members ────────────────────────────────

  /profile:
    get:
      tags: [profiles]
      summary: Get current user's profile
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [profiles]
      summary: Update current user's profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileUpdate" }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }

  /profile/notification-preferences:
    get:
      tags: [profiles]
      summary: Get notification preferences (volume / push opt-in)
      description: |
        Returns merged defaults plus `profiles.preferences.notify` (`push_enabled`, `min_priority`).
        Only farm roles **owner**, **manager**, and **operator** are eligible for farm alert push.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Effective notification preferences
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationPreferences" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [profiles]
      summary: Update notification preferences
      description: Merges into `profiles.preferences.notify` without removing other preference keys.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationPreferencesPatch" }
      responses:
        "200":
          description: Updated effective preferences
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationPreferences" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /profile/push-tokens:
    get:
      tags: [profiles]
      summary: List FCM device tokens for the current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Registered tokens (newest first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserPushToken" }
    post:
      tags: [profiles]
      summary: Register or refresh an FCM device token
      description: Upserts by `fcm_token` so a token moves cleanly to a new user/device owner.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushTokenRegister" }
      responses:
        "200":
          description: Upserted token row
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPushToken" }
        "400": { $ref: "#/components/responses/BadRequest" }
    delete:
      tags: [profiles]
      summary: Remove one FCM device token
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushTokenDelete" }
      responses:
        "204":
          description: Token removed (or was not present)

  /farms/{id}/members:
    get:
      tags: [profiles]
      summary: List members of a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of farm members
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FarmMember" }
    post:
      tags: [profiles]
      summary: Add a member to a farm (invite)
      description: If the user does not exist, creates auth.users + profiles row with null password. The invited user can set their password via POST /auth/register.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FarmMemberCreate" }
      responses:
        "201":
          description: Created farm membership
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FarmMembership" }

  /farms/{id}/members/{uid}/role:
    patch:
      tags: [profiles]
      summary: Update a member's role in a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: uid
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_in_farm]
              properties:
                role_in_farm:
                  type: string
                  enum: [owner, manager, operator, viewer]
      responses:
        "200":
          description: Updated membership
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FarmMembership" }

  /farms/{id}/members/{uid}:
    delete:
      tags: [profiles]
      summary: Remove a member from a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: uid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Removed }

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    ResourceID:
      name: rid
      in: path
      required: true
      schema: { type: integer, format: int64 }

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:

    Error:
      type: object
      properties:
        error: { type: string }

    FileAttachmentDownloadTarget:
      type: object
      required: [url, backend, proxied, file_name]
      properties:
        url: { type: string }
        backend: { type: string, example: local }
        proxied: { type: boolean }
        expires_at: { type: string, format: date-time, nullable: true }
        file_name: { type: string }

    Unit:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, example: celsius }
        unit_type: { type: string, example: temperature }
        symbol: { type: string, example: "C" }
        base_unit_name: { type: string }
        conversion_to_base: { type: number }
        is_base_unit: { type: boolean }

    Farm:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, example: gr33n Demo Farm }
        description: { type: string }
        location_text: { type: string }
        farm_type: { type: string }
        scale_tier: { type: string, enum: [small, medium, large, enterprise] }
        operational_status: { type: string }
        timezone: { type: string, example: UTC }
        currency: { type: string, example: USD }
        organization_id: { type: integer, nullable: true, description: Optional parent organization for multi-farm tenancy }
        created_at: { type: string, format: date-time }
        insert_commons_opt_in: { type: boolean }
        insert_commons_require_approval: { type: boolean, description: When true, manual sync queues payloads until a farm admin approves }
        insert_commons_last_sync_at: { type: string, format: date-time, nullable: true }
        insert_commons_last_attempt_at: { type: string, format: date-time, nullable: true }
        insert_commons_last_delivery_status: { type: string, nullable: true }
        insert_commons_last_error: { type: string, nullable: true }
        insert_commons_backoff_until: { type: string, format: date-time, nullable: true }
        insert_commons_consecutive_failures: { type: integer }

    InsertCommonsSyncResponse:
      type: object
      properties:
        ok: { type: boolean }
        duplicate: { type: boolean }
        farm_id: { type: integer }
        idempotency_key: { type: string }
        delivery_status: { type: string }
        http_status: { type: integer, nullable: true }
        last_sync_at: { type: string, format: date-time, nullable: true }
        last_attempt_at: { type: string, format: date-time, nullable: true }
        backoff_until: { type: string, format: date-time, nullable: true }
        aggregates: { type: object, additionalProperties: true }
        privacy_notice: { type: string }
        receiver_contract: { type: object, additionalProperties: true }
        receiver_error_excerpt: { type: string, nullable: true }
        pending_approval: { type: boolean, description: True when payload is queued for human approval }
        bundle_id: { type: integer, format: int64, nullable: true }

    InsertCommonsPreviewResponse:
      type: object
      required: [valid]
      properties:
        valid: { type: boolean, description: True when payload was built and passed schema validation }
        schema_version: { type: string }
        farm_pseudonym: { type: string }
        generated_at: { type: string, description: RFC3339 timestamp from the preview payload }
        payload:
          type: object
          additionalProperties: true
          description: Full ingest JSON (Insert Commons v1 shape)
        privacy_notice: { type: string }
        receiver_contract: { type: object, additionalProperties: true }

    InsertCommonsSyncEvent:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        idempotency_key: { type: string, nullable: true }
        status: { type: string }
        http_status: { type: integer, nullable: true }
        error: { type: string, nullable: true }
        bundle_id: { type: integer, format: int64, nullable: true }
        created_at: { type: string, format: date-time }

    InsertCommonsBundle:
      type: object
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer }
        idempotency_key: { type: string, nullable: true }
        payload_hash: { type: string }
        status:
          type: string
          enum: [pending_approval, approved, rejected, delivered, delivery_failed]
        reviewer_user_id: { type: string, format: uuid, nullable: true }
        reviewed_at: { type: string, format: date-time, nullable: true }
        review_note: { type: string, nullable: true }
        delivery_http_status: { type: integer, nullable: true }
        delivery_error: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    InsertCommonsBundleDeliveryResult:
      type: object
      properties:
        ok: { type: boolean }
        farm_id: { type: integer }
        bundle_id: { type: integer, format: int64 }
        delivery_status: { type: string }
        http_status: { type: integer, nullable: true }
        last_sync_at: { type: string, format: date-time, nullable: true }
        last_attempt_at: { type: string, format: date-time, nullable: true }
        receiver_error_excerpt: { type: string, nullable: true }

    AuditActivityEvent:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        user_id: { type: string, format: uuid, nullable: true }
        activity_time: { type: string, format: date-time }
        action_type:
          type: string
          description: Matches gr33ncore.user_action_type_enum (e.g. change_setting, export_data, delete_record).
        target_module_schema: { type: string, nullable: true }
        target_table_name: { type: string, nullable: true }
        target_record_id: { type: string, nullable: true }
        target_record_description: { type: string, nullable: true }
        user_agent: { type: string, nullable: true }
        ip_address: { type: string, nullable: true }
        status: { type: string, nullable: true }
        failure_reason: { type: string, nullable: true }
        details: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }

    Zone:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        name: { type: string, example: Veg Room }
        description: { type: string }
        zone_type: { type: string }
        area_sqm: { type: number }
        created_at: { type: string, format: date-time }

    ZoneCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        zone_type: { type: string }
        area_sqm: { type: number }

    ZoneUpdate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        zone_type: { type: string }
        area_sqm: { type: number }
        meta_data: { type: object }
        updated_by_user_id: { type: string, format: uuid }

    FarmCreate:
      type: object
      required: [name, owner_user_id, timezone, currency, operational_status, scale_tier]
      properties:
        name: { type: string, example: My New Farm }
        description: { type: string }
        location_text: { type: string }
        size_hectares: { type: number }
        farm_type: { type: string }
        scale_tier: { type: string, enum: [small, medium, large, enterprise] }
        owner_user_id: { type: string, format: uuid }
        timezone: { type: string, example: UTC }
        currency: { type: string, example: USD }
        operational_status: { type: string }
        organization_id: { type: integer, nullable: true, description: Optional; requires org admin role }
        bootstrap_template:
          type: string
          nullable: true
          description: Optional bootstrap key (`jadam_indoor_photoperiod_v1`, `chicken_coop_v1`, `greenhouse_climate_v1`, `drying_room_v1`, `small_aquaponics_v1`) or `none` / `blank` to skip. Omit for a blank farm response shape.

    FarmCreatedWithBootstrap:
      type: object
      required: [farm, bootstrap]
      properties:
        farm: { $ref: "#/components/schemas/Farm" }
        bootstrap:
          type: object
          additionalProperties: true
          description: Result JSON from apply_farm_bootstrap_template (skipped, applied, already_applied, error, etc.)

    FarmBootstrapApplyResponse:
      type: object
      properties:
        farm_id: { type: integer }
        bootstrap:
          type: object
          additionalProperties: true

    FarmUpdate:
      type: object
      required: [name, timezone, currency, operational_status, scale_tier]
      properties:
        name: { type: string }
        description: { type: string }
        location_text: { type: string }
        size_hectares: { type: number }
        farm_type: { type: string }
        scale_tier: { type: string, enum: [small, medium, large, enterprise] }
        timezone: { type: string }
        currency: { type: string }
        operational_status: { type: string }
        updated_by_user_id: { type: string, format: uuid }
        organization_id: { type: integer, nullable: true }

    FarmOrganizationPatch:
      type: object
      required: [organization_id]
      properties:
        organization_id:
          type: integer
          nullable: true
          description: Organization id to link, or null to unlink

    Organization:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        plan_tier: { type: string, description: Billing / product tier hook (e.g. pilot, standard) }
        billing_status: { type: string, description: e.g. none, trialing, active }
        default_bootstrap_template:
          type: string
          nullable: true
          description: >
            When set, `POST /farms` may apply this template for new farms that set `organization_id` to this org
            and omit `bootstrap_template` (see farm create). Use `null` in PATCH to clear.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    OrganizationWithMembership:
      allOf:
        - { $ref: "#/components/schemas/Organization" }
        - type: object
          required: [role_in_org]
          properties:
            role_in_org: { type: string, enum: [owner, admin, member] }

    OrganizationCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        plan_tier: { type: string }
        billing_status: { type: string }

    OrganizationUpdate:
      type: object
      properties:
        name: { type: string }
        plan_tier: { type: string }
        billing_status: { type: string }
        default_bootstrap_template:
          type: string
          nullable: true
          description: Farm bootstrap key (e.g. jadam_indoor_photoperiod_v1, chicken_coop_v1, greenhouse_climate_v1, drying_room_v1, small_aquaponics_v1) or null to clear the org default

    OrganizationUsageSummary:
      type: object
      properties:
        farm_count: { type: integer, format: int64 }
        device_count: { type: integer, format: int64 }
        sensor_count: { type: integer, format: int64 }
        task_count: { type: integer, format: int64 }
        cost_transaction_count: { type: integer, format: int64 }

    OrganizationMemberInvite:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        role_in_org: { type: string, enum: [member, admin], default: member }

    OrganizationMembership:
      type: object
      properties:
        organization_id: { type: integer }
        user_id: { type: string, format: uuid }
        role_in_org: { type: string }
        joined_at: { type: string, format: date-time }

    Sensor:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        zone_id: { type: integer, nullable: true }
        device_id: { type: integer, nullable: true }
        name: { type: string, example: Air Temp Indoor }
        sensor_type: { type: string, example: temperature }
        unit_id: { type: integer }
        hardware_identifier: { type: string, nullable: true }
        value_min_expected: { type: number, nullable: true }
        value_max_expected: { type: number, nullable: true }
        alert_threshold_low: { type: number, nullable: true }
        alert_threshold_high: { type: number, nullable: true }
        reading_interval_seconds: { type: integer, nullable: true }
        alert_duration_seconds:
          type: integer
          minimum: 0
          maximum: 86400
          default: 0
          description: >
            Minimum sustained time (seconds) a reading must stay out of bounds before an alert
            is emitted. 0 means alert on the first breaching reading.
        alert_cooldown_seconds:
          type: integer
          minimum: 0
          maximum: 604800
          default: 300
          description: >
            Minimum quiet window (seconds) after an alert fires before another alert can fire
            for the same sensor. Measured against the most recent alert's created_at.
        alert_breach_started_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: >
            Internal evaluator state — when the current out-of-range streak started.
            NULL while the reading is in bounds.
        created_at: { type: string, format: date-time }

    SensorCreate:
      type: object
      required: [name, sensor_type, unit_id]
      properties:
        name: { type: string }
        sensor_type: { type: string }
        unit_id: { type: integer }
        zone_id: { type: integer }
        device_id: { type: integer }
        hardware_identifier: { type: string }
        reading_interval_seconds: { type: integer }
        value_min_expected: { type: number }
        value_max_expected: { type: number }
        alert_threshold_low: { type: number }
        alert_threshold_high: { type: number }
        alert_duration_seconds: { type: integer, minimum: 0, maximum: 86400, default: 0 }
        alert_cooldown_seconds: { type: integer, minimum: 0, maximum: 604800, default: 300 }

    SensorUpdate:
      type: object
      description: >
        Patch-style update. Any field omitted from the body leaves the stored value unchanged.
        Pass JSON null explicitly to clear a nullable field (e.g. a threshold).
      properties:
        zone_id: { type: integer, nullable: true }
        device_id: { type: integer, nullable: true }
        name: { type: string }
        sensor_type: { type: string }
        unit_id: { type: integer }
        hardware_identifier: { type: string, nullable: true }
        value_min_expected: { type: number, nullable: true }
        value_max_expected: { type: number, nullable: true }
        alert_threshold_low: { type: number, nullable: true }
        alert_threshold_high: { type: number, nullable: true }
        reading_interval_seconds: { type: integer, nullable: true }
        alert_duration_seconds: { type: integer, minimum: 0, maximum: 86400 }
        alert_cooldown_seconds: { type: integer, minimum: 0, maximum: 604800 }

    SensorReading:
      type: object
      properties:
        reading_time: { type: string, format: date-time }
        sensor_id: { type: integer }
        value_raw: { type: number, example: 22.5 }
        value_normalized: { type: number }
        normalized_unit_id: { type: integer, nullable: true }
        value_text: { type: string, nullable: true }
        battery_level_percent: { type: number, nullable: true }
        signal_strength_dbm: { type: integer, nullable: true }
        is_valid: { type: boolean }

    SensorReadingCreate:
      type: object
      required: [value_raw]
      properties:
        value_raw: { type: number }
        reading_time: { type: string, format: date-time }
        value_text: { type: string }
        battery_level_percent: { type: number }
        signal_strength_dbm: { type: integer }
        is_valid: { type: boolean, default: true }

    SensorReadingBatchItem:
      allOf:
        - { $ref: "#/components/schemas/SensorReadingCreate" }
        - type: object
          required: [sensor_id]
          properties:
            sensor_id: { type: integer, description: gr33ncore.sensors.id }

    SensorReadingBatchResponse:
      type: object
      required: [inserted, readings]
      properties:
        inserted: { type: integer }
        readings:
          type: array
          items: { $ref: "#/components/schemas/SensorReading" }

    SensorReadingStats:
      type: object
      properties:
        count: { type: integer, format: int64 }
        avg: { type: number }
        min: { type: number, nullable: true }
        max: { type: number, nullable: true }
        first_reading_time: { type: string, format: date-time, nullable: true }
        last_reading_time: { type: string, format: date-time, nullable: true }

    Device:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        zone_id: { type: integer, nullable: true }
        name: { type: string, example: Veg Room Fan }
        device_uid: { type: string, nullable: true }
        device_type: { type: string }
        ip_address: { type: string, nullable: true }
        firmware_version: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/DeviceStatusEnum" }
        last_heartbeat: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    DeviceCreate:
      type: object
      required: [name, device_type]
      properties:
        name: { type: string }
        device_type: { type: string }
        zone_id: { type: integer }
        device_uid: { type: string }
        ip_address: { type: string }

    DeviceStatusEnum:
      type: string
      enum: [online, offline, error_comms, error_hardware,
             maintenance_mode, initializing, unknown,
             decommissioned, pending_activation]

    Actuator:
      type: object
      properties:
        id: { type: integer }
        device_id: { type: integer, nullable: true }
        farm_id: { type: integer }
        zone_id: { type: integer, nullable: true }
        name: { type: string }
        actuator_type: { type: string }
        hardware_identifier: { type: string, nullable: true }
        current_state_numeric: { type: number, nullable: true }
        current_state_text: { type: string, nullable: true }
        last_known_state_time: { type: string, format: date-time, nullable: true }
        feedback_sensor_id: { type: integer, nullable: true }
        watts:
          type: number
          default: 0
          description: >
            Phase 20.95 WS2 — nameplate wattage used by the forthcoming nightly
            electricity rollup (Phase 20.7 WS4). DEFAULT 0 NOT NULL: 0 means
            "unknown / unmetered" and drops the actuator out of the rollup.
        created_at: { type: string, format: date-time }

    ActuatorEvent:
      type: object
      properties:
        event_time: { type: string, format: date-time }
        actuator_id: { type: integer }
        command_sent: { type: string, nullable: true }
        parameters_sent: { type: object, nullable: true }
        triggered_by_schedule_id: { type: integer, nullable: true }
        triggered_by_rule_id: { type: integer, nullable: true }
        source: { type: string }
        execution_status:
          type: object
          nullable: true
          properties:
            gr33ncore_actuator_execution_status_enum: { type: string }
            valid: { type: boolean }

    Schedule:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        schedule_type: { type: string }
        cron_expression: { type: string }
        timezone: { type: string }
        is_active: { type: boolean }
        last_triggered_time: { type: string, format: date-time, nullable: true }
        next_expected_trigger_time: { type: string, format: date-time, nullable: true }
        preconditions:
          type: array
          description: >
            Interlock-lite rules evaluated before the worker fires any executable
            action for this schedule. Empty array = no interlock.
          items: { $ref: "#/components/schemas/SchedulePrecondition" }
        created_at: { type: string, format: date-time }

    SchedulePrecondition:
      type: object
      required: [sensor_id, op, value]
      description: >
        Predicate against the latest reading for a sensor. If any precondition
        fails at tick time the worker records an automation_runs row with
        status='skipped' and message='precondition_failed', and no actuator
        commands are written. Missing readings count as a failure.
      properties:
        sensor_id:
          type: integer
          description: Must belong to the same farm as the schedule.
        op:
          type: string
          enum: [lt, lte, eq, gte, gt, ne]
        value:
          type: number

    ScheduleCreate:
      type: object
      required: [name, schedule_type, cron_expression]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        schedule_type:
          type: string
          description: Application-defined schedule type (e.g. "irrigation", "alert_check")
        cron_expression:
          type: string
          description: Standard 5-field cron expression
          example: "0 */6 * * *"
        timezone: { type: string, default: UTC }
        is_active: { type: boolean, default: false }
        meta_data:
          type: object
          description: Arbitrary JSON payload consumed by the worker for this schedule type
          additionalProperties: true
        preconditions:
          type: array
          description: Optional interlock rules (default empty array).
          items: { $ref: "#/components/schemas/SchedulePrecondition" }

    ScheduleUpdate:
      allOf:
        - $ref: "#/components/schemas/ScheduleCreate"
      description: >
        Omitting `preconditions` preserves the existing interlock rules. Send
        an empty array to clear them.

    AutomationRun:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        schedule_id: { type: integer, nullable: true }
        rule_id: { type: integer, nullable: true }
        status: { type: string, enum: [success, partial_success, failed, skipped] }
        message: { type: string, nullable: true }
        details: { type: object, nullable: true }
        executed_at: { type: string, format: date-time }

    # ── Automation rules (Phase 20 WS1) ───────────────────────

    AutomationTriggerSource:
      type: string
      description: Must match the `gr33ncore.automation_trigger_source_enum` DB enum.
      enum:
        - sensor_reading_threshold
        - specific_time_cron
        - actuator_state_changed
        - manual_api_trigger
        - task_status_updated
        - new_system_log_event
        - external_webhook_received

    ExecutableActionType:
      type: string
      description: >
        Must match the `gr33ncore.executable_action_type_enum` DB enum. Phase
        20 dispatches `control_actuator`, `create_task`, and
        `send_notification`; other values are rejected with HTTP 400 at the
        write path until a later phase wires up their dispatchers.
      enum:
        - control_actuator
        - create_task
        - send_notification
        - trigger_another_automation_rule
        - http_webhook_call
        - update_record_in_gr33n
        - log_custom_event

    RulePredicate:
      type: object
      required: [sensor_id, op, value]
      description: >
        Predicate against the latest reading for a sensor. Mirrors the shape
        used by schedule preconditions so the worker can reuse its evaluator.
      properties:
        sensor_id:
          type: integer
          description: Must belong to the same farm as the rule.
        op:
          type: string
          enum: [lt, lte, eq, gte, gt, ne]
        value:
          type: number

    RuleConditions:
      type: object
      required: [logic, predicates]
      description: >
        Canonical form stored in `conditions_jsonb`. `logic` also mirrored in
        the scalar `condition_logic` column for convenience.
      properties:
        logic:
          type: string
          enum: [ALL, ANY]
        predicates:
          type: array
          items: { $ref: "#/components/schemas/RulePredicate" }

    AutomationRule:
      type: object
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        name: { type: string }
        description: { type: string, nullable: true }
        is_active: { type: boolean }
        trigger_source: { $ref: "#/components/schemas/AutomationTriggerSource" }
        trigger_configuration:
          type: object
          description: >
            Shape depends on `trigger_source`. For `sensor_reading_threshold`
            this is `{ sensor_id, op, value }`; for `specific_time_cron` it is
            `{ cron_expression, timezone? }`. Empty `{}` is allowed for
            trigger sources that don't require configuration.
          additionalProperties: true
        condition_logic:
          type: string
          enum: [ALL, ANY]
          nullable: true
        conditions_jsonb: { $ref: "#/components/schemas/RuleConditions" }
        cooldown_period_seconds: { type: integer, nullable: true }
        last_evaluated_time: { type: string, format: date-time, nullable: true }
        last_triggered_time: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AutomationRuleCreate:
      type: object
      required: [name, trigger_source]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        is_active: { type: boolean, default: false }
        trigger_source: { $ref: "#/components/schemas/AutomationTriggerSource" }
        trigger_configuration:
          type: object
          description: See `AutomationRule.trigger_configuration`.
          additionalProperties: true
        condition_logic:
          type: string
          enum: [ALL, ANY]
          default: ALL
        conditions:
          type: array
          description: >
            Predicates evaluated under `condition_logic`. Stored in
            `conditions_jsonb` as `{ logic, predicates }`.
          items: { $ref: "#/components/schemas/RulePredicate" }
        cooldown_period_seconds:
          type: integer
          minimum: 0
          description: Min seconds between successive fires of this rule.

    ExecutableAction:
      type: object
      description: >
        A single step attached to an automation rule (or a schedule). The
        table intentionally has no created_at/updated_at columns — actions
        are edited as a list, not versioned individually.
      properties:
        id: { type: integer, format: int64 }
        rule_id: { type: integer, format: int64, nullable: true }
        schedule_id: { type: integer, format: int64, nullable: true }
        program_id:
          type: integer
          format: int64
          nullable: true
          description: >
            Phase 20.95 WS3 — optional fertigation program this action belongs to.
            Exactly one of (schedule_id, rule_id, program_id) is set; the DB
            constraint `chk_executable_source` is `num_nonnulls(...) = 1`.
        execution_order: { type: integer }
        action_type: { $ref: "#/components/schemas/ExecutableActionType" }
        target_actuator_id: { type: integer, format: int64, nullable: true }
        target_notification_template_id: { type: integer, format: int64, nullable: true }
        target_automation_rule_id: { type: integer, format: int64, nullable: true }
        action_command: { type: string, nullable: true }
        action_parameters:
          type: object
          nullable: true
          additionalProperties: true
        delay_before_execution_seconds: { type: integer, nullable: true }

    ExecutableActionCreate:
      type: object
      required: [action_type]
      description: >
        Validation depends on `action_type`:
          - `control_actuator`: `target_actuator_id` and `action_command` are
            required; `action_parameters` is optional.
          - `create_task`: `action_parameters` must be a non-empty object
            carrying the task payload (title, etc.).
          - `send_notification`: `target_notification_template_id` is
            required.
        Other enum values are rejected with HTTP 400.
      properties:
        execution_order: { type: integer, default: 0 }
        action_type: { $ref: "#/components/schemas/ExecutableActionType" }
        target_actuator_id: { type: integer, format: int64, nullable: true }
        target_notification_template_id: { type: integer, format: int64, nullable: true }
        action_command: { type: string, nullable: true }
        action_parameters:
          type: object
          nullable: true
          additionalProperties: true
        delay_before_execution_seconds: { type: integer, nullable: true, minimum: 0 }
        schedule_id:
          type: integer
          format: int64
          description: >
            Phase 20.95 WS3 — do NOT set when POSTing to /automation/rules/{id}/actions;
            the handler rejects two-source writes with 400. Documented here so the
            OpenAPI client library makes the constraint visible.
        program_id:
          type: integer
          format: int64
          description: Phase 20.95 WS3 — see schedule_id note above.

    Task:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        zone_id: { type: integer, nullable: true }
        schedule_id: { type: integer, nullable: true, description: Optional link to a farm schedule (e.g. irrigation cron) }
        title: { type: string }
        description: { type: string, nullable: true }
        task_type: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/TaskStatusEnum" }
        priority: { type: integer, minimum: 0, maximum: 3 }
        due_date: { type: string, format: date, nullable: true }
        source_alert_id:
          type: integer
          nullable: true
          description: If set, the alerts_notifications.id this task was created from.
        source_rule_id:
          type: integer
          format: int64
          nullable: true
          description: >
            If set, the automation_rules.id whose `create_task` action created
            this task. Cleared to null if the rule is later deleted.
        time_spent_minutes:
          type: integer
          nullable: true
          description: >
            Phase 20.95 WS1 — denormalised SUM of task_labor_log.minutes for
            this task. Maintained by the labor handler on insert/delete. NULL
            means "no labor rows have ever been logged" (not the same as 0,
            which is set once a row has been deleted back to empty).
        created_at: { type: string, format: date-time }

    TaskLaborLog:
      type: object
      description: >
        Phase 20.95 WS1 — a single clock-in/clock-out (or manual minutes)
        record against a task. The sum of rows drives `tasks.time_spent_minutes`.
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        task_id: { type: integer, format: int64 }
        user_id: { type: string, format: uuid, nullable: true }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        minutes: { type: integer, minimum: 0 }
        hourly_rate_snapshot:
          type: number
          nullable: true
          description: >
            Snapshot of the worker's hourly rate at log time. Phase 20.9 will
            multiply minutes * rate into a cost_transactions row; Phase 20.95
            only stores the snapshot so no data is lost.
        currency:
          type: string
          nullable: true
          description: ISO 4217 uppercase (matched alongside hourly_rate_snapshot)
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TaskLaborLogCreate:
      type: object
      required: [started_at, minutes]
      properties:
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        minutes: { type: integer, minimum: 0 }
        hourly_rate_snapshot: { type: number, nullable: true }
        currency: { type: string, nullable: true, description: ISO 4217 uppercase }
        notes: { type: string, nullable: true }

    TaskInputConsumption:
      type: object
      description: >
        Phase 20.7 WS3 — one row = one physical draw from inventory while
        performing a task. The autologger stamps `cost_transaction_id`
        when the underlying input has a `unit_cost` configured.
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        task_id: { type: integer, format: int64 }
        input_batch_id: { type: integer, format: int64 }
        quantity: { type: number }
        unit_id: { type: integer, format: int64 }
        notes: { type: string, nullable: true }
        recorded_at: { type: string, format: date-time }
        recorded_by: { type: string, format: uuid, nullable: true }
        cost_transaction_id:
          type: integer
          format: int64
          nullable: true
          description: NULL means the input had no unit_cost at consumption time (stock still decremented).
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TaskInputConsumptionCreate:
      type: object
      required: [input_batch_id, quantity, unit_id]
      properties:
        input_batch_id: { type: integer, format: int64 }
        quantity: { type: number, exclusiveMinimum: 0 }
        unit_id: { type: integer, format: int64 }
        notes: { type: string, nullable: true }

    TaskStatusEnum:
      type: string
      enum: [todo, in_progress, on_hold, completed, cancelled,
             blocked_requires_input, pending_review]

    TaskCreate:
      type: object
      required: [title]
      properties:
        title: { type: string }
        description: { type: string }
        zone_id: { type: integer }
        schedule_id: { type: integer, description: Optional farm schedule this task supports (must belong to farm) }
        task_type: { type: string }
        priority: { type: integer, minimum: 0, maximum: 3, default: 1 }
        due_date: { type: string, format: date }
        assigned_to_user_id: { type: string, format: uuid }
        source_alert_id:
          type: integer
          description: Optional back-reference to the alert this task was created from (must belong to farm).
        source_rule_id:
          type: integer
          format: int64
          description: Optional back-reference to the automation rule whose action created this task (must belong to farm).

    TaskFromAlert:
      type: object
      description: >
        Optional overrides when turning an alert into a task. Omitted fields
        are derived from the alert — title/description from the rendered
        subject+message, priority from severity (critical=3, high=2,
        medium=1, low=0), and zone from the triggering sensor.
      properties:
        title: { type: string }
        description: { type: string, nullable: true }
        zone_id: { type: integer, nullable: true }
        task_type: { type: string, nullable: true }
        priority: { type: integer, minimum: 0, maximum: 3 }
        due_date: { type: string, format: date, nullable: true }
        assigned_to_user_id: { type: string, format: uuid, nullable: true }

    TaskUpdate:
      type: object
      required: [title]
      properties:
        title: { type: string }
        description: { type: string, nullable: true }
        zone_id: { type: integer, nullable: true }
        schedule_id: { type: integer, nullable: true }
        task_type: { type: string, nullable: true }
        priority: { type: integer, minimum: 0, maximum: 3 }
        due_date: { type: string, format: date, nullable: true }
        assigned_to_user_id: { type: string, format: uuid, nullable: true }
        estimated_duration_minutes: { type: integer, nullable: true }

    Plant:
      type: object
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        display_name: { type: string }
        variety_or_cultivar: { type: string, nullable: true }
        meta:
          type: object
          description: Arbitrary JSON metadata (e.g. notes, tags)
          additionalProperties: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }

    PlantCreate:
      type: object
      required: [display_name]
      properties:
        display_name: { type: string }
        variety_or_cultivar: { type: string, nullable: true }
        meta:
          type: object
          additionalProperties: true

    PlantUpdate:
      allOf:
        - $ref: "#/components/schemas/PlantCreate"

    AnimalGroup:
      type: object
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        label: { type: string }
        species: { type: string, nullable: true }
        count: { type: integer, nullable: true, description: "Operator-maintained head count (not auto-reconciled against lifecycle deltas)." }
        primary_zone_id: { type: integer, format: int64, nullable: true }
        active: { type: boolean }
        archived_at: { type: string, format: date-time, nullable: true }
        archived_reason: { type: string, nullable: true }
        meta:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }

    AnimalGroupCreate:
      type: object
      required: [label]
      properties:
        label: { type: string }
        species: { type: string, nullable: true }
        count: { type: integer, nullable: true, minimum: 0 }
        primary_zone_id: { type: integer, format: int64, nullable: true }
        meta:
          type: object
          additionalProperties: true

    AnimalGroupDetail:
      type: object
      properties:
        group: { $ref: "#/components/schemas/AnimalGroup" }
        delta_total:
          type: integer
          format: int64
          description: "Signed sum of delta_count across every lifecycle event for this group."

    AnimalLifecycleEvent:
      type: object
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        animal_group_id: { type: integer, format: int64 }
        event_type:
          type: string
          description: "Freeform vocabulary (added, born, died, sold, culled, health_event, weight_check, note, …)."
        event_time: { type: string, format: date-time }
        delta_count: { type: integer, nullable: true, description: "Signed (+added/born, -died/sold/culled, null for notes)." }
        notes: { type: string, nullable: true }
        recorded_by: { type: string, format: uuid, nullable: true }
        related_task_id: { type: integer, format: int64, nullable: true }
        meta:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }

    AnimalLifecycleEventCreate:
      type: object
      required: [event_type]
      properties:
        event_type: { type: string }
        event_time: { type: string, format: date-time, nullable: true, description: "Defaults to NOW() when omitted." }
        delta_count: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        related_task_id: { type: integer, format: int64, nullable: true }
        meta:
          type: object
          additionalProperties: true

    AquaponicsLoop:
      type: object
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        label: { type: string }
        fish_tank_zone_id: { type: integer, format: int64, nullable: true }
        grow_bed_zone_id: { type: integer, format: int64, nullable: true }
        active: { type: boolean }
        meta:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }

    AquaponicsLoopCreate:
      type: object
      required: [label]
      properties:
        label: { type: string }
        fish_tank_zone_id: { type: integer, format: int64, nullable: true }
        grow_bed_zone_id: { type: integer, format: int64, nullable: true }
        meta:
          type: object
          additionalProperties: true

    AquaponicsLoopUpdate:
      allOf:
        - $ref: "#/components/schemas/AquaponicsLoopCreate"
        - type: object
          properties:
            active: { type: boolean }

    GrowthStageEnum:
      type: string
      enum: [clone, seedling, early_veg, late_veg, transition, early_flower, mid_flower, late_flower, flush, harvest, dry_cure]

    CropCycle:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        zone_id: { type: integer }
        name: { type: string }
        strain_or_variety: { type: string, nullable: true }
        current_stage: { $ref: "#/components/schemas/GrowthStageEnum" }
        is_active: { type: boolean }
        started_at: { type: string, format: date }
        harvested_at: { type: string, format: date, nullable: true }
        yield_grams: { type: number, nullable: true }
        yield_notes: { type: string, nullable: true }
        cycle_notes: { type: string, nullable: true }
        primary_program_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CropCycleCreate:
      type: object
      required: [zone_id, name, started_at]
      properties:
        zone_id: { type: integer }
        name: { type: string }
        strain_or_variety: { type: string }
        current_stage: { $ref: "#/components/schemas/GrowthStageEnum" }
        is_active: { type: boolean }
        started_at: { type: string, format: date }
        cycle_notes: { type: string }
        primary_program_id: { type: integer }

    CropCycleUpdate:
      type: object
      required: [name, zone_id, is_active]
      properties:
        name: { type: string }
        strain_or_variety: { type: string }
        zone_id: { type: integer }
        is_active: { type: boolean }
        cycle_notes: { type: string }
        harvested_at: { type: string, format: date }
        yield_grams: { type: number }
        yield_notes: { type: string }
        primary_program_id: { type: integer }

    ApplicationTargetEnum:
      type: string
      enum: [soil_drench, foliar_spray, seed_treatment, compost_pile_inoculant, livestock_water_supplement, other]

    ApplicationRecipe:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        name: { type: string }
        input_definition_id: { type: integer, nullable: true }
        description: { type: string, nullable: true }
        target_application_type: { $ref: "#/components/schemas/ApplicationTargetEnum" }
        dilution_ratio: { type: string, nullable: true }
        instructions: { type: string, nullable: true }
        frequency_guidelines: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ApplicationRecipeCreate:
      type: object
      required: [name, target_application_type]
      properties:
        name: { type: string }
        input_definition_id: { type: integer }
        description: { type: string }
        target_application_type: { $ref: "#/components/schemas/ApplicationTargetEnum" }
        dilution_ratio: { type: string }
        instructions: { type: string }
        frequency_guidelines: { type: string }
        notes: { type: string }

    ApplicationRecipeUpdate:
      type: object
      required: [name, target_application_type]
      properties:
        name: { type: string }
        input_definition_id: { type: integer }
        description: { type: string }
        target_application_type: { $ref: "#/components/schemas/ApplicationTargetEnum" }
        dilution_ratio: { type: string }
        instructions: { type: string }
        frequency_guidelines: { type: string }
        notes: { type: string }

    RecipeComponent:
      type: object
      properties:
        application_recipe_id: { type: integer }
        input_definition_id: { type: integer }
        part_value: { type: number }
        part_unit_id: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        input_name: { type: string }

    RecipeComponentInput:
      type: object
      required: [input_definition_id, part_value]
      properties:
        input_definition_id: { type: integer }
        part_value: { type: number }
        part_unit_id: { type: integer }
        notes: { type: string }

    CostCategoryEnum:
      type: string
      enum:
        - seeds_plants
        - fertilizers_soil_amendments
        - pest_disease_control
        - water_irrigation
        - labor_wages
        - equipment_purchase_rental
        - equipment_maintenance_fuel
        - utilities_electricity_gas
        - land_rent_mortgage
        - insurance
        - licenses_permits
        - feed_livestock
        - veterinary_services
        - packaging_supplies
        - transportation_logistics
        - marketing_sales
        - training_consultancy
        - miscellaneous

    CostTransaction:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        transaction_date: { type: string, format: date }
        category: { $ref: "#/components/schemas/CostCategoryEnum" }
        subcategory: { type: string, nullable: true }
        amount: { type: number }
        currency: { type: string }
        description: { type: string, nullable: true }
        is_income: { type: boolean }
        document_type:
          type: string
          nullable: true
          description: Optional bookkeeping label (e.g. invoice, bill, sales_receipt)
        document_reference:
          type: string
          nullable: true
          description: External reference such as invoice or PO number
        counterparty:
          type: string
          nullable: true
          description: Vendor or customer name for this line
        receipt_file_id: { type: integer, nullable: true, description: Linked cost receipt attachment id }
        crop_cycle_id:
          type: integer
          nullable: true
          description: >
            Phase 20.95 WS2 — optional link to the gr33nfertigation.crop_cycle that
            this transaction should be attributed to, so the forthcoming Phase 20.7
            cycle P&L rollup can total costs per cycle. ON DELETE SET NULL.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CostSummary:
      type: object
      properties:
        total_income: { type: number }
        total_expenses: { type: number }
        net: { type: number }

    CostTransactionCreate:
      type: object
      required: [transaction_date, category, amount, currency]
      properties:
        transaction_date: { type: string, format: date }
        category: { $ref: "#/components/schemas/CostCategoryEnum" }
        subcategory: { type: string }
        amount: { type: number }
        currency: { type: string, description: ISO 4217 uppercase }
        description: { type: string }
        is_income: { type: boolean }
        receipt_file_id: { type: integer, description: Optional link to uploaded receipt }
        document_type: { type: string, maxLength: 64 }
        document_reference: { type: string, maxLength: 128 }
        counterparty: { type: string, maxLength: 256 }
        crop_cycle_id: { type: integer, description: Optional crop cycle to attribute this transaction to }

    CostTransactionUpdate:
      type: object
      required: [transaction_date, category, amount, currency, is_income]
