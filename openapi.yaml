    put:
      tags: [automation]
      summary: Update a rule-bound executable action
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExecutableActionCreate" }
      responses:
        "200":
