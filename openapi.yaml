        updated_by_user_id: { type: string, format: uuid, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true }

    FarmEnergyPrice:
      type: object
      description: >
        Phase 20.95 WS2 — per-farm electricity price history used by the nightly
        (Phase 20.7 WS4) actuator-runtime * watts * price_per_kwh cost rollup.
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        effective_from: { type: string, format: date }
        effective_to: { type: string, format: date, nullable: true }
        price_per_kwh: { type: number }
        currency: { type: string, description: ISO 4217 uppercase }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    FarmEnergyPriceCreate:
      type: object
      required: [effective_from, price_per_kwh, currency]
      properties:
        effective_from: { type: string, format: date }
        effective_to: { type: string, format: date }
        price_per_kwh: { type: number }
        currency: { type: string }
        notes: { type: string }

    FarmEnergyPriceUpdate:
      type: object
      required: [effective_from, price_per_kwh, currency]
      properties:
        effective_from: { type: string, format: date }
        effective_to: { type: string, format: date }
        price_per_kwh: { type: number }
        currency: { type: string }
        notes: { type: string }

    Setpoint:
      type: object
      description: >
        Phase 20.6 — stage-scoped setpoint for a zone and/or crop cycle. Scope
        is (zone_id, crop_cycle_id), at least one required. `stage` is TEXT so
        the same table can carry values for non-crop zones (drying rooms,
        propagation areas, aquaponics loops). Precedence at eval time:
        cycle+stage > cycle-any-stage > zone+stage > zone-any-stage.
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        zone_id: { type: integer, format: int64, nullable: true }
        crop_cycle_id: { type: integer, format: int64, nullable: true }
        stage: { type: string, nullable: true, description: "Matches gr33nfertigation.growth_stage_enum labels for fertigation crops; free text otherwise. NULL = applies to every stage in this scope." }
        sensor_type: { type: string, description: "Sensor channel name (temp_f, rh, dew_point, vpd, ec, ph, …). Matches physical and derived sensors identically." }
        min_value: { type: number, nullable: true }
        max_value: { type: number, nullable: true }
        ideal_value: { type: number, nullable: true }
        meta: { type: object, additionalProperties: true, description: "Opaque provenance / UI notes. Rule engine does not read this." }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SetpointCreate:
      type: object
      required: [sensor_type]
      description: "zone_id or crop_cycle_id (or both) must be supplied."
      properties:
        zone_id: { type: integer, format: int64 }
        crop_cycle_id: { type: integer, format: int64 }
        stage: { type: string }
        sensor_type: { type: string }
        min_value: { type: number }
        max_value: { type: number }
        ideal_value: { type: number }
        meta: { type: object, additionalProperties: true }

    SetpointUpdate:
      type: object
      required: [sensor_type]
      description: "Full replace; same scope/coherence rules as create."
      properties:
        zone_id: { type: integer, format: int64 }
        crop_cycle_id: { type: integer, format: int64 }
        stage: { type: string }
        sensor_type: { type: string }
        min_value: { type: number }
        max_value: { type: number }
        ideal_value: { type: number }
        meta: { type: object, additionalProperties: true }

    # ── Alert schemas ──────────────────────────────────────────

    Alert:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        recipient_user_id: { type: string, format: uuid, nullable: true }
        triggering_event_source_type: { type: string, nullable: true }
        triggering_event_source_id: { type: integer, nullable: true }
        severity:
          type: string
          enum: [low, medium, high, critical]
        subject_rendered: { type: string, nullable: true }
        message_text_rendered: { type: string, nullable: true }
        status:
          type: string
          enum: [pending, queued, sent, delivered, failed_to_send, read_by_user, acknowledged_by_user, archived_by_user, system_cleared]
        is_read: { type: boolean }
        read_at: { type: string, format: date-time, nullable: true }
        is_acknowledged: { type: boolean }
        acknowledged_at: { type: string, format: date-time, nullable: true }
        acknowledged_by_user_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    # ── Profile & membership schemas ───────────────────────────

    Profile:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        full_name: { type: string, nullable: true }
        email: { type: string }
        avatar_url: { type: string, nullable: true }
        role:
          type: string
          enum: [admin, farm_manager, operator, viewer, gr33n_system_admin, user]
        preferences: { type: object }
        hourly_rate:
          type: number
          nullable: true
          minimum: 0
          description: >-
            Phase 20.9 WS1 — default wage the labor autologger applies
            when a `task_labor_log.hourly_rate_snapshot` is NULL at
            close time.
        hourly_rate_currency:
          type: string
          nullable: true
          pattern: "^[A-Z]{3}$"
          description: ISO-4217 currency paired with `hourly_rate`.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProfileUpdate:
      type: object
      properties:
        full_name: { type: string }
        avatar_url: { type: string }
        preferences: { type: object }

    NotificationPreferences:
      type: object
      properties:
        push_enabled: { type: boolean, description: When false, no FCM messages are sent for this user. }
        min_priority:
          type: string
          enum: [low, medium, high, critical]
          description: Deliver push only when alert severity is at least this level.

    NotificationPreferencesPatch:
      type: object
      description: At least one field required.
      properties:
        push_enabled: { type: boolean }
        min_priority:
          type: string
          enum: [low, medium, high, critical]

