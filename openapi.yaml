components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    ResourceID:
      name: rid
      in: path
      required: true
      schema: { type: integer, format: int64 }

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:

    Error:
      type: object
      properties:
        error: { type: string }

    Unit:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, example: celsius }
        unit_type: { type: string, example: temperature }
        symbol: { type: string, example: "C" }
        base_unit_name: { type: string }
        conversion_to_base: { type: number }
        is_base_unit: { type: boolean }

    Farm:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, example: gr33n Demo Farm }
        description: { type: string }
        location_text: { type: string }
        farm_type: { type: string }
        scale_tier: { type: string, enum: [small, medium, large, enterprise] }
        operational_status: { type: string }
        timezone: { type: string, example: UTC }
        currency: { type: string, example: USD }
        created_at: { type: string, format: date-time }

    Zone:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        name: { type: string, example: Veg Room }
        description: { type: string }
        zone_type: { type: string }
        area_sqm: { type: number }
        created_at: { type: string, format: date-time }

    ZoneCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        zone_type: { type: string }
        area_sqm: { type: number }

    ZoneUpdate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        zone_type: { type: string }
        area_sqm: { type: number }
        meta_data: { type: object }
        updated_by_user_id: { type: string, format: uuid }

    FarmCreate:
      type: object
      required: [name, owner_user_id, timezone, currency, operational_status, scale_tier]
      properties:
        name: { type: string, example: My New Farm }
        description: { type: string }
