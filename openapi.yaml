        observations: { type: string, nullable: true }
        components:
          type: array
          description: Optional per-input-draw line items recorded against inventory
          items:
            type: object
            required: [input_definition_id, volume_added_ml]
            properties:
              input_definition_id: { type: integer, format: int64 }
              input_batch_id: { type: integer, format: int64, nullable: true }
              volume_added_ml: { type: number }
              dilution_ratio: { type: string, nullable: true }
              notes: { type: string, nullable: true }

