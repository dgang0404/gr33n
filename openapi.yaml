  # ── Crop-cycle analytics (Phase 28 WS1) ────────────────────

  /crop-cycles/{id}/summary:
    get:
      tags: [crop-cycle-analytics]
      summary: Per-cycle analytics summary (fertigation + cost + yield + stages)
      description: >
        Returns the full per-cycle story: fertigation aggregates (event count,
        total litres, EC min/avg/max, average pH), cost totals broken down
        per-currency and per-category, yield metrics (grams, grams/L,
        grams/day, cost/g — the latter only when a single currency was used
        for all expenses), and stage history. `stage_history_supported` flags
        whether the schema can produce a real timeline (currently a single
        stand-in row — `current_stage` entered at `started_at`). JWT + farm
        member (farm resolved from the cycle row).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CropCycleSummary" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404": { $ref: "#/components/responses/NotFound" }

  /crop-cycles/{id}/summary.csv:
    get:
      tags: [crop-cycle-analytics]
      summary: Per-cycle summary in CSV form (same data, flat columns)
      description: >
        Same data as `/crop-cycles/{id}/summary` flattened to a single CSV row
        with one column per leaf field (cycle metadata, fertigation
        aggregates, top-line cost totals for the dominant currency, yield
        metrics). Cost-per-category and stage history are intentionally
        omitted from the CSV to keep the column set stable for spreadsheet
        consumers. Disposition header: `attachment;
        filename="crop-cycle-{id}-summary.csv"`. JWT + farm member.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: CSV summary
          content:
            text/csv:
              schema: { type: string, format: binary }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404": { $ref: "#/components/responses/NotFound" }

  /farms/{id}/crop-cycles/compare:
    get:
      tags: [crop-cycle-analytics]
      summary: Side-by-side compare for up to five crop cycles
      description: >
        Returns a `{cycles: [CropCycleSummary]}` payload, one entry per id in
        the `ids` query parameter (comma-separated, capped at **5**, dedupe
        applied in order). All ids must belong to the farm — a 400 fires
        otherwise. The UI does the actual side-by-side rendering; the API
        just guarantees parallel structures.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: ids
          in: query
          required: true
          description: Comma-separated crop cycle ids (capped at 5). Duplicates are removed in first-seen order.
          schema:
            type: string
            example: "12,17,23"
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CropCycleCompareResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/crop-cycles/compare.csv:
    get:
      tags: [crop-cycle-analytics]
      summary: Compare endpoint in CSV form (one row per cycle)
      description: >
        Same parallel ordering and validation as
        `/farms/{id}/crop-cycles/compare`, rendered as a CSV with one row per
        cycle and one column per leaf field. Disposition header:
        `attachment; filename="farm-{id}-crop-cycles-compare.csv"`.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: ids
          in: query
          required: true
          schema: { type: string, example: "12,17,23" }
      responses:
