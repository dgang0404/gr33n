        description: { type: string }
        typical_ingredients: { type: string }
        preparation_summary: { type: string }
        storage_guidelines: { type: string }
        safety_precautions: { type: string }
        reference_source: { type: string }
        unit_cost: { type: number, description: Default per-unit cost for auto-cost rollups }
        unit_cost_currency: { type: string, description: ISO 4217 currency }
        unit_cost_unit_id: { type: integer, description: gr33ncommons.units id }

    InputDefinitionUpdate:
      type: object
      required: [name, category]
      properties:
        name: { type: string }
        category:
          type: string
          enum:
            - microbial_inoculant
            - fermented_plant_juice
