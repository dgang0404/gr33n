  # ── Farm Guardian chat (Phase 27 + Phase 28 WS5 + Phase 29) ─

  /v1/chat/health:
    get:
      tags: [chat]
      summary: Field assistant readiness (Phase 37)
      description: Reports offline field mode, LLM reachability, and optional RAG chunk counts for `field_guide` / `platform_doc` when `farm_id` is set.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: farm_id
          in: query
          schema: { type: integer, format: int64, minimum: 1 }
      responses:
        "200":
          description: Health snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  ai_enabled: { type: boolean }
                  chat_configured: { type: boolean }
                  field_assistant: { type: object, additionalProperties: true }

  /v1/field-guides/procedures:
    get:
      tags: [chat]
      summary: List guided field procedures (Phase 37)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Procedure catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  procedures:
                    type: array
                    items: { $ref: "#/components/schemas/FieldProcedureSummary" }

  /v1/field-guides/procedures/{id}:
    get:
      tags: [chat]
      summary: Get one field procedure definition
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Full procedure YAML shape as JSON
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FieldProcedure" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/field-guides/procedures/{id}/print:
    get:
      tags: [chat]
      summary: Printable procedure checklist (markdown, Phase 37 WS6)
      description: Static render — works without LLM.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Markdown checklist
          content:
            text/markdown:
              schema: { type: string }

  /v1/chat:
    post:
      tags: [chat]
      summary: Farm Guardian chat turn (optionally grounded by farm RAG corpus)
      description: >
        Single conversational turn. **Plain mode** (no `farm_id`) just sends
        the message to the configured LLM with the Guardian persona. **Grounded
        mode** (`farm_id` supplied) attaches the live farm-state snapshot
        (zones, active cycles, unread alerts). When an embedder is configured,
        the handler also runs the same RAG retrieval as `/rag/answer` and
        returns inline citations to the retrieved chunks. Without an embedder,
        snapshot-only grounding still works (no retrieval error). The handler
        replays up to **20 prior turns** when `session_id` is set so multi-turn
        context survives across requests.

        **Contextual focus (Phase 29 WS6):** optional `context_ref` (`alert`,
        `crop_cycle`, or `zone`) injects a focused background block for the
        entity the operator opened the Guardian drawer from.

        **Agent proposals (Phase 29–32):** grounded turns may return `proposals[]`
        — frozen change requests (alert ack/read, tasks, schedule/program/rule
        patches, actuator enqueue, grow setup pack, …) confirmed via
        `POST /v1/chat/confirm`. Each proposal carries `risk_tier`
        (`low` | `medium` | `high`). Persisted server-side with a 5-minute TTL.
        Phase 32 **`apply_grow_setup_pack`** bundles plant, crop cycle, fertigation
        program, and optional task args — see `GuardianGrowSetupPackArgs`.

        **Vision (Phase 30 WS6):** optional `attachment_ids` (zone reference photo
        file attachment ids, max 3) require `farm_id` and `LLM_VISION_MODEL`.
        Sets `vision_used` on the response when a multimodal model runs.

        Each successful turn is persisted to `gr33ncore.conversation_turns`
        (turn_index assigned via SQL `COALESCE(MAX+1, 0)`) and the matching
        `conversation_sessions.updated_at` is bumped so the sidebar can sort
        by recency.

        **Streaming:** set `stream: true` to receive Server-Sent Events
        (`Content-Type: text/event-stream`). Events are JSON-encoded with
        types `delta`, `done`, and `error`. The terminal `done` event carries
        citations, usage, session metadata, and optional `proposals[]`.
        Non-streaming clients receive the full response as a single JSON
        document instead.

        **Cost guard:** rolling-window per-user / per-farm token caps
        (`CHAT_COST_MAX_TOKENS_PER_USER` / `_PER_FARM`) return **429** with a
        `Retry-After` header pointing at the end of the current window. The
        80 % warning hook fires a `chat_budget_warning` alert; see
        `/v1/chat/usage` for the operator dashboard. Confirm rounds count
        toward the same budget.

        See `docs/farm-guardian-architecture.md` for the four-stage request
        flow and three-knowledge-layer breakdown.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatRequest" }
      responses:
        "200":
          description: Single-turn answer (non-streaming) or initial SSE stream (streaming).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatResponse" }
            text/event-stream:
              schema: { $ref: "#/components/schemas/ChatStreamEvent" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller is not a member of the supplied `farm_id`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "405":
          description: Method not allowed (only POST)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: Cost-guard cap exceeded (per-user or per-farm). `Retry-After` header is in seconds.
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds until the rolling window expires.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatCostGuardError" }
        "501":
          description: Streaming requested but the configured LLM client doesn't support streaming.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          description: Retrieval or LLM provider error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: AI is disabled at the server (`AI_ENABLED=false`) or LLM / embedder isn't configured.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "504":
          description: LLM request timed out.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/chat/proposals:
    get:
      tags: [chat]
      summary: List Guardian action proposals (Phase 30 WS1 inbox)
      description: >
        Returns frozen proposals for the authenticated user. When `farm_id` is
        supplied, the caller must be a member of that farm. Defaults to
        `status=pending` (stale pending rows are marked `expired` before the
        query). Use for the Guardian pending-requests inbox and TopBar badge count.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: farm_id
          in: query
          required: false
          schema: { type: integer, format: int64 }
          description: Scope list to one farm (farm-member gated).
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, expired, confirmed, dismissed]
            default: pending
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Paginated proposal list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GuardianProposalListResponse" }
        "400":
          description: Invalid farm_id, status, limit, or offset.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller is not a member of the requested farm.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/chat/confirm:
    post:
      tags: [chat]
      summary: Confirm a frozen Guardian action proposal (Phase 29)
      description: >
        Executes a server-persisted proposal created during a grounded chat
        turn. The request body accepts **only** `proposal_id` — tool args are
        replayed from `gr33ncore.guardian_action_proposals`, not from the
        client, so operators cannot tamper with frozen payloads.

        Write tools (`ack_alert`, `mark_alert_read`, `create_task`, schedule/program/rule
        patches, `enqueue_actuator_command`, Phase 32 grow creates / `apply_grow_setup_pack`,
        …) require `FarmCaps.Operate` on the proposal's farm (`apply_bootstrap_template`
        requires farm admin). Viewers receive **403**.
        Expired or already-handled proposals return **410 Gone**. A second
        confirm on an already-confirmed proposal is **idempotent** (200 with
        cached result).

        **Phase 34 (revise loop):** a correction turn in the same session supersedes
        the live draft and creates a new frozen revision; only the latest pending
        revision is confirmable. Confirming a **superseded** proposal returns **410
        Gone** with `live_proposal_id` (+ `live_revision`) pointing at the confirmable
        draft. Confirms record `revision` and `root_proposal_id` on the audit, plus any
        `operator_provided` blind-spot facts.

        Successful confirms append `guardian_tool_executed` rows to
        `gr33ncore.user_activity_log` (visible via `GET /farms/{id}/audit-events`).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatConfirmRequest" }
      responses:
        "200":
          description: Tool executed (or idempotent replay of a prior confirm).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatConfirmResponse" }
        "400":
          description: Invalid JSON, unknown tool, or tool execution error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Proposal belongs to another user, or caller lacks Operate cap.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Unknown proposal_id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "410":
          description: >
            Proposal expired, dismissed, or superseded by a later revision. When
            superseded, the body includes `live_proposal_id` and `live_revision`
            pointing at the confirmable draft (Phase 34).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GuardianProposalGone" }
        "429":
          description: Cost-guard cap exceeded (confirm counts as a chat turn).
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatCostGuardError" }

  /v1/chat/sessions:
    get:
      tags: [chat]
      summary: List the caller's recent chat sessions (sidebar)
      description: >
        Returns the calling user's most recently active conversation sessions
        (capped at **50**). Ordered by `updated_at DESC`. Each entry includes
        rollups (`turn_count`, `total_prompt_tokens`, `total_completion_tokens`,
        whether any turn was `grounded`, the first user message, and the last
        assistant message preview) so the sidebar can render without a second
        request.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatSessionListResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/chat/sessions/{session_id}:
    get:
      tags: [chat]
      summary: Get the ordered turn history for a session
      description: >
        Returns every turn for `(session_id, calling user)` in chronological
        order. Turns include the user message, assistant message, model
        label, grounded flag, citations (when grounded), and per-turn token
        usage. Older turns are still visible here even when they've fallen
        out of the LLM context window.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/SessionID" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatSessionDetailResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [chat]
      summary: Rename a session (operator-supplied title)
      description: >
        Sets / clears the session's display title. Whitespace-only or empty
        titles clear the title (the UI falls back to the first user
        message). Titles longer than 120 runes are trimmed and ellipsised
        on the server side.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/SessionID" }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatSessionPatchRequest" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatSessionPatchResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [chat]
      summary: Delete a session and all its turns
      description: >
        Idempotent — repeated DELETEs return 204 either way (no information
        leak about whether the session existed). Removes every turn for
        `(session_id, calling user)` and the session metadata row.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/SessionID" }
      responses:
        "204": { description: Session removed (or never existed). }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/chat/usage:
    get:
      tags: [chat]
      summary: Rolling-window token-usage dashboard (Phase 28 WS5)
      description: >
        Returns the caller's per-user rolling-window token totals (always
        present) plus optional per-farm totals when `farm_id` is supplied.
        The user dimension is always returned even when the per-user cap is
        disabled (max_tokens=0) so operators can see raw consumption. The
        farm dimension requires farm membership.

        `pct_used` is rounded to 4 decimals; `remaining_tokens` is clamped to
        zero once consumption meets/exceeds the cap. `warning_threshold_pct`
        is the fraction at which `chat_budget_warning` alerts fire (0.80).

        The Settings → **Guardian usage** card calls this endpoint on mount
        and on every farm switch.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: farm_id
          in: query
          required: false
          schema: { type: integer, format: int64, minimum: 1 }
          description: When supplied, response includes a `farm` dimension scoped to grounded turns for that farm.
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatUsageResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller is not a member of the supplied `farm_id`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: AI is disabled at the server (`AI_ENABLED=false`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    ResourceID:
      name: rid
      in: path
      required: true
      schema: { type: integer, format: int64 }
    SessionID:
      name: session_id
      in: path
      required: true
      description: Chat session UUID (assigned on the first turn; returned by `POST /v1/chat`).
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:

    Error:
      type: object
      properties:
        error: { type: string }

    RagSearchRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        module: { type: string, description: Filter chunks where metadata.module matches (e.g. core, automation) }
        created_since: { type: string, format: date-time, description: Include chunks with created_at >= this time (RFC3339) }
        created_until: { type: string, format: date-time, description: Include chunks with created_at <= this time (RFC3339) }
        limit: { type: integer, minimum: 1, maximum: 50, default: 10 }

    RagSearchResult:
      type: object
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        source_type: { type: string }
        source_id: { type: integer, format: int64 }
        chunk_index: { type: integer }
        content_text: { type: string }
        model_id: { type: string }
        metadata:
          type: object
          additionalProperties: true
        created_at: { type: string }
        updated_at: { type: string }
        distance:
          type: number
          description: Cosine distance from pgvector `<=>` (0 = identical; lower is more similar)

    RagSearchResponse:
      type: object
      properties:
        model_id: { type: string, description: Embedding model used for the query vector }
        results:
          type: array
          items: { $ref: "#/components/schemas/RagSearchResult" }

    RagAnswerRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        module: { type: string }
        created_since: { type: string, format: date-time }
        created_until: { type: string, format: date-time }
        max_context_chunks:
          type: integer
          minimum: 1
          maximum: 15
          default: 8
          description: Top-k chunks to pass to the LLM (same retrieval as search, capped lower than search max)

    RagCitation:
      type: object
      required: [ref, chunk_id, source_type, source_id, excerpt]
      properties:
        ref: { type: integer, description: 1-based index into the numbered context blocks sent to the model }
        chunk_id: { type: integer, format: int64 }
        source_type: { type: string }
        source_id: { type: integer, format: int64 }
        excerpt: { type: string, description: Truncated chunk text for UI display }

    RagAnswerResponse:
      type: object
      properties:
        answer: { type: string }
        citations:
          type: array
          items: { $ref: "#/components/schemas/RagCitation" }
        embedding_model_id: { type: string }
        llm_model: { type: string }
        context_count: { type: integer, description: Number of chunks retrieved for this answer }

    # ── Capabilities (Phase 27 WS6) ──────────────────────────────────

    Capabilities:
      type: object
      required: [ai_enabled, vision_chat_enabled]
      properties:
        ai_enabled:
          type: boolean
          description: Mirrors the API's `AI_ENABLED` env var. When `false`, the UI hides LLM-backed actions (Farm Guardian chat, RAG answer synthesis, Guardian-usage card).
        vision_chat_enabled:
          type: boolean
          description: >
            `true` when `LLM_VISION_MODEL` and a base URL (`LLM_VISION_BASE_URL` or
            `LLM_BASE_URL`) are configured — enables multimodal `/v1/chat` with
            `attachment_ids` (Phase 30 WS6).

    ZonePhotoItem:
      type: object
      properties:
        id: { type: integer, format: int64 }
        file_name: { type: string }
        file_type: { type: string }
        mime_type: { type: string, nullable: true }
        file_size_bytes: { type: integer, format: int64, nullable: true }
        created_at: { type: string, format: date-time }
        content_url: { type: string, description: "Proxied GET path under /file-attachments/{id}/content" }
        download_url: { type: string, description: "GET /file-attachments/{id}/download" }

    ZonePhotoListResponse:
      type: object
      required: [zone_id, photos]
      properties:
        zone_id: { type: integer, format: int64 }
        photos:
          type: array
          items: { $ref: "#/components/schemas/ZonePhotoItem" }

    ZonePhotoUploadResponse:
      type: object
      properties:
        file_attachment:
          type: object
          additionalProperties: true
        zone: { $ref: "#/components/schemas/Zone" }

    # ── Farm Guardian chat (Phase 27 WS5 + Phase 28 WS5 + Phase 29) ─

    GuardianContextRef:
      type: object
      description: UI anchor for contextual Ask Guardian entry points (Phase 29 WS6) and passive route context (Phase 32 WS1).
      required: [type]
      properties:
        type:
          type: string
          enum: [alert, crop_cycle, zone, route]
          description: Entity type the operator opened the drawer from, or `route` for the current dashboard screen.
        id:
          type: integer
          format: int64
          minimum: 1
          description: Primary key of the alert, crop cycle, or zone. Omit for `route`.
        path:
          type: string
          description: Vue route path (e.g. `/fertigation`) when `type` is `route`.
        name:
          type: string
          description: Optional display hint (zone name or screen label) when the server should not re-fetch.

    GuardianCreatePlantArgs:
      type: object
      description: Frozen args for `create_plant` (Phase 32, medium tier).
      required: [display_name]
      properties:
        display_name:
          type: string
          description: Farm-scoped plant display name (unique per farm, case-insensitive).
        variety_or_cultivar:
          type: string
          description: Optional cultivar or variety label.
        meta:
          type: object
          additionalProperties: true
          description: Optional JSON metadata stored on the plant row.

    GuardianCreateCropCycleArgs:
      type: object
      description: Frozen args for `create_crop_cycle` (Phase 32, medium tier).
      required: [zone_id, name, strain_or_variety, current_stage, started_at]
      properties:
        zone_id:
          type: integer
          format: int64
          minimum: 1
        name:
          type: string
        strain_or_variety:
          type: string
        current_stage:
          type: string
          description: Growth stage enum value (e.g. `vegetative`, `late_veg`).
        started_at:
          type: string
          format: date
          description: ISO date (`YYYY-MM-DD`) when the cycle started.
        cycle_notes:
          type: string
        is_active:
          type: boolean
          default: true
          description: When true (default), rejects zones that already have an active cycle.

    GuardianCreateFertigationProgramArgs:
      type: object
      description: Frozen args for `create_fertigation_program` (Phase 32, medium tier).
      required: [name, target_zone_id, total_volume_liters, ec_trigger_low, ph_trigger_low, ph_trigger_high]
      properties:
        name:
          type: string
        target_zone_id:
          type: integer
          format: int64
          minimum: 1
        total_volume_liters:
          type: number
          format: double
          minimum: 0
        ec_trigger_low:
          type: number
          format: double
        ph_trigger_low:
          type: number
          format: double
        ph_trigger_high:
          type: number
          format: double
        is_active:
          type: boolean
          default: true
        description:
          type: string

    GuardianGrowSetupPlantArgs:
      type: object
      description: Plant section inside `apply_grow_setup_pack` (optional — commercial profiles may omit).
      required: [display_name]
      properties:
        display_name:
          type: string
        variety_or_cultivar:
          type: string
        notes:
          type: string
          description: Stored under plant `meta.notes`.

    GuardianGrowSetupCycleArgs:
      type: object
      description: Crop cycle section inside `apply_grow_setup_pack`.
      required: [name, current_stage, started_at]
      properties:
        name:
          type: string
        current_stage:
          type: string
        started_at:
          type: string
          format: date
        strain_or_variety:
          type: string
          description: Defaults to plant variety or display name when omitted.
        cycle_notes:
          type: string

    GuardianGrowSetupProgramArgs:
      type: object
      description: Fertigation program section inside `apply_grow_setup_pack`.
      required: [name, total_volume_liters, ec_trigger_low, ph_trigger_low, ph_trigger_high]
      properties:
        name:
          type: string
        total_volume_liters:
          type: number
          format: double
        ec_trigger_low:
          type: number
          format: double
        ph_trigger_low:
          type: number
          format: double
        ph_trigger_high:
          type: number
          format: double
        is_active:
          type: boolean
          default: true
        description:
          type: string

    GuardianGrowSetupTaskArgs:
      type: object
      description: Optional monitor task created after the transactional bundle commits.
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string

    GuardianGrowSetupPackArgs:
      type: object
      description: >
        Frozen args for `apply_grow_setup_pack` (Phase 32, **high** tier). Executes
        plant create (optional), crop cycle create, fertigation program create,
        links `primary_program_id` on the new cycle, and optionally creates a
        general monitor task — all in one database transaction on Confirm.
      required: [zone_id, cycle, program]
      properties:
        profile:
          type: string
          enum: [house_plant, commercial_zone]
          description: Template hint used by the UI card and rule-assisted matcher.
        zone_id:
          type: integer
          format: int64
          minimum: 1
        zone_name:
          type: string
          description: Display hint for proposal cards; resolved from DB when omitted.
        plant:
          $ref: "#/components/schemas/GuardianGrowSetupPlantArgs"
        cycle:
          $ref: "#/components/schemas/GuardianGrowSetupCycleArgs"
        program:
          $ref: "#/components/schemas/GuardianGrowSetupProgramArgs"
        optional_task:
          $ref: "#/components/schemas/GuardianGrowSetupTaskArgs"

    GuardianGrowSetupPackResult:
      type: object
      description: Tool-specific `result` payload from confirming `apply_grow_setup_pack`.
      properties:
        profile:
          type: string
        zone_id:
          type: integer
          format: int64
        zone_name:
          type: string
        plant:
          type: object
          additionalProperties: true
          description: `{ plant_id, display_name, … }` when a plant was created.
        cycle:
          type: object
          additionalProperties: true
          description: `{ crop_cycle_id, … }` for the new active cycle.
        program:
          type: object
          additionalProperties: true
          description: `{ program_id, … }` for the new fertigation program.
        primary_program_linked:
          type: boolean
          description: True when `crop_cycles.primary_program_id` was set to the new program.
        optional_task:
          type: object
          additionalProperties: true
          description: Present when `optional_task` was supplied in frozen args.

    GuardianActionProposal:
      type: object
      description: Frozen write proposal returned on chat `done` / non-streaming responses (Phase 29).
      required: [proposal_id, tool, args, summary, risk_tier, expires_at]
      properties:
        proposal_id:
          type: string
          format: uuid
          description: Opaque id passed to `POST /v1/chat/confirm`.
        tool:
          type: string
          description: >
            Registered tool id (e.g. `ack_alert`, `mark_alert_read`, `create_plant`,
            `create_crop_cycle`, `create_fertigation_program`, `apply_grow_setup_pack`).
        args:
          type: object
          additionalProperties: true
          description: >
            Frozen tool arguments stored server-side at propose time. Phase 32 grow
            tools use `GuardianCreatePlantArgs`, `GuardianCreateCropCycleArgs`,
            `GuardianCreateFertigationProgramArgs`, or `GuardianGrowSetupPackArgs`
            shapes depending on `tool`.
        summary:
          type: string
          description: Human-readable card label for the operator UI.
        risk_tier:
          type: string
          enum: [low, medium, high]
          description: >
            Impact tier for operator UX — `low` (read/ack), `medium` (tasks/config patches),
            `high` (bootstrap, actuators, disable rule). Set at propose time from the tool registry.
        expires_at:
          type: string
          format: date-time
          description: UTC expiry — confirm returns 410 after this timestamp.
        revision:
          type: integer
          minimum: 1
          description: >
            Phase 34 — 1-based revision number within a supersede chain. A correction
            turn produces a new frozen row (revision N+1) that supersedes the prior;
            only the latest pending revision is confirmable.
        supersedes_proposal_id:
          type: string
          format: uuid
          description: Phase 34 — the proposal id this revision replaces (absent on the first draft).
        impact_summary:
          type: array
          items: { type: string }
          description: >
            Phase 34 — ordered, plain-language "if you Confirm, this will…" lines, scaled
            by risk tier. High-tier proposals lead with the most impactful/irreversible step.
        operator_provided:
          type: array
          description: >
            Phase 34 — ground-truth values the operator asserted that Guardian cannot
            sense (blind spots). Stored in proposal meta and surfaced as operator-stated,
            never written as a sensor measurement.
          items:
            $ref: "#/components/schemas/GuardianOperatorFact"

    GuardianOperatorFact:
      type: object
      required: [field, basis]
      description: An unsensed value supplied by the operator (Phase 34 WS3).
      properties:
        field:
          type: string
          description: Logical field name, e.g. `rh_pct`, `water_source`.
        value:
          description: Operator-stated value (number or string).
        basis:
          type: string
          enum: [operator_stated]
          description: Always `operator_stated` — distinguishes assertions from measurements.
        label:
          type: string
          description: Human label, e.g. "RH 60% (operator-stated, not measured)".
        turn_ref:
          type: string
          description: Optional reference to the chat turn that asserted the fact.

    GuardianProposalGone:
      type: object
      required: [error]
      description: 410 body when confirming an expired/dismissed/superseded proposal (Phase 34).
      properties:
        error:
          type: string
        live_proposal_id:
          type: string
          format: uuid
          description: Present when the proposal was superseded — the latest confirmable revision.
        live_revision:
          type: integer
          description: Revision number of `live_proposal_id`.

    GuardianProposalListItem:
      allOf:
        - $ref: "#/components/schemas/GuardianActionProposal"
        - type: object
          required: [created_at, farm_id, status]
          properties:
            created_at:
              type: string
              format: date-time
            farm_id:
              type: integer
              format: int64
            status:
              type: string
              enum: [pending, expired, confirmed, dismissed, superseded]
              description: >
                `superseded` (Phase 34) marks a draft replaced by a later revision —
                rendered muted and not confirmable.

    GuardianProposalListResponse:
      type: object
      required: [proposals, total, limit, offset]
      properties:
        proposals:
          type: array
          items: { $ref: "#/components/schemas/GuardianProposalListItem" }
        total: { type: integer, format: int64 }
        limit: { type: integer }
        offset: { type: integer }

    ChatConfirmRequest:
      type: object
      required: [proposal_id]
      properties:
        proposal_id:
          type: string
          format: uuid

    ChatConfirmResponse:
      type: object
      required: [summary]
      properties:
        summary:
          type: string
          description: Short operator-facing confirmation message.
        result:
          type: object
          additionalProperties: true
          description: >
            Tool-specific result payload (e.g. `{alert_id, is_acknowledged}` for
            alert tools, `GuardianGrowSetupPackResult` fields for setup pack confirms).

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: User-supplied prompt. Trimmed + whitespace-collapsed by the server (`farmguardian.BuildUserMessage`).
        farm_id:
          type: integer
          format: int64
          nullable: true
          description: When supplied, switches the turn to the grounded path — runs RAG retrieval, attaches the live farm-state snapshot, requires farm membership.
        session_id:
          type: string
          format: uuid
          nullable: true
          description: Existing session UUID for multi-turn context. Omit to start a new session — the server allocates and returns a fresh UUID.
        stream:
          type: boolean
          default: false
          description: When `true`, response is `text/event-stream` (SSE) instead of a single JSON document.
        context_ref:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/GuardianContextRef" }
          description: Optional contextual focus from Ask Guardian entry points (Phase 29 WS6).
        attachment_ids:
          type: array
          maxItems: 3
          items: { type: integer, format: int64, minimum: 1 }
          description: >
            Zone reference photo attachment ids for a multimodal turn (Phase 30 WS6).
            Requires `farm_id` and vision LLM configuration. JPEG/PNG/WebP only.

    ChatCitation:
      type: object
      required: [ref, chunk_id, source_type, source_id, excerpt]
      properties:
        ref:
          type: integer
          description: "1-based index referenced inline by the assistant message (e.g. `[1]`)."
        chunk_id: { type: integer, format: int64 }
        source_type: { type: string }
        source_id: { type: integer, format: int64 }
        excerpt:
          type: string
          description: Truncated chunk text for UI display.

    ChatResponse:
      type: object
      required: [answer, llm_model, grounded, session_id, turn_index, prompt_tokens, completion_tokens, context_count]
      properties:
        answer: { type: string }
        llm_model:
          type: string
          description: "Model label the API reported to the client (`llm.ChatCompleter.ModelLabel`)."
        grounded:
          type: boolean
          description: "`true` when the turn ran the RAG + snapshot path."
        session_id: { type: string, format: uuid }
        turn_index:
          type: integer
          description: "0-based ordinal assigned by SQL `COALESCE(MAX+1, 0)`. `-1` when the turn was not persisted (dev-bypass requests)."
        citations:
          type: array
          description: Inline references. Only present for grounded turns.
          items: { $ref: "#/components/schemas/ChatCitation" }
        context_count:
          type: integer
          description: Number of chunks fed to the LLM (0 for plain turns).
        embedding_model_id:
          type: string
          description: Embedding model used for retrieval (grounded turns only).
        prompt_tokens:
          type: integer
          description: Tokens accounted to the prompt for this turn. 0 for streaming clients that don't surface usage.
        completion_tokens:
          type: integer
          description: Tokens accounted to the completion for this turn.
        proposals:
          type: array
          description: Rule-assisted action proposals (grounded turns only, Phase 29).
          items: { $ref: "#/components/schemas/GuardianActionProposal" }
        vision_used:
          type: boolean
          description: True when this turn used the vision LLM with attached images (Phase 30 WS6).
        attachment_ids:
          type: array
          items: { type: integer, format: int64 }
          description: Echo of zone photo ids sent on the request (when any).
        procedure:
          $ref: "#/components/schemas/FieldProcedureTurn"
          description: Present when the turn was handled by the guided procedure driver (no LLM).
        field_degraded:
          type: boolean
          description: True when the turn used WS1 offline degrade (LLM unreachable; static procedure path).

    FieldProcedureSummary:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        domain: { type: string }
        offline_ok: { type: boolean }
        step_count: { type: integer }

    FieldProcedure:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        domain: { type: string }
        offline_ok: { type: boolean }
        steps:
          type: array
          items:
            type: object
            properties:
              n: { type: integer }
              safety_tier: { type: string }
              say: { type: string }
              confirm: { type: string }
              ref: { type: string }

    FieldProcedureTurn:
      type: object
      properties:
        procedure_id: { type: string }
        title: { type: string }
        step_n: { type: integer }
        step_total: { type: integer }
        safety_tier: { type: string }
        status: { type: string }
        safety_stopped: { type: boolean }
        print_path: { type: string }

    ChatStreamEvent:
      type: object
      description: >
        Logical shape of a single SSE event sent on a streaming chat. The
        actual wire format is `event: <type>\ndata: <json>\n\n`. Three
        types: `token` (incremental text delta), `done` (terminal event
        carrying citations + usage + session_id + turn_index), and `error`
        (terminal error event with a human-readable message).
      properties:
        type:
          type: string
          enum: [token, done, error]
        delta:
          type: string
          description: Present on `token` events.
        answer:
          type: string
          description: Final answer text. Present on `done`.
        session_id: { type: string, format: uuid, description: Present on `done`. }
        turn_index: { type: integer, description: Present on `done`. }
        grounded: { type: boolean, description: Present on `done`. }
        citations:
          type: array
          items: { $ref: "#/components/schemas/ChatCitation" }
          description: Present on `done` (grounded turns only).
        context_count: { type: integer, description: Present on `done`. }
        llm_model: { type: string, description: Present on `done`. }
        prompt_tokens: { type: integer, description: Present on `done`. }
        completion_tokens: { type: integer, description: Present on `done`. }
        proposals:
          type: array
          items: { $ref: "#/components/schemas/GuardianActionProposal" }
          description: Present on `done` when rule-assisted proposals were created (Phase 29).
        vision_used:
          type: boolean
          description: Present on `done` when vision attachments were processed (Phase 30 WS6).
        attachment_ids:
          type: array
          items: { type: integer, format: int64 }
          description: Present on `done` when images were attached.
        error: { type: string, description: Present on `error`. }

    ChatCostGuardError:
      type: object
      description: 429 body when the per-user or per-farm cap is exhausted. The `Retry-After` header carries the same value.
      properties:
        error: { type: string, example: "chat token budget exceeded; try again later" }
        reason: { type: string, enum: [per_user, per_farm], description: Which cap fired. }
        used_tokens: { type: integer, format: int64 }
        max_tokens: { type: integer, format: int64 }
        window_seconds: { type: integer, format: int64 }
        retry_after_seconds: { type: integer }

    ChatSessionSummary:
      type: object
      description: Sidebar-friendly rollup. `title` is operator-set; UIs fall back to `first_user_message` when null.
      properties:
        session_id: { type: string, format: uuid }
        title: { type: string, nullable: true }
        turn_count: { type: integer }
        last_turn_at: { type: string, format: date-time }
        any_grounded: { type: boolean, description: True when any turn in this session ran the RAG / snapshot path. }
        first_user_message: { type: string, nullable: true }
        last_assistant_message: { type: string, nullable: true }
        last_farm_id: { type: integer, format: int64, nullable: true }
        total_prompt_tokens: { type: integer, format: int64 }
        total_completion_tokens: { type: integer, format: int64 }

    ChatSessionListResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items: { $ref: "#/components/schemas/ChatSessionSummary" }

    ChatSessionTurn:
      type: object
      properties:
        turn_index: { type: integer }
        user_message: { type: string }
        assistant_message: { type: string }
        llm_model: { type: string }
        grounded: { type: boolean }
        context_count: { type: integer }
        citations:
          type: array
          items: { $ref: "#/components/schemas/ChatCitation" }
        farm_id: { type: integer, format: int64, nullable: true }
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        created_at: { type: string, format: date-time }

    ChatSessionDetailResponse:
      type: object
      required: [session_id, turns]
      properties:
        session_id: { type: string, format: uuid }
        turns:
          type: array
          items: { $ref: "#/components/schemas/ChatSessionTurn" }

    ChatSessionPatchRequest:
      type: object
      description: 'Send `{title: null}` or `{title: ""}` to clear the title.'
      properties:
        title: { type: string, nullable: true, maxLength: 120 }

    ChatSessionPatchResponse:
      type: object
      required: [session_id, updated_at]
      properties:
        session_id: { type: string, format: uuid }
        title: { type: string, nullable: true }
        updated_at: { type: string, format: date-time }

    ChatUsageDimension:
      type: object
      description: Per-user or per-farm rolling-window usage block.
      required: [used_tokens, max_tokens, remaining_tokens, pct_used]
      properties:
        used_tokens:
          type: integer
          format: int64
          description: Total `prompt_tokens + completion_tokens` consumed in the window.
        max_tokens:
          type: integer
          format: int64
          description: Configured cap. `0` means the cap is disabled for this dimension.
        remaining_tokens:
          type: integer
          format: int64
          description: Clamped to zero once `used_tokens >= max_tokens`. `0` when uncapped.
        pct_used:
          type: number
          format: float
          minimum: 0
          description: "`used_tokens / max_tokens` rounded to 4 decimals. `0` when uncapped."
        warning_threshold_pct:
          type: number
          format: float
          description: Fraction at which the `chat_budget_warning` alert fires (currently `0.80`). Present only on the user dimension when the cap is configured.

    ChatUsageFarmDimension:
      allOf:
        - $ref: "#/components/schemas/ChatUsageDimension"
        - type: object
          required: [farm_id]
          properties:
            farm_id: { type: integer, format: int64 }

    ChatUsageResponse:
      type: object
      required: [window_hours, ai_enabled, user]
      properties:
        window_hours:
          type: integer
          description: Cost-guard window length. `CHAT_COST_WINDOW_HOURS`, default 1, clamped 1..168.
        ai_enabled: { type: boolean }
        user: { $ref: "#/components/schemas/ChatUsageDimension" }
        farm:
          $ref: "#/components/schemas/ChatUsageFarmDimension"

    # ── Crop-cycle analytics (Phase 28 WS1) ──────────────────────────

    CropCycleSummaryFertigation:
      type: object
      properties:
        event_count: { type: integer, format: int64 }
        total_liters: { type: number, format: double }
        avg_ec_mscm: { type: number, format: double }
        min_ec_mscm: { type: number, format: double }
        max_ec_mscm: { type: number, format: double }
        avg_ph: { type: number, format: double }

    CropCycleSummaryCostTotal:
      type: object
      required: [currency, total_income, total_expenses, net]
      properties:
        currency: { type: string, example: USD }
        total_income: { type: number, format: double }
        total_expenses: { type: number, format: double }
        net: { type: number, format: double }

    CropCycleSummaryCostCategory:
      type: object
      required: [category, currency, income, expense, net, tx_count]
      properties:
        category: { type: string }
        currency: { type: string }
        income: { type: number, format: double }
        expense: { type: number, format: double }
        net: { type: number, format: double }
        tx_count: { type: integer, format: int64 }

    CropCycleSummaryCost:
      type: object
      properties:
        totals:
          type: array
          items: { $ref: "#/components/schemas/CropCycleSummaryCostTotal" }
        by_category:
          type: array
          items: { $ref: "#/components/schemas/CropCycleSummaryCostCategory" }

    CropCycleSummaryYield:
      type: object
      description: >
        `grams_per_liter`, `grams_per_day`, and `cost_per_gram` are nullable
        when the underlying inputs are missing (no harvest yet, no
        fertigation events, multiple currencies in cost rows, …).
      properties:
        grams: { type: number, format: double }
        grams_per_liter: { type: number, format: double, nullable: true }
        grams_per_day: { type: number, format: double, nullable: true }
        cost_per_gram: { type: number, format: double, nullable: true }

    CropCycleSummaryStage:
      type: object
      required: [stage]
      properties:
        stage: { $ref: "#/components/schemas/GrowthStageEnum" }
        entered_at:
          type: string
          format: date-time
          description: When the cycle entered this stage. Currently the cycle's `started_at` (single stand-in row); the timeline becomes real once schema-level stage history lands.

    CropCycleSummary:
      type: object
      required: [cycle, duration_days, fertigation, cost, yield, stages, stage_history_supported]
      properties:
        cycle: { $ref: "#/components/schemas/CropCycle" }
        duration_days:
          type: integer
          format: int64
          description: Days from `started_at` to `harvested_at` (or now if the cycle is still active).
        fertigation: { $ref: "#/components/schemas/CropCycleSummaryFertigation" }
        cost: { $ref: "#/components/schemas/CropCycleSummaryCost" }
        yield: { $ref: "#/components/schemas/CropCycleSummaryYield" }
        stages:
          type: array
          items: { $ref: "#/components/schemas/CropCycleSummaryStage" }
        stage_history_supported:
          type: boolean
          description: "`false` while the schema can only produce the stand-in single-row history. The UI surfaces this so operators don't read the timeline as definitive."

    CropCycleCompareResponse:
      type: object
      required: [cycles]
      properties:
        cycles:
          type: array
          items: { $ref: "#/components/schemas/CropCycleSummary" }

    FileAttachmentDownloadTarget:
      type: object
      required: [url, backend, proxied, file_name]
      properties:
        url: { type: string }
        backend: { type: string, example: local }
        proxied: { type: boolean }
        expires_at: { type: string, format: date-time, nullable: true }
        file_name: { type: string }

    Unit:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, example: celsius }
        unit_type: { type: string, example: temperature }
        symbol: { type: string, example: "C" }
        base_unit_name: { type: string }
        conversion_to_base: { type: number }
        is_base_unit: { type: boolean }

    Farm:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, example: gr33n Demo Farm }
        description: { type: string }
        location_text: { type: string }
        farm_type: { type: string }
        scale_tier: { type: string, enum: [small, medium, large, enterprise] }
        operational_status: { type: string }
        timezone: { type: string, example: UTC }
        currency: { type: string, example: USD }
        organization_id: { type: integer, nullable: true, description: Optional parent organization for multi-farm tenancy }
        created_at: { type: string, format: date-time }
        insert_commons_opt_in: { type: boolean }
        insert_commons_require_approval: { type: boolean, description: When true, manual sync queues payloads until a farm admin approves }
        insert_commons_last_sync_at: { type: string, format: date-time, nullable: true }
        insert_commons_last_attempt_at: { type: string, format: date-time, nullable: true }
        insert_commons_last_delivery_status: { type: string, nullable: true }
        insert_commons_last_error: { type: string, nullable: true }
        insert_commons_backoff_until: { type: string, format: date-time, nullable: true }
        insert_commons_consecutive_failures: { type: integer }

    InsertCommonsSyncResponse:
      type: object
      properties:
        ok: { type: boolean }
        duplicate: { type: boolean }
        farm_id: { type: integer }
        idempotency_key: { type: string }
        delivery_status: { type: string }
        http_status: { type: integer, nullable: true }
        last_sync_at: { type: string, format: date-time, nullable: true }
        last_attempt_at: { type: string, format: date-time, nullable: true }
        backoff_until: { type: string, format: date-time, nullable: true }
        aggregates: { type: object, additionalProperties: true }
        privacy_notice: { type: string }
        receiver_contract: { type: object, additionalProperties: true }
        receiver_error_excerpt: { type: string, nullable: true }
        pending_approval: { type: boolean, description: True when payload is queued for human approval }
        bundle_id: { type: integer, format: int64, nullable: true }

    InsertCommonsPreviewResponse:
      type: object
      required: [valid]
      properties:
        valid: { type: boolean, description: True when payload was built and passed schema validation }
        schema_version: { type: string }
        farm_pseudonym: { type: string }
        generated_at: { type: string, description: RFC3339 timestamp from the preview payload }
        payload:
          type: object
          additionalProperties: true
          description: Full ingest JSON (Insert Commons v1 shape)
        privacy_notice: { type: string }
        receiver_contract: { type: object, additionalProperties: true }

    InsertCommonsSyncEvent:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        idempotency_key: { type: string, nullable: true }
        status: { type: string }
        http_status: { type: integer, nullable: true }
        error: { type: string, nullable: true }
        bundle_id: { type: integer, format: int64, nullable: true }
        created_at: { type: string, format: date-time }

    InsertCommonsBundle:
      type: object
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer }
        idempotency_key: { type: string, nullable: true }
        payload_hash: { type: string }
        status:
          type: string
          enum: [pending_approval, approved, rejected, delivered, delivery_failed]
        reviewer_user_id: { type: string, format: uuid, nullable: true }
        reviewed_at: { type: string, format: date-time, nullable: true }
        review_note: { type: string, nullable: true }
        delivery_http_status: { type: integer, nullable: true }
        delivery_error: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    InsertCommonsBundleDeliveryResult:
      type: object
      properties:
        ok: { type: boolean }
        farm_id: { type: integer }
        bundle_id: { type: integer, format: int64 }
        delivery_status: { type: string }
        http_status: { type: integer, nullable: true }
        last_sync_at: { type: string, format: date-time, nullable: true }
        last_attempt_at: { type: string, format: date-time, nullable: true }
        receiver_error_excerpt: { type: string, nullable: true }

    AuditActivityEvent:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        user_id: { type: string, format: uuid, nullable: true }
        activity_time: { type: string, format: date-time }
        action_type:
          type: string
          description: Matches gr33ncore.user_action_type_enum (e.g. change_setting, export_data, delete_record).
        target_module_schema: { type: string, nullable: true }
        target_table_name: { type: string, nullable: true }
        target_record_id: { type: string, nullable: true }
        target_record_description: { type: string, nullable: true }
        user_agent: { type: string, nullable: true }
        ip_address: { type: string, nullable: true }
        status: { type: string, nullable: true }
        failure_reason: { type: string, nullable: true }
        details: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }

    Zone:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        name: { type: string, example: Veg Room }
        description: { type: string }
        zone_type:
          type: string
          description: >
            e.g. indoor, outdoor, greenhouse. When greenhouse, optional
            `meta_data.greenhouse_climate` is validated on write.
        area_sqm: { type: number }
        meta_data:
          type: object
          description: >
            JSON bag. Phase 36: `greenhouse_climate` profile when
            `zone_type=greenhouse`. Phase 30: `photo_attachment_ids`.
        created_at: { type: string, format: date-time }

    ZoneCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        zone_type: { type: string, example: greenhouse }
        area_sqm: { type: number }
        meta_data:
          type: object
          properties:
            greenhouse_climate:
              { $ref: "#/components/schemas/GreenhouseClimate" }

    ZoneUpdate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        zone_type: { type: string, example: greenhouse }
        area_sqm: { type: number }
        meta_data:
          type: object
          properties:
            greenhouse_climate:
              { $ref: "#/components/schemas/GreenhouseClimate" }
        updated_by_user_id: { type: string, format: uuid }

    GreenhouseClimate:
      type: object
      description: >
        Phase 36 — stored at `zones.meta_data.greenhouse_climate` when
        `zone_type=greenhouse`. Validated on zone create/update.
      properties:
        cover_type:
          type: string
          enum: [glass, polycarbonate, film]
          description: Glazing / cover material for operator context.
        shade_actuator_id:
          type: integer
          nullable: true
          description: Actuator id for shade_screen (or legacy shade motor).
        vent_actuator_id:
          type: integer
          nullable: true
          description: Actuator id for ridge_vent.
        fan_actuator_ids:
          type: array
          items: { type: integer }
          description: Exhaust and/or circulation fan actuator ids.
        automation_policy:
          type: string
          enum: [auto, manual, schedule_only]
          description: >
            auto — sensor rules expected; manual — operator/Guardian only;
            schedule_only — time-based shade retract/deploy without lux predicates.
        notes:
          type: string
          description: Free-text operator notes (e.g. end-wall glazing).

    FarmCreate:
      type: object
      required: [name, owner_user_id, timezone, currency, operational_status, scale_tier]
      properties:
        name: { type: string, example: My New Farm }
        description: { type: string }
        location_text: { type: string }
        size_hectares: { type: number }
        farm_type: { type: string }
        scale_tier: { type: string, enum: [small, medium, large, enterprise] }
        owner_user_id: { type: string, format: uuid }
        timezone: { type: string, example: UTC }
        currency: { type: string, example: USD }
        operational_status: { type: string }
        organization_id: { type: integer, nullable: true, description: Optional; requires org admin role }
        bootstrap_template:
          type: string
          nullable: true
          description: Optional bootstrap key (`jadam_indoor_photoperiod_v1`, `chicken_coop_v1`, `greenhouse_climate_v1`, `drying_room_v1`, `small_aquaponics_v1`) or `none` / `blank` to skip. Omit for a blank farm response shape.

    FarmCreatedWithBootstrap:
      type: object
      required: [farm, bootstrap]
      properties:
        farm: { $ref: "#/components/schemas/Farm" }
        bootstrap:
          type: object
          additionalProperties: true
          description: Result JSON from apply_farm_bootstrap_template (skipped, applied, already_applied, error, etc.)

    FarmBootstrapApplyResponse:
      type: object
      properties:
        farm_id: { type: integer }
        bootstrap:
          type: object
          additionalProperties: true

    FarmUpdate:
      type: object
      required: [name, timezone, currency, operational_status, scale_tier]
      properties:
        name: { type: string }
        description: { type: string }
        location_text: { type: string }
        size_hectares: { type: number }
        farm_type: { type: string }
        scale_tier: { type: string, enum: [small, medium, large, enterprise] }
        timezone: { type: string }
        currency: { type: string }
        operational_status: { type: string }
        updated_by_user_id: { type: string, format: uuid }
        organization_id: { type: integer, nullable: true }

    FarmOrganizationPatch:
      type: object
      required: [organization_id]
      properties:
        organization_id:
          type: integer
          nullable: true
          description: Organization id to link, or null to unlink

    Organization:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        plan_tier: { type: string, description: Billing / product tier hook (e.g. pilot, standard) }
        billing_status: { type: string, description: e.g. none, trialing, active }
        default_bootstrap_template:
          type: string
          nullable: true
          description: >
            When set, `POST /farms` may apply this template for new farms that set `organization_id` to this org
            and omit `bootstrap_template` (see farm create). Use `null` in PATCH to clear.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    OrganizationWithMembership:
      allOf:
        - { $ref: "#/components/schemas/Organization" }
        - type: object
          required: [role_in_org]
          properties:
            role_in_org: { type: string, enum: [owner, admin, member] }

    OrganizationCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        plan_tier: { type: string }
        billing_status: { type: string }

    OrganizationUpdate:
      type: object
      properties:
        name: { type: string }
        plan_tier: { type: string }
        billing_status: { type: string }
        default_bootstrap_template:
          type: string
          nullable: true
          description: Farm bootstrap key (e.g. jadam_indoor_photoperiod_v1, chicken_coop_v1, greenhouse_climate_v1, drying_room_v1, small_aquaponics_v1) or null to clear the org default

    OrganizationUsageSummary:
      type: object
      properties:
        farm_count: { type: integer, format: int64 }
        device_count: { type: integer, format: int64 }
        sensor_count: { type: integer, format: int64 }
        task_count: { type: integer, format: int64 }
        cost_transaction_count: { type: integer, format: int64 }

    OrganizationMemberInvite:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        role_in_org: { type: string, enum: [member, admin], default: member }

    OrganizationMembership:
      type: object
      properties:
        organization_id: { type: integer }
        user_id: { type: string, format: uuid }
        role_in_org: { type: string }
        joined_at: { type: string, format: date-time }

    Sensor:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        zone_id: { type: integer, nullable: true }
        device_id: { type: integer, nullable: true }
        name: { type: string, example: Air Temp Indoor }
        sensor_type: { type: string, example: temperature }
        unit_id: { type: integer }
        hardware_identifier: { type: string, nullable: true }
        value_min_expected: { type: number, nullable: true }
        value_max_expected: { type: number, nullable: true }
        alert_threshold_low: { type: number, nullable: true }
        alert_threshold_high: { type: number, nullable: true }
        reading_interval_seconds: { type: integer, nullable: true }
        alert_duration_seconds:
          type: integer
          minimum: 0
          maximum: 86400
          default: 0
          description: >
            Minimum sustained time (seconds) a reading must stay out of bounds before an alert
            is emitted. 0 means alert on the first breaching reading.
        alert_cooldown_seconds:
          type: integer
          minimum: 0
          maximum: 604800
          default: 300
          description: >
            Minimum quiet window (seconds) after an alert fires before another alert can fire
            for the same sensor. Measured against the most recent alert's created_at.
        alert_breach_started_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: >
            Internal evaluator state — when the current out-of-range streak started.
            NULL while the reading is in bounds.
        created_at: { type: string, format: date-time }

    SensorCreate:
      type: object
      required: [name, sensor_type, unit_id]
      properties:
        name: { type: string }
        sensor_type: { type: string }
        unit_id: { type: integer }
        zone_id: { type: integer }
        device_id: { type: integer }
        hardware_identifier: { type: string }
        reading_interval_seconds: { type: integer }
        value_min_expected: { type: number }
        value_max_expected: { type: number }
        alert_threshold_low: { type: number }
        alert_threshold_high: { type: number }
        alert_duration_seconds: { type: integer, minimum: 0, maximum: 86400, default: 0 }
        alert_cooldown_seconds: { type: integer, minimum: 0, maximum: 604800, default: 300 }

    SensorUpdate:
      type: object
      description: >
        Patch-style update. Any field omitted from the body leaves the stored value unchanged.
        Pass JSON null explicitly to clear a nullable field (e.g. a threshold).
      properties:
        zone_id: { type: integer, nullable: true }
        device_id: { type: integer, nullable: true }
        name: { type: string }
        sensor_type: { type: string }
        unit_id: { type: integer }
        hardware_identifier: { type: string, nullable: true }
        value_min_expected: { type: number, nullable: true }
        value_max_expected: { type: number, nullable: true }
        alert_threshold_low: { type: number, nullable: true }
        alert_threshold_high: { type: number, nullable: true }
        reading_interval_seconds: { type: integer, nullable: true }
        alert_duration_seconds: { type: integer, minimum: 0, maximum: 86400 }
        alert_cooldown_seconds: { type: integer, minimum: 0, maximum: 604800 }

    SensorReading:
      type: object
      properties:
        reading_time: { type: string, format: date-time }
        sensor_id: { type: integer }
        value_raw: { type: number, example: 22.5 }
        value_normalized: { type: number }
        normalized_unit_id: { type: integer, nullable: true }
        value_text: { type: string, nullable: true }
        battery_level_percent: { type: number, nullable: true }
        signal_strength_dbm: { type: integer, nullable: true }
        is_valid: { type: boolean }

    SensorReadingCreate:
      type: object
      required: [value_raw]
      properties:
        value_raw: { type: number }
        reading_time: { type: string, format: date-time }
        value_text: { type: string }
        battery_level_percent: { type: number }
        signal_strength_dbm: { type: integer }
        is_valid: { type: boolean, default: true }

    SensorReadingBatchItem:
      allOf:
        - { $ref: "#/components/schemas/SensorReadingCreate" }
        - type: object
          required: [sensor_id]
          properties:
            sensor_id: { type: integer, description: gr33ncore.sensors.id }

    SensorReadingBatchResponse:
      type: object
      required: [inserted, readings]
      properties:
        inserted: { type: integer }
        readings:
          type: array
          items: { $ref: "#/components/schemas/SensorReading" }

    SensorReadingStats:
      type: object
      properties:
        count: { type: integer, format: int64 }
        avg: { type: number }
        min: { type: number, nullable: true }
        max: { type: number, nullable: true }
        first_reading_time: { type: string, format: date-time, nullable: true }
        last_reading_time: { type: string, format: date-time, nullable: true }

    Device:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        zone_id: { type: integer, nullable: true }
        name: { type: string, example: Veg Room Fan }
        device_uid: { type: string, nullable: true }
        device_type: { type: string }
        ip_address: { type: string, nullable: true }
        firmware_version: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/DeviceStatusEnum" }
        last_heartbeat: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    DeviceCreate:
      type: object
      required: [name, device_type]
      properties:
        name: { type: string }
        device_type: { type: string }
        zone_id: { type: integer }
        device_uid: { type: string }
        ip_address: { type: string }

    DeviceStatusEnum:
      type: string
      enum: [online, offline, error_comms, error_hardware,
             maintenance_mode, initializing, unknown,
             decommissioned, pending_activation]

    Actuator:
      type: object
      properties:
        id: { type: integer }
        device_id: { type: integer, nullable: true }
        farm_id: { type: integer }
        zone_id: { type: integer, nullable: true }
        name: { type: string }
        actuator_type:
          type: string
          description: >
            Phase 36 greenhouse types include shade_screen, ridge_vent,
            exhaust_fan, circulation_fan, glazing_panel. Legacy bootstrap
            may use shade_cloth_motor. Lighting uses light / grow_light.
        hardware_identifier: { type: string, nullable: true }
        config:
          type: object
          description: >
            Per-type JSON (channel, normally_open, max_run_seconds for motors).
          nullable: true
        current_state_numeric: { type: number, nullable: true }
        current_state_text: { type: string, nullable: true }
        last_known_state_time: { type: string, format: date-time, nullable: true }
        feedback_sensor_id: { type: integer, nullable: true }
        watts:
          type: number
          default: 0
          description: >
            Phase 20.95 WS2 — nameplate wattage used by the forthcoming nightly
            electricity rollup (Phase 20.7 WS4). DEFAULT 0 NOT NULL: 0 means
            "unknown / unmetered" and drops the actuator out of the rollup.
        created_at: { type: string, format: date-time }

    ActuatorConfig:
      type: object
      description: Optional actuator config validated per actuator_type (Phase 36).
      properties:
        channel: { type: integer, description: Pi GPIO / relay channel index }
        normally_open: { type: boolean }
        max_run_seconds:
          type: integer
          minimum: 1
          description: Motor run cap for shade_screen / ridge_vent / glazing_panel
        percent_open_supported:
          type: boolean
          description: Ridge vent supports percentage open commands

    ActuatorCreate:
      type: object
      required: [name, actuator_type]
      properties:
        name: { type: string, example: GH shade screen }
        actuator_type:
          type: string
          example: shade_screen
        zone_id: { type: integer, nullable: true }
        device_id: { type: integer, nullable: true }
        hardware_identifier: { type: string, nullable: true }
        feedback_sensor_id: { type: integer, nullable: true }
        config: { $ref: "#/components/schemas/ActuatorConfig" }
        meta_data: { type: object }

    ActuatorWithCommands:
      allOf:
        - { $ref: "#/components/schemas/Actuator" }
        - type: object
          properties:
            valid_commands:
              type: array
              items: { type: string }
              description: >
                Typed command vocabulary for this actuator_type (e.g. deploy,
                retract, stop for shade_screen; on/off for exhaust_fan).

    ActuatorCommandEnqueue:
      type: object
      required: [command]
      properties:
        command:
          type: string
          example: deploy
          description: Must match valid_commands for the actuator type
        reason:
          type: string
          nullable: true
          description: Optional operator note stored on pending_command
        duration_seconds:
          type: integer
          minimum: 1
          maximum: 3600
          nullable: true
          description: >
            Phase 38 — timed pulse for pump/relay/valve types. Pi turns on, waits,
            then turns off. Fertigation programs pass the same field from run_duration_seconds.

    ActuatorCommandEnqueueResult:
      type: object
      properties:
        device_id: { type: integer }
        actuator_id: { type: integer }
        command: { type: string }
        duration_seconds: { type: integer, nullable: true }
        pulse_supported: { type: boolean }
        pending_command: { type: object }
        actuator_name: { type: string }
        device_name: { type: string }
        valid_commands:
          type: array
          items: { type: string }

    GreenhouseRuleTemplatesApply:
      type: object
      required: [zone_id]
      properties:
        zone_id: { type: integer }
        shade_actuator_id:
          type: integer
          nullable: true
          description: Enables high-lux deploy + night retract rules when set
        fan_actuator_id:
          type: integer
          nullable: true
          description: Enables high-temp exhaust fan rule when set
        lux_sensor_id:
          type: integer
          nullable: true
          description: Lux sensor for high-lux shade rule (threshold 80000)
        temp_sensor_id:
          type: integer
          nullable: true
          description: Air temp sensor for fan + night retract rules
        allow_missing_lux_sensor:
          type: boolean
          default: false
          description: When true, skip high-lux shade template if lux_sensor_id omitted (WS6 interlock)
        allow_missing_temp_sensor:
          type: boolean
          default: false
          description: When true, skip temp-driven templates if temp_sensor_id omitted (WS6 interlock)

    GreenhouseRuleTemplatesResult:
      type: object
      properties:
        rules_created: { type: integer }
        skipped_rule_families:
          type: array
          items: { type: string }
        zone_sensor_interlocks:
          type: object
          properties:
            has_lux_or_par: { type: boolean }
            has_temperature: { type: boolean }
            has_humidity: { type: boolean }
        required_sensors:
          type: object
          additionalProperties: true
        zone_id: { type: integer }
        error: { type: string, description: Present when farm or zone invalid }

    ActuatorEvent:
      type: object
      properties:
        event_time: { type: string, format: date-time }
        actuator_id: { type: integer }
        command_sent: { type: string, nullable: true }
        parameters_sent: { type: object, nullable: true }
        triggered_by_schedule_id: { type: integer, nullable: true }
        triggered_by_rule_id: { type: integer, nullable: true }
        meta_data:
          type: object
          nullable: true
          description: >
            Includes ``program_id`` and ``reported_by: pi_client`` when the
            Pi reported execution for a program-bound command.
        source: { type: string }
        execution_status:
          type: object
          nullable: true
          properties:
            gr33ncore_actuator_execution_status_enum: { type: string }
            valid: { type: boolean }

    Schedule:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        schedule_type: { type: string }
        cron_expression: { type: string }
        timezone: { type: string }
        is_active: { type: boolean }
        last_triggered_time: { type: string, format: date-time, nullable: true }
        next_expected_trigger_time: { type: string, format: date-time, nullable: true }
        preconditions:
          type: array
          description: >
            Interlock-lite rules evaluated before the worker fires any executable
            action for this schedule. Empty array = no interlock.
          items: { $ref: "#/components/schemas/SchedulePrecondition" }
        created_at: { type: string, format: date-time }

    SchedulePrecondition:
      type: object
      required: [sensor_id, op, value]
      description: >
        Predicate against the latest reading for a sensor. If any precondition
        fails at tick time the worker records an automation_runs row with
        status='skipped' and message='precondition_failed', and no actuator
        commands are written. Missing readings count as a failure.
      properties:
        sensor_id:
          type: integer
          description: Must belong to the same farm as the schedule.
        op:
          type: string
          enum: [lt, lte, eq, gte, gt, ne]
        value:
          type: number

    ScheduleCreate:
      type: object
      required: [name, schedule_type, cron_expression]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        schedule_type:
          type: string
          description: Application-defined schedule type (e.g. "irrigation", "alert_check")
        cron_expression:
          type: string
          description: Standard 5-field cron expression
          example: "0 */6 * * *"
        timezone: { type: string, default: UTC }
        is_active: { type: boolean, default: false }
        meta_data:
          type: object
          description: Arbitrary JSON payload consumed by the worker for this schedule type
          additionalProperties: true
        preconditions:
          type: array
          description: Optional interlock rules (default empty array).
          items: { $ref: "#/components/schemas/SchedulePrecondition" }

    ScheduleUpdate:
      allOf:
        - $ref: "#/components/schemas/ScheduleCreate"
      description: >
        Omitting `preconditions` preserves the existing interlock rules. Send
        an empty array to clear them.

    LightingPreset:
      type: object
      properties:
        key: { type: string, example: veg_18_6 }
        name: { type: string, example: "Veg 18/6 (Vegetative)" }
        on_hours: { type: integer, minimum: 1, maximum: 24 }
        off_hours: { type: integer, minimum: 0, maximum: 23 }

    LightingProgram:
      type: object
      description: >
        First-class photoperiod entity. Owns paired ON/OFF schedules and
        grow-light actuator actions. `on_hours + off_hours` must equal 24.
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        zone_id: { type: integer }
        actuator_id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        on_hours: { type: integer }
        off_hours: { type: integer }
        lights_on_at:
          type: string
          description: Anchor time HH:MM (24-hour)
          example: "06:00"
        timezone: { type: string, example: America/New_York }
        schedule_on_id: { type: integer, nullable: true }
        schedule_off_id: { type: integer, nullable: true }
        crop_cycle_id: { type: integer, nullable: true }
        is_active: { type: boolean }
        metadata: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    LightingProgramCreate:
      type: object
      required: [name, zone_id, actuator_id, on_hours, off_hours]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        zone_id: { type: integer }
        actuator_id: { type: integer }
        on_hours: { type: integer, minimum: 1, maximum: 24 }
        off_hours: { type: integer, minimum: 0, maximum: 23 }
        lights_on_at: { type: string, default: "06:00" }
        timezone: { type: string, default: UTC }
        crop_cycle_id: { type: integer, nullable: true }
        is_active: { type: boolean, default: true }
        metadata: { type: object }

    LightingProgramFromPreset:
      type: object
      required: [preset_key, zone_id, actuator_id]
      properties:
        preset_key:
          type: string
          enum: [peas_22_2, veg_18_6, flower_12_12, seedling_16_8]
        name: { type: string, nullable: true }
        zone_id: { type: integer }
        actuator_id: { type: integer }
        lights_on_at: { type: string, default: "06:00" }
        timezone: { type: string }
        crop_cycle_id: { type: integer, nullable: true }

    LightingProgramUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        on_hours: { type: integer }
        off_hours: { type: integer }
        lights_on_at: { type: string }
        timezone: { type: string }
        crop_cycle_id: { type: integer, nullable: true }
        is_active: { type: boolean }
        metadata: { type: object }

    AutomationRun:
      type: object
      description: >
        One row per worker tick outcome. Exactly one of `schedule_id`,
        `rule_id`, or `program_id` is populated (schedule/rule/program
        attribution is mutually exclusive). `details.action_source` on
        program runs is either `executable_actions` (DB-stored rows)
        or `metadata_steps_fallback` (synthesised from
        `programs.metadata.steps` — programs still on the fallback
        path will also log a worker warning every minute they fire).
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        schedule_id: { type: integer, nullable: true }
        rule_id: { type: integer, nullable: true }
        program_id:
          type: integer
          nullable: true
          description: >
            Phase 22 WS1 — set when the worker's program-tick fires a
            fertigation program. Null for schedule- or rule-driven runs.
        status: { type: string, enum: [success, partial_success, failed, skipped] }
        message: { type: string, nullable: true }
        details: { type: object, nullable: true }
        executed_at: { type: string, format: date-time }

    # ── Automation rules (Phase 20 WS1) ───────────────────────

    AutomationTriggerSource:
      type: string
      description: Must match the `gr33ncore.automation_trigger_source_enum` DB enum.
      enum:
        - sensor_reading_threshold
        - specific_time_cron
        - actuator_state_changed
        - manual_api_trigger
        - task_status_updated
        - new_system_log_event
        - external_webhook_received

    ExecutableActionType:
      type: string
      description: >
        Must match the `gr33ncore.executable_action_type_enum` DB enum. Phase
        20 dispatches `control_actuator`, `create_task`, and
        `send_notification`; other values are rejected with HTTP 400 at the
        write path until a later phase wires up their dispatchers.
      enum:
        - control_actuator
        - create_task
        - send_notification
        - trigger_another_automation_rule
        - http_webhook_call
        - update_record_in_gr33n
        - log_custom_event

    RulePredicate:
      type: object
      required: [sensor_id, op, value]
      description: >
        Predicate against the latest reading for a sensor. Mirrors the shape
        used by schedule preconditions so the worker can reuse its evaluator.
      properties:
        sensor_id:
          type: integer
          description: Must belong to the same farm as the rule.
        op:
          type: string
          enum: [lt, lte, eq, gte, gt, ne]
        value:
          type: number

    RuleConditions:
      type: object
      required: [logic, predicates]
      description: >
        Canonical form stored in `conditions_jsonb`. `logic` also mirrored in
        the scalar `condition_logic` column for convenience.
      properties:
        logic:
          type: string
          enum: [ALL, ANY]
        predicates:
          type: array
          items: { $ref: "#/components/schemas/RulePredicate" }

    AutomationRule:
      type: object
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        name: { type: string }
        description: { type: string, nullable: true }
        is_active: { type: boolean }
        trigger_source: { $ref: "#/components/schemas/AutomationTriggerSource" }
        trigger_configuration:
          type: object
          description: >
            Shape depends on `trigger_source`. For `sensor_reading_threshold`
            this is `{ sensor_id, op, value }`; for `specific_time_cron` it is
            `{ cron_expression, timezone? }`. Empty `{}` is allowed for
            trigger sources that don't require configuration.
          additionalProperties: true
        condition_logic:
          type: string
          enum: [ALL, ANY]
          nullable: true
        conditions_jsonb: { $ref: "#/components/schemas/RuleConditions" }
        cooldown_period_seconds: { type: integer, nullable: true }
        last_evaluated_time: { type: string, format: date-time, nullable: true }
        last_triggered_time: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AutomationRuleCreate:
      type: object
      required: [name, trigger_source]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        is_active: { type: boolean, default: false }
        trigger_source: { $ref: "#/components/schemas/AutomationTriggerSource" }
        trigger_configuration:
          type: object
          description: See `AutomationRule.trigger_configuration`.
          additionalProperties: true
        condition_logic:
          type: string
          enum: [ALL, ANY]
          default: ALL
        conditions:
          type: array
          description: >
            Predicates evaluated under `condition_logic`. Stored in
            `conditions_jsonb` as `{ logic, predicates }`.
          items: { $ref: "#/components/schemas/RulePredicate" }
        cooldown_period_seconds:
          type: integer
          minimum: 0
          description: Min seconds between successive fires of this rule.

    ExecutableAction:
      type: object
      description: >
        A single step attached to an automation rule (or a schedule). The
        table intentionally has no created_at/updated_at columns — actions
        are edited as a list, not versioned individually.
      properties:
        id: { type: integer, format: int64 }
        rule_id: { type: integer, format: int64, nullable: true }
        schedule_id: { type: integer, format: int64, nullable: true }
        program_id:
          type: integer
          format: int64
          nullable: true
          description: >
            Phase 20.95 WS3 — optional fertigation program this action belongs to.
            Exactly one of (schedule_id, rule_id, program_id) is set; the DB
            constraint `chk_executable_source` is `num_nonnulls(...) = 1`.
        execution_order: { type: integer }
        action_type: { $ref: "#/components/schemas/ExecutableActionType" }
        target_actuator_id: { type: integer, format: int64, nullable: true }
        target_notification_template_id: { type: integer, format: int64, nullable: true }
        target_automation_rule_id: { type: integer, format: int64, nullable: true }
        action_command: { type: string, nullable: true }
        action_parameters:
          type: object
          nullable: true
          additionalProperties: true
        delay_before_execution_seconds: { type: integer, nullable: true }

    ExecutableActionCreate:
      type: object
      required: [action_type]
      description: >
        Validation depends on `action_type`:
          - `control_actuator`: `target_actuator_id` and `action_command` are
            required; `action_parameters` is optional.
          - `create_task`: `action_parameters` must be a non-empty object
            carrying the task payload (title, etc.).
          - `send_notification`: `target_notification_template_id` is
            required.
        Other enum values are rejected with HTTP 400.
      properties:
        execution_order: { type: integer, default: 0 }
        action_type: { $ref: "#/components/schemas/ExecutableActionType" }
        target_actuator_id: { type: integer, format: int64, nullable: true }
        target_notification_template_id: { type: integer, format: int64, nullable: true }
        action_command: { type: string, nullable: true }
        action_parameters:
          type: object
          nullable: true
          additionalProperties: true
        delay_before_execution_seconds: { type: integer, nullable: true, minimum: 0 }
        schedule_id:
          type: integer
          format: int64
          description: >
            Phase 20.95 WS3 — do NOT set when POSTing to /automation/rules/{id}/actions;
            the handler rejects two-source writes with 400. Documented here so the
            OpenAPI client library makes the constraint visible.
        program_id:
          type: integer
          format: int64
          description: Phase 20.95 WS3 — see schedule_id note above.

    Task:
      type: object
      properties:
        id: { type: integer }
        farm_id: { type: integer }
        zone_id: { type: integer, nullable: true }
        schedule_id: { type: integer, nullable: true, description: Optional link to a farm schedule (e.g. irrigation cron) }
        title: { type: string }
        description: { type: string, nullable: true }
        task_type: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/TaskStatusEnum" }
        priority: { type: integer, minimum: 0, maximum: 3 }
        due_date: { type: string, format: date, nullable: true }
        source_alert_id:
          type: integer
          nullable: true
          description: If set, the alerts_notifications.id this task was created from.
        source_rule_id:
          type: integer
          format: int64
          nullable: true
          description: >
            If set, the automation_rules.id whose `create_task` action created
            this task. Cleared to null if the rule is later deleted.
        time_spent_minutes:
          type: integer
          nullable: true
          description: >
            Phase 20.95 WS1 — denormalised SUM of task_labor_log.minutes for
            this task. Maintained by the labor handler on insert/delete. NULL
            means "no labor rows have ever been logged" (not the same as 0,
            which is set once a row has been deleted back to empty).
        created_at: { type: string, format: date-time }

    TaskLaborLog:
      type: object
      description: >
        Phase 20.95 WS1 — a single clock-in/clock-out (or manual minutes)
        record against a task. The sum of rows drives `tasks.time_spent_minutes`.
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        task_id: { type: integer, format: int64 }
        user_id: { type: string, format: uuid, nullable: true }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        minutes: { type: integer, minimum: 0 }
        hourly_rate_snapshot:
          type: number
          nullable: true
          description: >
            Snapshot of the worker's hourly rate at log time. Phase 20.9 will
            multiply minutes * rate into a cost_transactions row; Phase 20.95
            only stores the snapshot so no data is lost.
        currency:
          type: string
          nullable: true
          description: ISO 4217 uppercase (matched alongside hourly_rate_snapshot)
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TaskLaborLogCreate:
      type: object
      required: [started_at, minutes]
      properties:
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        minutes: { type: integer, minimum: 0 }
        hourly_rate_snapshot: { type: number, nullable: true }
        currency: { type: string, nullable: true, description: ISO 4217 uppercase }
        notes: { type: string, nullable: true }

    TaskInputConsumption:
      type: object
      description: >
        Phase 20.7 WS3 — one row = one physical draw from inventory while
        performing a task. The autologger stamps `cost_transaction_id`
        when the underlying input has a `unit_cost` configured.
      properties:
        id: { type: integer, format: int64 }
        farm_id: { type: integer, format: int64 }
        task_id: { type: integer, format: int64 }
        input_batch_id: { type: integer, format: int64 }
        quantity: { type: number }
        unit_id: { type: integer, format: int64 }
        notes: { type: string, nullable: true }
        recorded_at: { type: string, format: date-time }
        recorded_by: { type: string, format: uuid, nullable: true }
        cost_transaction_id:
          type: integer
          format: int64
          nullable: true
          description: NULL means the input had no unit_cost at consumption time (stock still decremented).
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TaskInputConsumptionCreate:
      type: object
      required: [input_batch_id, quantity, unit_id]
      properties:
        input_batch_id: { type: integer, format: int64 }
        quantity: { type: number, exclusiveMinimum: 0 }
        unit_id: { type: integer, format: int64 }
        notes: { type: string, nullable: true }

