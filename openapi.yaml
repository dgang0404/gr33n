              schema:
                type: array
                items: { $ref: "#/components/schemas/TaskLaborLog" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [tasks]
      summary: Append a labor log row and update tasks.time_spent_minutes
      description: >
        On insert the handler updates `tasks.time_spent_minutes` to the SUM of
        surviving log rows (not a delta). Delete re-runs the same running SUM.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskLaborLogCreate" }
      responses:
        "201":
          description: Created labor log row
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskLaborLog" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /tasks/{id}/labor/start:
    post:
      tags: [tasks]
      summary: Start a labor timer for the logged-in user on this task
      description: >
        Phase 20.9 WS1 — creates an open (ended_at=NULL) labor log with
        `started_at=NOW()`. Returns 409 if the caller already has an open
        timer on this task. No cost row is written until the paired
        `/stop` call lands — the autologger fires at close time so the
        rate snapshot reflects the operator's rate-at-close, not
        rate-at-start.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "201":
          description: Open labor log row
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskLaborLog" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: A timer is already running for this task+user pair

  /tasks/{id}/labor/stop:
    post:
      tags: [tasks]
      summary: Stop the open labor timer for the logged-in user on this task
      description: >
        Phase 20.9 WS1 — closes the open labor log, computes `minutes`
        from `started_at`→NOW, and (if the supplied body or the user's
        profile default populates rate+currency) stamps a
        `labor_wages` cost_transactions row via the autologger. The
        idempotency key is `"labor:{labor_id}"` so repeat stops are
        no-ops.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                hourly_rate_snapshot: { type: number, nullable: true }
                currency:             { type: string, nullable: true, pattern: "^[A-Z]{3}$" }
                notes:                { type: string, nullable: true }
      responses:
        "200":
          description: Closed labor log row (rate snapshot populated if available)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskLaborLog" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /labor/{id}:
    delete:
      tags: [tasks]
      summary: Delete a labor log row, reverse its cost, recompute task total
      description: >
        Phase 20.9 WS1 — if the autologger previously wrote a cost row
        for this labor log, a compensating cost row is stamped before
        the labor row is removed so the ledger stays append-only. The
        task's `time_spent_minutes` SUM is recomputed after delete.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /tasks/{id}/consumptions:
    get:
      tags: [tasks]
      summary: List auto-logged inventory consumptions for a task
      description: >
        Phase 20.7 WS3 — every POST decrements the referenced input_batch
        and (if the input has a unit_cost) writes a paired cost_transactions
        row via the autologger. DELETE reverses both sides.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of task consumption rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TaskInputConsumption" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [tasks]
      summary: Record inventory consumption against a task (autologged cost)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskInputConsumptionCreate" }
      responses:
        "201":
          description: Created consumption row (cost_transaction_id populated when the input has a unit_cost)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskInputConsumption" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /consumptions/{id}:
    delete:
      tags: [tasks]
      summary: Delete a task consumption row and reverse the autologged cost
      description: >
        Credits the input_batch and writes a compensating cost_transactions
        row so the ledger stays append-only (net = 0).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

