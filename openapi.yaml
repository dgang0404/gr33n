        storage_guidelines: { type: string }
        safety_precautions: { type: string }
        reference_source: { type: string }
        unit_cost: { type: number }
        unit_cost_currency: { type: string }
        unit_cost_unit_id: { type: integer }

    InputBatchCreate:
      type: object
      required: [input_definition_id, status]
      properties:
        input_definition_id: { type: integer }
        batch_identifier: { type: string }
        creation_start_date: { type: string, format: date }
        creation_end_date: { type: string, format: date }
        expected_ready_date: { type: string, format: date }
        quantity_produced: { type: number }
        quantity_unit_id: { type: integer }
        current_quantity_remaining: { type: number }
        status:
          type: string
          enum: [planning, ingredients_gathered, mixing_in_progress, fermenting_brewing, maturing_aging, ready_for_use, partially_used, fully_used, expired_discarded, failed_production]
        storage_location: { type: string }
        shelf_life_days: { type: integer }
        ph_value: { type: number }
        ec_value_ms_cm: { type: number }
        ingredients_used: { type: string }
        procedure_followed: { type: string }
        observations_notes: { type: string }
        low_stock_threshold:
          type: number
          description: >
            Phase 20.95 WS2 — if current_quantity_remaining drops below this threshold
            the Phase 20.8 low-stock alert worker raises a medium-severity alert.

    InputBatchUpdate:
      type: object
      required: [status]
      properties:
        batch_identifier: { type: string }
        status:
          type: string
          enum: [planning, ingredients_gathered, mixing_in_progress, fermenting_brewing, maturing_aging, ready_for_use, partially_used, fully_used, expired_discarded, failed_production]
