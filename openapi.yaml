openapi: "3.0.3"
info:
  title: gr33n API
  version: "0.4.5"
  description: |
    Local-first automated agriculture platform API.
    All endpoints run on localhost:8080 by default.

    **Authentication:**
    - Public routes require no auth.
    - Pi routes require `X-API-Key` header.
    - Dashboard routes require `Authorization: Bearer <JWT>`.
    - In `AUTH_MODE=dev` (dev-tagged build only), auth is bypassed.
    - `AUTH_MODE=auth_test` enforces the same auth as production on a dev-tagged build only.

    **Operator docs:** Phase 13 index — `docs/phase-13-operator-documentation.md`. **Phase 14 index** — `docs/phase-14-operator-documentation.md`. Farm audit trail — `docs/audit-events-operator-playbook.md`. Insert Commons pipeline — `docs/insert-commons-pipeline-runbook.md`; receiver — `docs/insert-commons-receiver-playbook.md`. Commons catalog (gr33n_inserts) — `docs/commons-catalog-operator-playbook.md`. Receipt storage cutover — `docs/receipt-storage-cutover-runbook.md`. Push alerts (FCM) — `docs/notifications-operator-playbook.md`. Domain module stubs (DB only; no API yet) — `docs/domain-modules-operator-playbook.md`. Optional mobile wrapper — `docs/mobile-distribution.md`. Farm Guardian (Phase 27+) request flow + cost-guard reasoning — `docs/farm-guardian-architecture.md`.

    **Phase 13 API areas:** `organizations` (multi-farm grouping, usage summary), `farms` (Insert Commons opt-in/sync/history, farm-scoped audit events), `costs` / attachments (finance mappings, exports, receipts).

    **Phase 24–28 API areas (added in 0.3.0):**
    - `rag` (Phase 24) — `/farms/{id}/rag/search`, `/farms/{id}/rag/answer` for semantic retrieval and grounded answers with citations.
    - `crop-cycle-analytics` (Phase 28 WS1) — `/crop-cycles/{id}/summary[.csv]` and `/farms/{id}/crop-cycles/compare[.csv]` for per-cycle and side-by-side fertigation / cost / yield analytics. CSV variants share the same builder; pick output mode by URL suffix.
    - `chat` (Phase 27 WS5 + Phase 28 WS5) — `POST /v1/chat` (Farm Guardian conversational chat, optionally grounded by farm RAG corpus + live snapshot, optionally streaming via SSE), session history endpoints under `/v1/chat/sessions`, and the operator-facing `GET /v1/chat/usage` rolling-window token-budget dashboard. The 80 % warning hook fires `chat_budget_warning` alerts through the existing alert channel — no new push transport.
    - `GET /capabilities` (Phase 27 WS6) — surfaces `AI_ENABLED` so the UI hides LLM-backed actions cleanly on Lite-mode servers.

    **Phase 29 API areas (added in 0.4.0):**
    - `chat` (Phase 29) — grounded `POST /v1/chat` turns may return `proposals[]` (rule-assisted alert ack/read actions). Operators confirm writes via **`POST /v1/chat/confirm`** with a frozen `proposal_id` — args are replayed server-side, never re-supplied by the client. Confirmed tools write `guardian_tool_executed` rows to the farm audit log.

    **Phase 30 API areas (added in 0.4.1):**
    - `chat` (Phase 30 WS1) — **`GET /v1/chat/proposals`** lists the caller's frozen proposals for the pending inbox (`?farm_id=`, `?status=pending`, pagination). Same confirm path as Phase 29.
    - `chat` (Phase 30 WS2) — proposals include **`risk_tier`** (`low` | `medium` | `high`) for inbox/card UX warnings.
    - `chat` (Phase 30 WS4) — **`enqueue_actuator_command`** tool queues `devices.config.pending_command` on Confirm (Pi polls `GET /farms/{id}/devices`); never direct GPIO from chat.
    - `zones` (Phase 30 WS5–WS6) — **`/zones/{id}/photos`** reference-photo upload/list; chat accepts **`attachment_ids`** when `LLM_VISION_MODEL` is set (`vision_chat_enabled` on `/capabilities`).

    **Phase 32 API areas (added in 0.4.4):**
    - `chat` (Phase 32) — grow onboarding write tools confirmed via the same **`POST /v1/chat/confirm`** path: **`create_plant`**, **`create_crop_cycle`**, **`create_fertigation_program`** (medium tier), and **`apply_grow_setup_pack`** (high tier — single transaction: plant + active cycle + program + optional monitor task). Grounded chat may return a frozen setup-pack proposal when rule-assisted intent matches zone + plant in the live snapshot. See **`GuardianGrowSetupPackArgs`** and related schemas under `components.schemas`.

    **Phase 39 API areas (added in 0.4.5):**
    - `devices` — FIFO **`device_commands`** queue: **`POST/GET /devices/{id}/commands`**, Pi **`GET …/commands/next`**, **`POST …/commands/{cid}/ack`**. Command types: **`actuator`**, **`pulse`**, **`mix_batch`**. Legacy **`devices.config.pending_command`** mirrors queue head for one release.
    - `fertigation` — cloud **`MixPlan`** calculator: **`POST /farms/{id}/fertigation/mix-jobs`** (preview or enqueue), **`GET /fertigation/programs/{rid}/mix-preview`**, **`GET …/water-status`**, **`PATCH /fertigation/reservoirs/{rid}/base-water`** (source-water EC prerequisite).
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: health
    description: API and database health
  - name: auth
    description: Authentication and password management
  - name: units
    description: Units of measure reference
  - name: commons
    description: Published commons catalog (gr33n_inserts) — browse metadata packs and record per-farm imports
  - name: farms
    description: Farm management, Insert Commons opt-in and sync, and farm-scoped audit events (owner/manager)
  - name: organizations
    description: Multi-farm organization grouping, membership, and usage summaries (billing hooks)
  - name: zones
    description: Zone management
  - name: sensors
    description: Sensor registry, readings, and live streams
  - name: devices
    description: Device management and control
  - name: actuators
    description: Actuator state and event history
  - name: automation
    description: Schedules, runs, and worker health
  - name: lighting
    description: Photoperiod lighting programs — presets, ON/OFF schedule pairs, and grow-light actuators (Phase 35)
  - name: tasks
    description: Task management
  - name: plants
    description: Plant / crop tracking (per-farm named plants with variety and metadata)
  - name: costs
    description: Farm cost and income transactions
  - name: fertigation
    description: Fertigation reservoirs, programs, EC targets, and events
  - name: naturalfarming
    description: Natural farming inputs and batches (JADAM-style starter data and custom definitions)
  - name: alerts
    description: Sensor alert notifications and threshold breach tracking
  - name: profiles
    description: User profiles and farm membership management
  - name: rag
    description: Farm-scoped vector retrieval over embedded operational text (Phase 24)
  - name: crop-cycle-analytics
    description: Per-cycle and side-by-side analytics — fertigation, cost, yield, stage history (Phase 28 WS1). JSON + CSV.
  - name: chat
    description: Farm Guardian conversational chat (Phase 27–29) — turn endpoint, session history, token-usage dashboard, and confirmed agent actions. Optional RAG grounding + live farm-state snapshot when `farm_id` is supplied. Grounded turns may return `proposals[]`; confirm via `POST /v1/chat/confirm`.
  - name: capabilities
    description: Public server capability flags (Phase 27 WS6) — UI gating hint for AI features.

paths:

  # ── Public ──────────────────────────────────────────────────

  /health:
    get:
      tags: [health]
      summary: Health check
      description: Returns API status and confirms database connectivity.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: gr33n-api }
        "503":
          description: Database unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/login:
    post:
      tags: [auth]
      summary: Login
      description: Authenticate with username/password. Returns a JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/mode:
    get:
      tags: [auth]
      summary: Get authentication mode
      description: Returns current auth mode (dev, auth_test, or production). auth_test is only valid on local dev builds compiled with `-tags dev`.
      responses:
        "200":
          description: Auth mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode: { type: string, enum: [dev, auth_test, production] }

  /capabilities:
    get:
      tags: [capabilities]
      summary: Public server capability flags (Phase 27 WS6)
      description: >
        Public, unauthenticated endpoint the UI calls on boot to decide whether
        to render LLM-backed actions (Farm Guardian chat, RAG answer synthesis,
        Guardian-usage card). Mirrors the server-side `AI_ENABLED` env var.
        Older API builds without this endpoint should be treated as AI on
        (back-compat). See `docs/plans/phase_27_farm_guardian_ai_layer.md`.
      responses:
        "200":
          description: Capability flags
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capabilities" }

  /auth/password:
    patch:
      tags: [auth]
      summary: Change password
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string, format: password }
                new_password: { type: string, format: password }
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      description: Creates auth.users + profiles row. Invited users (null password) can set password here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password, minLength: 8 }
                full_name: { type: string }
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  expires_in: { type: integer }
                  user_id: { type: string, format: uuid }
        "409":
          description: User already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ── Pi routes (API key) ────────────────────────────────────

  /sensors/{id}/readings:
    get:
      tags: [sensors]
      summary: List sensor readings in a time range
      description: |
        Returns readings from `since` through `until` (inclusive), oldest first.
        Defaults to the last 24 hours. At most `limit` rows (newest within the window).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: since
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Range start (RFC3339). Defaults to 24 hours before `until`.
        - name: until
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Range end (RFC3339). Defaults to now (UTC).
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 5000, default: 500 }
      responses:
        "200":
          description: Readings oldest-first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SensorReading" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [sensors]
      summary: Post a sensor reading (Pi client)
      description: Called by the Raspberry Pi client daemon. Triggers SSE push to connected dashboards.
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SensorReadingCreate" }
            example:
              value_raw: 22.5
              is_valid: true
              battery_level_percent: 87.0
      responses:
        "201":
          description: Reading stored and normalized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SensorReading" }

  /sensors/readings/batch:
    post:
      tags: [sensors]
      summary: Post multiple sensor readings (edge / MQTT bridge)
      description: |
        One HTTP request for several readings (e.g. MQTT subscriber on a gateway).
        Inserts run in a single transaction. At most 64 items per request.
        Same `X-API-Key` as `POST /sensors/{id}/readings`.
      security: [{ apiKeyAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              maxItems: 64
              items: { $ref: "#/components/schemas/SensorReadingBatchItem" }
            example:
              - { sensor_id: 1, value_raw: 22.5, is_valid: true }
              - { sensor_id: 2, value_raw: 61.0 }
      responses:
        "201":
          description: All readings stored
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SensorReadingBatchResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /devices/{id}/status:
    patch:
      tags: [devices]
      summary: Update device status (Pi heartbeat)
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: "#/components/schemas/DeviceStatusEnum" }
            example: { status: online }
      responses:
        "200":
          description: Updated device
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Device" }

  # ── Units ──────────────────────────────────────────────────

  /units:
    get:
      tags: [units]
      summary: List all units of measure
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of units
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Unit" }

  # ── Commons catalog (gr33n_inserts) ───────────────────────

  /commons/catalog:
    get:
      tags: [commons]
      summary: List published commons catalog entries
      description: >
        Returns metadata for operator-curated packs (documentation, reference JSON, future insert templates).
        Response rows omit the heavy `body`; use `GET /commons/catalog/{slug}` for the full payload.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Search title, summary, or tags (case-insensitive substring)
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: List of catalog entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CommonsCatalogListEntry" }

  /commons/catalog/{slug}:
    get:
      tags: [commons]
      summary: Get one published catalog entry by slug
      security: [{ bearerAuth: [] }]
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Full entry including `body` (JSON)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommonsCatalogEntryDetail" }
        "404":
          $ref: "#/components/responses/NotFound"

  /farms/{id}/commons/catalog-imports:
    get:
      tags: [commons]
      summary: List catalog imports recorded for this farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Import audit rows with catalog metadata
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FarmCommonsCatalogImportListRow" }
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [commons]
      summary: Record a catalog import for this farm (farm admin)
      description: >
        Idempotent per farm and catalog entry. Does not execute SQL or mutate farm data automatically —
        records provenance and returns the catalog `body` for clients, automation, or future workers.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommonsCatalogImportRequest" }
      responses:
        "200":
          description: Import row plus catalog entry snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommonsCatalogImportResponse" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Farms ──────────────────────────────────────────────────

  /farms:
    get:
      tags: [farms]
      summary: List farms for a user
      security: [{ bearerAuth: [] }]
      parameters:
        - name: user_id
          in: query
          required: false
          schema: { type: string, format: uuid }
          description: Filter by user membership. Omit to list all farms.
      responses:
        "200":
          description: List of farms
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Farm" }
    post:
      tags: [farms]
      summary: Create a farm
      description: >
        If `bootstrap_template` is omitted and the farm is not linked to an organization with a default template,
        the response body is a plain Farm object.
        If `bootstrap_template` is present (including `none`), or if the farm has `organization_id` set and that
        organization has `default_bootstrap_template`, the response is `{ farm, bootstrap }` where `bootstrap`
        is the outcome of `gr33ncore.apply_farm_bootstrap_template` (skipped, applied, already_applied, or error detail).
        Sending `bootstrap_template: "none"` skips both an explicit pack and the organization default.
        Auto-bootstrap runs only when the authenticated user matches `owner_user_id`.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FarmCreate" }
      responses:
        "201":
          description: Created farm (or farm + bootstrap when bootstrap_template was sent)
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Farm" }
                  - { $ref: "#/components/schemas/FarmCreatedWithBootstrap" }

  /farms/{id}/bootstrap-template:
    post:
      tags: [farms]
      summary: Apply a versioned starter template to an existing farm (farm admin)
      description: >
        Idempotent per farm and template key. Supported `template` values include `jadam_indoor_photoperiod_v1`,
        `chicken_coop_v1`, `greenhouse_climate_v1`, `drying_room_v1`, and `small_aquaponics_v1` (see `gr33ncore.apply_farm_bootstrap_template`).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [template]
              properties:
                template:
                  type: string
                  example: jadam_indoor_photoperiod_v1
      responses:
        "200":
          description: Bootstrap result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FarmBootstrapApplyResponse" }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}:
    get:
      tags: [farms]
      summary: Get farm by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Farm object
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Farm" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [farms]
      summary: Update a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FarmUpdate" }
      responses:
        "200":
          description: Updated farm
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Farm" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [farms]
      summary: Soft-delete a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                updated_by_user_id: { type: string, format: uuid }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /farms/{id}/organization:
    patch:
      tags: [farms]
      summary: Link or unlink farm from an organization (farm admin; org admin required to link)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FarmOrganizationPatch" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Farm" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /organizations:
    post:
      tags: [organizations]
      summary: Create an organization (caller becomes owner)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrganizationCreate" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }
    get:
      tags: [organizations]
      summary: List organizations the current user belongs to
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OrganizationWithMembership" }

  /organizations/{id}:
    get:
      tags: [organizations]
      summary: Get organization by id (members only)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [organizations]
      summary: Update organization name and billing hooks (owner or org admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrganizationUpdate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /organizations/{id}/usage-summary:
    get:
      tags: [organizations]
      summary: Aggregated usage counts across farms in the organization (metering hook)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrganizationUsageSummary" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /organizations/{id}/audit-events:
    get:
      tags: [organizations]
      summary: List audit events across farms in the organization (org owner or admin only)
      description: >
        Union of farm-scoped events for all farms linked to this organization and org-only rows
        (organization create/update, membership changes). Same response shape as farm audit events.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: Audit events newest-first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditActivityEvent" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /organizations/{id}/members:
    post:
      tags: [organizations]
      summary: Add an existing user to the organization by email (org admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrganizationMemberInvite" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrganizationMembership" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/BadRequest" }

  /farms/{id}/zones:
    get:
      tags: [zones]
      summary: List zones for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of zones
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Zone" }
    post:
      tags: [zones]
      summary: Create a zone
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ZoneCreate" }
      responses:
        "201":
          description: Created zone
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Zone" }

  /zones/{id}:
    get:
      tags: [zones]
      summary: Get zone by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Zone object
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Zone" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [zones]
      summary: Update a zone
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ZoneUpdate" }
      responses:
        "200":
          description: Updated zone
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Zone" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [zones]
      summary: Soft-delete a zone
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /zones/{id}/photos:
    get:
      tags: [zones]
      summary: List zone reference photos (Phase 30 WS5)
      description: >
        Returns file attachments linked to the zone via `zones.meta_data.photo_attachment_ids`.
        Requires farm membership on the zone's farm.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Zone id and photo metadata list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ZonePhotoListResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller is not a member of the zone's farm.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [zones]
      summary: Upload a zone reference photo (Phase 30 WS5)
      description: >
        Multipart upload (JPEG, PNG, or WebP, max 8 MiB). Appends the new
        `file_attachments` id to `zones.meta_data.photo_attachment_ids`.
        Requires `FarmCaps.Operate` on the zone's farm.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Attachment created and zone updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ZonePhotoUploadResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller lacks Operate on the zone's farm.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404": { $ref: "#/components/responses/NotFound" }

  /zones/{id}/photos/{attachment_id}:
    delete:
      tags: [zones]
      summary: Remove a zone reference photo link (Phase 30 WS5)
      description: >
        Removes the attachment id from zone `meta_data` and deletes the blob when
        unreferenced. Requires `FarmCaps.Operate` on the zone's farm.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: attachment_id
          in: path
          required: true
          schema: { type: integer, format: int64, minimum: 1 }
      responses:
        "200":
          description: Zone updated after unlink.
          content:
            application/json:
              schema:
                type: object
                properties:
                  zone: { $ref: "#/components/schemas/Zone" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller lacks Operate on the zone's farm.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Zone or photo link not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ── Sensors ────────────────────────────────────────────────

  /farms/{id}/sensors:
    get:
      tags: [sensors]
      summary: List sensors for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of sensors
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Sensor" }
    post:
      tags: [sensors]
      summary: Register a new sensor
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SensorCreate" }
      responses:
        "201":
          description: Created sensor
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sensor" }

  /sensors/{id}:
    get:
      tags: [sensors]
      summary: Get sensor by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Sensor object
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sensor" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [sensors]
      summary: Update sensor configuration (thresholds, duration, cooldown, metadata)
      description: >
        Patch-style — any omitted field leaves its stored value untouched. Pass explicit
        `null` to clear a nullable column such as `alert_threshold_low`.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SensorUpdate" }
      responses:
        "200":
          description: Updated sensor
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sensor" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [sensors]
      summary: Soft-delete a sensor
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /sensors/{id}/readings/stats:
    get:
      tags: [sensors]
      summary: Aggregate stats for sensor readings in a time range
      description: Defaults to the last 24 hours if `since` / `until` are omitted.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: since
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: until
          in: query
          required: false
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Aggregates for the window
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SensorReadingStats" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /sensors/{id}/readings/latest:
    get:
      tags: [sensors]
      summary: Get latest reading for a sensor
      description: Returns 404 if the sensor has no readings yet.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Latest sensor reading
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SensorReading" }
        "404":
          description: No readings yet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /farms/{id}/sensors/stream:
    get:
      tags: [sensors]
      summary: SSE stream of live sensor readings
      description: |
        Server-Sent Events endpoint. Pushes `readings` events containing a map
        of sensor_id → latest reading. Fires on new data ingestion and every 10s.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: token
          in: query
          required: false
          schema: { type: string }
          description: JWT fallback for EventSource clients that cannot set Authorization headers.
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: "event: readings\\ndata: {sensor_id: reading, ...}"

  # ── Devices ────────────────────────────────────────────────

  /farms/{id}/devices:
    get:
      tags: [devices]
      summary: List devices for a farm
      description: |
        Dashboard users send a JWT. Edge gateways (Pi, MQTT bridge) may use `X-API-Key`
        with the same `PI_API_KEY` as sensor ingest, to poll `config.pending_command` for tasking.
      security:
        - { bearerAuth: [] }
        - { apiKeyAuth: [] }
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Device" }
    post:
      tags: [devices]
      summary: Register a new device
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceCreate" }
      responses:
        "201":
          description: Created device
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Device" }

  /devices/{id}:
    get:
      tags: [devices]
      summary: Get device by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Device object
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Device" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [devices]
      summary: Soft-delete a device
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }

  /devices/{id}/pending-command:
    delete:
      tags: [devices]
      summary: Clear pending command for a device (Pi)
      description: |
        Legacy Phase 38 path. Phase 39 Pi clients should **`GET /devices/{id}/commands/next`**
        and **`POST …/commands/{cid}/ack`** instead. `pending_command` may still mirror the queue head.
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Pending command cleared }
        "400": { $ref: "#/components/responses/BadRequest" }

  /devices/{id}/commands:
    post:
      tags: [devices]
      summary: Enqueue a device command (operator)
      description: |
        FIFO queue per device. Types: **`actuator`** / **`pulse`** (require `actuator_id` + `command`);
        **`mix_batch`** (full `payload` JSON with `mix_plan`). Mirrors head to `pending_command` for backward compat.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceCommandEnqueue" }
      responses:
        "202":
          description: Command enqueued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceCommand" }
        "400": { $ref: "#/components/responses/BadRequest" }
    get:
      tags: [devices]
      summary: List device commands (operator)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: status
          in: query
          schema: { type: string, enum: [pending, in_progress, completed, failed, cancelled] }
      responses:
        "200":
          description: Command list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceCommandList" }

  /devices/{id}/commands/next:
    get:
      tags: [devices]
      summary: Dequeue next pending command (Pi)
      description: Atomically marks the oldest pending command `in_progress`. Returns **204** when the queue is empty.
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Next command (now in_progress)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceCommand" }
        "204": { description: Queue empty }

  /devices/{id}/commands/{cid}/ack:
    post:
      tags: [devices]
      summary: Acknowledge command completion (Pi)
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: cid
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceCommandAck" }
      responses:
        "200":
          description: Updated command row
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceCommand" }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ── Actuators ──────────────────────────────────────────────

  /farms/{id}/actuators:
    get:
      tags: [actuators]
      summary: List actuators for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of actuators (each includes valid_commands for its type)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActuatorWithCommands" }
    post:
      tags: [actuators]
      summary: Create an actuator (Phase 36)
      description: >
        Creates a farm actuator with optional per-type `config` validation
        (`shade_screen`, `ridge_vent`, `exhaust_fan`, `circulation_fan`, etc.).
        Response includes `valid_commands` for the actuator type.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ActuatorCreate" }
      responses:
        "201":
          description: Created actuator with valid_commands hint
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActuatorWithCommands" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /actuators/{id}:
    get:
      tags: [actuators]
      summary: Get an actuator by ID (Phase 36)
      description: Returns the actuator row plus `valid_commands` for its type.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Actuator
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActuatorWithCommands" }
        "404": { $ref: "#/components/responses/NotFound" }

  /actuators/{id}/command:
    post:
      tags: [actuators]
      summary: Enqueue manual actuator command (Phase 36 WS4-prep; Phase 38 pulse)
      description: >
        Writes `devices.config.pending_command` for the actuator's device.
        The Pi client polls and executes on GPIO. Command must be in
        `valid_commands` for the actuator's type (e.g. deploy/retract for
        shade_screen). Optional `duration_seconds` (Phase 38) runs pumps/relays
        on for N seconds then off on the edge. Requires `device_id` on the actuator
        and farm operate role.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ActuatorCommandEnqueue" }
      responses:
        "202":
          description: Command queued on device
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActuatorCommandEnqueueResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /lighting-programs/presets:
    get:
      tags: [lighting]
      summary: List standard photoperiod presets
      description: >
        Named templates (22/2 peas, 18/6 veg, 12/12 flower, 16/8 seedling).
        Apply via `POST /farms/{id}/lighting-programs/from-preset`.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Preset library
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LightingPreset" }

  /farms/{id}/lighting-programs:
    get:
      tags: [lighting]
      summary: List lighting programs for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Lighting programs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LightingProgram" }
    post:
      tags: [lighting]
      summary: Create a custom lighting program
      description: >
        Creates the program plus paired ON/OFF schedules and
        `control_actuator` executable actions in one transaction.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LightingProgramCreate" }
      responses:
        "201":
          description: Created lighting program
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LightingProgram" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /farms/{id}/lighting-programs/from-preset:
    post:
      tags: [lighting]
      summary: Create a lighting program from a preset
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LightingProgramFromPreset" }
      responses:
        "201":
          description: Created lighting program
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LightingProgram" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /lighting-programs/{pid}:
    get:
      tags: [lighting]
      summary: Get a lighting program
      security: [{ bearerAuth: [] }]
      parameters:
        - name: pid
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Lighting program
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LightingProgram" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [lighting]
      summary: Update a lighting program
      description: >
        Regenerates paired ON/OFF cron schedules when photoperiod fields change.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: pid
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LightingProgramUpdate" }
      responses:
        "200":
          description: Updated lighting program
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LightingProgram" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [lighting]
      summary: Delete a lighting program
      description: Deletes paired schedules (cascade removes executable actions).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: pid
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /lighting-programs/{pid}/activate:
    post:
      tags: [lighting]
      summary: Activate a lighting program and its paired schedules
      security: [{ bearerAuth: [] }]
      parameters:
        - name: pid
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Activated program
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LightingProgram" }
        "404": { $ref: "#/components/responses/NotFound" }

  /lighting-programs/{pid}/deactivate:
    post:
      tags: [lighting]
      summary: Deactivate a lighting program and its paired schedules
      security: [{ bearerAuth: [] }]
      parameters:
        - name: pid
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deactivated program
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LightingProgram" }
        "404": { $ref: "#/components/responses/NotFound" }

  /actuators/{id}/state:
    patch:
      tags: [actuators]
      summary: Update actuator state
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state_text: { type: string }
                state_numeric: { type: number, nullable: true }
      responses:
        "200":
          description: Updated actuator
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Actuator" }

  /actuators/{id}/events:
    get:
      tags: [actuators]
      summary: List actuator events
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
        - name: since
          in: query
          schema: { type: string, format: date-time }
          description: Only events after this time (default 24h ago)
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: List of actuator events
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActuatorEvent" }
    post:
      tags: [actuators]
      summary: Record an actuator event (Pi)
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command_sent]
              properties:
                command_sent: { type: string }
                source:
                  type: string
                  enum:
                    - manual_ui_input
                    - manual_api_call
                    - schedule_trigger
                    - automation_rule_trigger
                    - device_internal_feedback_loop
                    - system_initialization_routine
                    - emergency_stop_signal
                  default: manual_api_call
                event_time: { type: string, format: date-time }
                execution_status:
                  type: string
                  enum:
                    - command_sent_to_device
                    - acknowledged_by_device
                    - execution_started_on_device
                    - execution_completed_success_on_device
                    - execution_completed_with_error_on_device
                    - execution_failed_to_start_on_device
                    - pending_confirmation_from_feedback
                    - timeout_waiting_for_acknowledgement
                    - cancelled_by_user_or_system
                  default: command_sent_to_device
                triggered_by_schedule_id: { type: integer, nullable: true }
                triggered_by_rule_id:
                  type: integer
                  nullable: true
                  description: >
                    When the pending_command carried ``rule_id`` (automation
                    rule dispatch), echo it here so actuator_events join back
                    to the rule. Mutually exclusive with ``program_id``.
                program_id:
                  type: integer
                  nullable: true
                  description: >
                    Fertigation program that queued the command (worker
                    ``pending_command`` JSON). Stored in ``meta_data`` on the
                    event row with ``reported_by: pi_client``. Mutually exclusive
                    with ``triggered_by_rule_id``.
                parameters_sent:
                  type: object
                  nullable: true
                  description: Optional JSON object echoed from the edge (defaults to `{}`).
                meta_data:
                  type: object
                  nullable: true
                  description: >
                    Optional operator metadata; merged with server fields
                    ``reported_by`` and (when ``program_id`` is set) ``program_id``.
      responses:
        "201":
          description: Created actuator event
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActuatorEvent" }
        "400": { $ref: "#/components/responses/BadRequest" }

