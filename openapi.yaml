  # ── Automation rules (Phase 20 WS1) ────────────────────────

  /farms/{id}/automation/rules:
    get:
      tags: [automation]
      summary: List automation rules for a farm
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: List of automation rules
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AutomationRule" }
    post:
      tags: [automation]
      summary: Create an automation rule for a farm
      description: >
        Creates a rule that the automation worker will evaluate on each tick.
        The server validates `trigger_source` against the DB enum, ensures any
        sensor references (both in `trigger_configuration` and `conditions`)
        belong to this farm, and canonicalises `conditions` into
        `{ logic, predicates }`. Actions are attached via
        `POST /automation/rules/{id}/actions`.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AutomationRuleCreate" }
      responses:
        "201":
          description: Created rule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AutomationRule" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /automation/rules/{id}:
    get:
      tags: [automation]
      summary: Get an automation rule
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Rule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AutomationRule" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [automation]
      summary: Update an automation rule
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AutomationRuleCreate" }
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AutomationRule" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [automation]
      summary: Delete an automation rule
      description: >
        Cascades to `executable_actions` with this `rule_id` and nulls out
        `source_rule_id` on any tasks the rule previously generated.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /automation/rules/{id}/active:
    patch:
      tags: [automation]
      summary: Toggle automation rule active/inactive
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_active]
              properties:
                is_active: { type: boolean }
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AutomationRule" }

  /automation/rules/{id}/actions:
    get:
      tags: [automation]
      summary: List actions attached to a rule
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      responses:
        "200":
          description: Ordered list of executable actions for this rule
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExecutableAction" }
    post:
      tags: [automation]
      summary: Attach an executable action to a rule
      description: >
        Phase 20 dispatches `control_actuator`, `create_task`, and
        `send_notification`. The other enum values
        (`trigger_another_automation_rule`, `http_webhook_call`,
        `update_record_in_gr33n`, `log_custom_event`) are deferred and
        rejected with HTTP 400.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/ID" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExecutableActionCreate" }
      responses:
        "201":
          description: Created action
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutableAction" }
        "400": { $ref: "#/components/responses/BadRequest" }

